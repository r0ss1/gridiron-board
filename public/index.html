function renderWhatIfContent(){
  const teams = state.teams;
  const n = teams.length;
  const PLAYOFF_LINE = 7;

  // Actual standings order (for delta arrows): wins desc, then PF desc
  const actualOrder = [...teams].sort((a,b) =>
    (b.record.overall.wins - a.record.overall.wins) ||
    (b.record.overall.pointsFor - a.record.overall.pointsFor));
  const actualRank = {};
  actualOrder.forEach((t,i) => { actualRank[t.id] = i + 1; });

  const allPlay = computeAllPlayRecords(teams, state.schedule);
  const median = computeMedianRecords(teams, state.schedule);

  // Mode definitions: each returns a sorted array of teams + a metric label/value fn
  const modes = [
    {
      key: 'points',
      title: 'Points Reseed',
      desc: 'Ranked purely by total points scored \u2014 no luck of the schedule.',
      metricLabel: 'Points For',
      sort: (a,b) => b.record.overall.pointsFor - a.record.overall.pointsFor,
      metric: t => t.record.overall.pointsFor.toFixed(1)
    },
    {
      key: 'allplay',
      title: 'All-Play Reseed',
      desc: 'Ranked by all-play win % \u2014 as if every team played every other team each week.',
      metricLabel: 'All-Play %',
      sort: (a,b) => {
        const ra = allPlay[a.id], rb = allPlay[b.id];
        return allPlayPct(rb) - allPlayPct(ra);
      },
      metric: t => (allPlayPct(allPlay[t.id]) * 100).toFixed(1) + '%'
    },
    {
      key: 'today',
      title: 'Season Ends Today',
      desc: 'Current standings locked in as the final seeding.',
      metricLabel: 'Record',
      sort: (a,b) =>
        (b.record.overall.wins - a.record.overall.wins) ||
        (b.record.overall.pointsFor - a.record.overall.pointsFor),
      metric: t => {
        const r = t.record.overall;
        return r.wins + '-' + r.losses;
      }
    },
    {
      key: 'median',
      title: 'Median Reseed',
      desc: 'Ranked by record vs. the weekly median score.',
      metricLabel: 'vs Median',
      sort: (a,b) => {
        const ra = median[a.id], rb = median[b.id];
        return (rb.wins - rb.losses) - (ra.wins - ra.losses);
      },
      metric: t => {
        const r = median[t.id];
        return r.wins + '-' + r.losses;
      }
    }
  ];

  function deltaCell(teamId, newRank){
    const d = actualRank[teamId] - newRank; // positive = moved up
    if (d > 0) return '<span class="wi-delta wi-up">\u25B2' + d + '</span>';
    if (d < 0) return '<span class="wi-delta wi-down">\u25BC' + (-d) + '</span>';
    return '<span class="wi-delta wi-same">\u2013</span>';
  }

  let html = '<div class="wi-intro">Alternate seedings from the same games. Arrows show movement vs. the actual standings. The line marks the top ' + PLAYOFF_LINE + ' playoff spots.</div>';
  html += '<div class="wi-grid">';
  modes.forEach(mode => {
    const ordered = [...teams].sort(mode.sort);
    html += '<div class="wi-card">';
    html += '<h3 class="wi-title">' + escapeHtml(mode.title) + '</h3>';
    html += '<p class="wi-desc">' + escapeHtml(mode.desc) + '</p>';
    html += '<table class="wi-table"><thead><tr><th>#</th><th>Team</th><th class="num">' + escapeHtml(mode.metricLabel) + '</th><th class="num">\u0394</th></tr></thead><tbody>';
    ordered.forEach((t, i) => {
      const rank = i + 1;
      const lineClass = rank === PLAYOFF_LINE ? ' wi-playoff-line' : '';
      html += '<tr class="' + lineClass.trim() + '">' +
        '<td class="wi-rank">' + rank + '</td>' +
        '<td class="wi-team">' + escapeHtml(teamDisplayName(t)) + '</td>' +
        '<td class="wi-metric">' + mode.metric(t) + '</td>' +
        '<td>' + deltaCell(t.id, rank) + '</td>' +
        '</tr>';
    });
    html += '</tbody></table></div>';
  });
  html += '</div>';
  whatifView.innerHTML = html;
}

function computeEloHistory(){
  // Chronological head-to-head Elo with per-season soft reset toward 1500.
  const names = historyTeamNames();
  const checked = history.loadedSeasons.filter(y => history.checkedSeasons.has(y));
  const rating = {};        // ownerKey -> current rating
  const series = {};        // ownerKey -> [{year, week, elo}]
  const peak = {};          // ownerKey -> {elo, year, week}
  const games = {};         // ownerKey -> count
  const seen = new Set();   // owners active this run
  const ensure = (k) => {
    if (!(k in rating)) { rating[k] = 1500; series[k] = []; games[k] = 0; peak[k] = {elo:1500, year:null, week:null}; }
  };
  checked.forEach((year, yi) => {
    // soft reset between seasons: regress 33% toward 1500
    if (yi > 0) {
      Object.keys(rating).forEach(k => { rating[k] = 1500 + 0.67 * (rating[k] - 1500); });
    }
    const data = history.data[year];
    if (!data) return;
    const sched = (data.schedule || []).slice().sort((a,b)=>(a.matchupPeriodId||0)-(b.matchupPeriodId||0));
    const teams = data.teams || [];
    const ownerById = idToOwnerKeyMap(teams);
    sched.forEach(g => {
      if (!g.winner || g.winner === 'UNDECIDED' || !g.home || !g.away) return;
      const hk = ownerById[g.home.teamId];
      const ak = ownerById[g.away.teamId];
      if (!hk || !ak || hk === ak) return;
      ensure(hk); ensure(ak); seen.add(hk); seen.add(ak);
      const hp = g.home.totalPoints ?? 0;
      const ap = g.away.totalPoints ?? 0;
      const week = g.matchupPeriodId;
      const rh = rating[hk], ra = rating[ak];
      const eh = 1 / (1 + Math.pow(10, (ra - rh) / 400));
      const ea = 1 - eh;
      let sh, sa, margin;
      if (g.winner === 'TIE') { sh = 0.5; sa = 0.5; margin = 0; }
      else if (g.winner === 'HOME') { sh = 1; sa = 0; margin = Math.abs(hp - ap); }
      else { sh = 0; sa = 1; margin = Math.abs(hp - ap); }
      const eloDiff = Math.abs(rh - ra);
      const movMult = Math.log(margin + 1) * (2.2 / (eloDiff * 0.001 + 2.2));
      const K = 20 * (margin === 0 ? 1 : movMult);
      rating[hk] = rh + K * (sh - eh);
      rating[ak] = ra + K * (sa - ea);
      games[hk]++; games[ak]++;
      [hk, ak].forEach(k => {
        series[k].push({year, week, elo: rating[k]});
        if (rating[k] > peak[k].elo) peak[k] = {elo: rating[k], year, week};
      });
    });
  });
  const rows = Array.from(seen).map(k => ({
    key: k,
    name: names[k] || 'Unknown',
    elo: rating[k],
    peak: peak[k],
    games: games[k],
    series: series[k]
  })).sort((a,b) => b.elo - a.elo);
  return rows;
}

function eloSparkline(series){
  if (!series || series.length < 2) return '';
  const vals = series.map(p => p.elo);
  const min = Math.min.apply(null, vals), max = Math.max.apply(null, vals);
  const span = (max - min) || 1;
  const W = 120, H = 28;
  const step = W / (vals.length - 1);
  const pts = vals.map((v, i) => (i * step).toFixed(1) + ',' + (H - ((v - min) / span) * H).toFixed(1)).join(' ');
  return '<svg class="elo-spark" width="' + W + '" height="' + H + '" viewBox="0 0 ' + W + ' ' + H + '" preserveAspectRatio="none"><polyline points="' + pts + '" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>';
}

function renderEloContent(){
  if (!history.loadedSeasons.length) { eloView.innerHTML = '<div class="status">Load history data to see Elo ratings.</div>'; return; }
  const checked = history.loadedSeasons.filter(y => history.checkedSeasons.has(y));
  if (!checked.length) { eloView.innerHTML = '<div class="status">Check some seasons in History to build ratings.</div>'; return; }
  const rows = computeEloHistory();
  if (!rows.length) { eloView.innerHTML = '<div class="status">No completed games in the selected seasons.</div>'; return; }
  const eloExplainer = '<div style="margin-bottom:var(--sp-lg);font-size:var(--fs-sm);color:var(--ink-dim);line-height:1.6;"><strong style="color:var(--ink);">What is Elo?</strong> Elo is a rating system originally designed for chess that measures relative skill. After each matchup, the winner gains points and the loser loses points \u2014 the amount depends on the expected outcome. Beating a higher-rated opponent earns more points than beating a lower-rated one. Everyone starts at 1500. <a href="https://en.wikipedia.org/wiki/Elo_rating_system" target="_blank" rel="noopener" style="color:var(--amber);">Learn more \u2197</a></div>';
  let html = eloExplainer +
    '<div class="section-title">Elo Ratings</div>' +
    '<div class="section-note">Chronological head-to-head Elo across ' + checked.length + ' season' + (checked.length === 1 ? '' : 's') + '. Margin-of-victory adjusted, with a soft reset toward 1500 each season.</div>' +
    '<table class="elo-table"><thead><tr><th>#</th><th>Manager</th><th>Elo</th><th>Peak</th><th>Games</th><th>Trend</th></tr></thead><tbody>';
  rows.forEach((r, i) => {
    const pk = r.peak && r.peak.year ? (Math.round(r.peak.elo) + ' (' + r.peak.year + ' Wk ' + r.peak.week + ')') : Math.round(r.peak.elo);
    html +=
      '<tr>' +
      '<td>' + (i + 1) + '</td>' +
      '<td><strong>' + escapeHtml(r.name) + '</strong></td>' +
      '<td class="elo-num">' + Math.round(r.elo) + '</td>' +
      '<td class="elo-peak">' + pk + '</td>' +
      '<td class="elo-num">' + r.games + '</td>' +
      '<td class="elo-trend">' + eloSparkline(r.series) + '</td>' +
      '</tr>';
  });
  html += '</tbody></table>';
  eloView.innerHTML = html;
}

function renderH2HContent(){
  const seasonsData = profileSeasonsData();
  if (!seasonsData.length) {
    h2hView.innerHTML = '<div class="status">Load a league first.</div>';
    return;
  }
  const managers = allManagerOptions(seasonsData);
  if (managers.length < 2) {
    h2hView.innerHTML = '<div class="status">Need at least two managers to compare.</div>';
    return;
  }
  if (!window._h2hSel) window._h2hSel = { a: null, b: null };
  const st = window._h2hSel;
  let defA = managers.some(m => m.key === st.a) ? st.a : managers[0].key;
  let defB = managers.some(m => m.key === st.b) ? st.b : managers[1].key;
  if (defB === defA) {
    const other = managers.find(m => m.key !== defA);
    defB = other ? other.key : defB;
  }
  st.a = defA;
  st.b = defB;
  const optsA = managers.map(m => '<option value="' + escapeHtml(m.key) + '"' + (m.key === defA ? ' selected' : '') + '>' + escapeHtml(m.name) + '</option>').join('');
  const optsB = managers.map(m => '<option value="' + escapeHtml(m.key) + '"' + (m.key === defB ? ' selected' : '') + '>' + escapeHtml(m.name) + '</option>').join('');
  h2hView.innerHTML =
    '<div class="section-title">Head-to-Head</div>' +
    '<div class="section-note">Compare two managers and their direct matchups across league history.</div>' +
    '<div class="h2h-select">' +
    '<select id="h2hSelA">' + optsA + '</select>' +
    '<span class="h2h-vs">vs</span>' +
    '<select id="h2hSelB">' + optsB + '</select>' +
    '</div>' +
    '<div id="h2hBody"></div>';
  const selA = document.getElementById('h2hSelA');
  const selB = document.getElementById('h2hSelB');
  selA.addEventListener('change', () => { window._h2hSel.a = selA.value; renderH2HBody(); });
  selB.addEventListener('change', () => { window._h2hSel.b = selB.value; renderH2HBody(); });
  renderH2HBody();
}

function renderH2HBody(){
  const body = document.getElementById('h2hBody');
  if (!body) return;
  const seasonsData = profileSeasonsData();
  const st = window._h2hSel || { a: null, b: null };
  const keyA = st.a;
  const keyB = st.b;
  if (!keyA || !keyB || keyA === keyB) {
    body.innerHTML = '<div class="status">Pick two different managers.</div>';
    return;
  }
  const profA = buildManagerProfile(keyA, seasonsData);
  const profB = buildManagerProfile(keyB, seasonsData);
  if (!profA || !profB) {
    body.innerHTML = '<div class="status">No data for one of the selected managers.</div>';
    return;
  }
  let a2hW = 0, a2hL = 0, a2hT = 0, a2hPF = 0, a2hPA = 0, meetings = 0;
  const games = [];
  seasonsData.forEach(sd => {
    const teams = sd.teams || [];
    const teamKey = {};
    teams.forEach(t => { teamKey[t.id] = resolvedOwnerKey(t); });
    (sd.schedule || []).forEach(g => {
      if (!g || !g.home || !g.away) return;
      const hk = teamKey[g.home.teamId];
      const ak = teamKey[g.away.teamId];
      if (!hk || !ak) return;
      let aSide = null, bSide = null;
      if (hk === keyA && ak === keyB) { aSide = 'home'; bSide = 'away'; }
      else if (hk === keyB && ak === keyA) { aSide = 'away'; bSide = 'home'; }
      else return;
      const aPts = (aSide === 'home' ? g.home.totalPoints : g.away.totalPoints) ?? 0;
      const bPts = (bSide === 'home' ? g.home.totalPoints : g.away.totalPoints) ?? 0;
      if (aPts === 0 && bPts === 0) return;
      meetings++;
      a2hPF += aPts;
      a2hPA += bPts;
      let winSide = null;
      if (g.winner === 'HOME') winSide = 'home';
      else if (g.winner === 'AWAY') winSide = 'away';
      else if (aPts > bPts) winSide = aSide;
      else if (bPts > aPts) winSide = bSide;
      if (winSide === aSide) a2hW++;
      else if (winSide === bSide) a2hL++;
      else a2hT++;
      const isPlayoff = !!(g.playoffTierType && g.playoffTierType !== 'NONE');
      games.push({
        year: sd.year, week: g.matchupPeriodId || 0, playoff: isPlayoff,
        aPts: aPts, bPts: bPts,
        aWon: (winSide === aSide), bWon: (winSide === bSide)
      });
    });
  });
  const fmt = (n, d) => (typeof n === 'number' && isFinite(n)) ? n.toFixed(d === undefined ? 1 : d) : String.fromCharCode(8212);
  const pct = n => (typeof n === 'number' && isFinite(n)) ? (n * 100).toFixed(1) + '%' : String.fromCharCode(8212);
  const rows = [];
  const row = (label, va, vb, higherWins) => {
    let ca = 'h2h-cell-a', cb = 'h2h-cell-b';
    if (typeof higherWins === 'boolean' && va !== vb && va !== null && vb !== null) {
      const aWins = higherWins ? va > vb : va < vb;
      if (aWins) ca += ' h2h-win'; else cb += ' h2h-win';
    }
    return { label, va, vb, ca, cb };
  };
  rows.push(row('Seasons Played', profA.seasonsPlayed, profB.seasonsPlayed, null));
  rows.push(row('Career Record', profA.careerW + '-' + profA.careerL + (profA.careerT ? '-' + profA.careerT : ''), profB.careerW + '-' + profB.careerL + (profB.careerT ? '-' + profB.careerT : ''), null));
  rows.push(row('Win %', pct(profA.careerWinPct), pct(profB.careerWinPct), null));
  rows.push(row('Career Points For', fmt(profA.careerPF), fmt(profB.careerPF), null));
  rows.push(row('Career Points Against', fmt(profA.careerPA), fmt(profB.careerPA), null));
  rows.push(row('Championships', profA.champCount, profB.champCount, true));
  rows.push(row('Top-3 Finishes', profA.top3Count, profB.top3Count, true));
  rows.push(row('Playoff Appearances', profA.playoffCount, profB.playoffCount, true));
  rows.push(row('Toilet Bowls', profA.toiletCount, profB.toiletCount, false));
  rows.push(row('Highest Game', fmt(profA.highGame && profA.highGame.points), fmt(profB.highGame && profB.highGame.points), null));
  const bodyRows = rows.map(r => {
    const va = (r.ca.indexOf('h2h-win') >= 0) ? '<span class="h2h-winmark">' + r.va + '</span>' : r.va;
    const vb = (r.cb.indexOf('h2h-win') >= 0) ? '<span class="h2h-winmark">' + r.vb + '</span>' : r.vb;
    return '<div class="h2h-row">' +
      '<div class="' + r.ca + '">' + va + '</div>' +
      '<div class="h2h-cell-label">' + escapeHtml(r.label) + '</div>' +
      '<div class="' + r.cb + '">' + vb + '</div>' +
      '</div>';
  }).join('');
  let h2hLine;
  if (meetings === 0) {
    h2hLine = '<div class="section-note">These two managers have never faced each other.</div>';
  } else {
    h2hLine = '<div class="h2h-direct">' +
      '<span class="h2h-direct-label">Direct Matchups</span> ' +
      escapeHtml(profA.name) + ' leads ' + a2hW + String.fromCharCode(8211) + a2hL + (a2hT ? String.fromCharCode(8211) + a2hT : '') +
      ' over ' + escapeHtml(profB.name) + ' (' + fmt(a2hPF) + ' PF, ' + fmt(a2hPA) + ' PA across ' + meetings + ' game' + (meetings === 1 ? '' : 's') + ').' +
      '</div>';
  }
  let gamesHtml = '';
  if (games.length) {
    const sorted = games.slice().sort((x, y) => (y.year - x.year) || (y.week - x.week));
    const gameRows = sorted.map(gm => {
      let ca = 'h2h-cell-a', cb = 'h2h-cell-b';
      if (gm.aWon) ca += ' h2h-win';
      else if (gm.bWon) cb += ' h2h-win';
      const tag = gm.playoff ? '<span class="h2h-game-tag">Playoff</span>' : '';
      const mid = 'Season ' + gm.year + ' Wk' + gm.week + tag;
      return '<div class="h2h-row h2h-game">' +
        '<div class="' + ca + '">' + fmt(gm.aPts) + '</div>' +
        '<div class="h2h-cell-label">' + mid + '</div>' +
        '<div class="' + cb + '">' + fmt(gm.bPts) + '</div>' +
        '</div>';
    }).join('');
    gamesHtml = '<div class="h2h-games-title">Every Meeting</div>' + gameRows;
  }
  body.innerHTML =
    h2hLine +
    '<div class="h2h-row h2h-head">' +
    '<div class="h2h-cell-a">' + escapeHtml(profA.name) + '</div>' +
    '<div class="h2h-cell-label"></div>' +
    '<div class="h2h-cell-b">' + escapeHtml(profB.name) + '</div>' +
    '</div>' +
    bodyRows +
    gamesHtml;
}

async function autoLoadHistoryFromCache(){
  const cache = await loadHistoryCache();
  const years = Object.keys(cache)
    .map(Number)
    .filter(y => cache[y] && cache[y].teams && cache[y].teams.length)
    .sort((a, b) => a - b);

  if (!years.length) return; // no cache file yet, or it's empty — nothing to do

  history.loadedSeasons = years;

// Startup: check the static cache first, THEN decide whether the default
// season needs a live fetch — this is what makes selectSeason() cache-first
// even on the very first load, not just on later dropdown changes.
(async function startup(){
  await autoLoadHistoryFromCache();
  updateContextBar();
  // Cache-first default: if the cache already gave us the newest season,
  // trust that single-checked default (2f). Only fetch live when the
  // newest league season isn't cached yet, so we don't end up with two
  // checked seasons (which would grey out single-season views on load).
  if (!history.loadedSeasons.includes(latestLikelySeason)) {
    await selectSeason(latestLikelySeason, false);
    // selectSeason ADDS to checkedSeasons; force the single-newest default
    // so we never start with two checked (which greys single-season views).
    if (history.data[latestLikelySeason]) {
      history.checkedSeasons.add(latestLikelySeason);
      updateContextBar();
    }
  }
  // Always push the newest checked season into state so Standings/Matchups
  // render immediately on load - not just after a manual season pick.
  activateNewestChecked();
})();

// --- Generic client-side table sorter (Task 9) --------------------------
// Opt-in: only <table data-sortable> tables get sortable headers.
// Numeric columns are auto-detected via class="num". Records like 12-4 /
// 12-4-0 and percentages are parsed sensibly; '-' / blank sort last.
(function () {
  function cellText(td) { return (td ? (td.textContent || '') : '').trim(); }

  function toSortValue(text, numeric) {
    var t = text.trim();
    if (t === '' || t === '-' || t === '\u2013' || t === '\u2014') {
      return { empty: true, n: 0, s: '' };
    }
    if (numeric) {
      // Win-loss(-tie) record -> win pct, tiebreak by games played.
      var rec = t.match(/^(\d+)-(\d+)(?:-(\d+))?\$/);
      if (rec) {
        var w = +rec[1], l = +rec[2], ti = rec[3] ? +rec[3] : 0;
        var g = w + l + ti;
        var pct = g ? (w + ti / 2) / g : 0;
        return { empty: false, n: pct * 1000 + g / 100000, s: t };
      }
      // Strip everything except number-ish chars (handles %, commas, +).
      var num = parseFloat(t.replace(/[^0-9.\-]/g, ''));
      if (!isNaN(num)) return { empty: false, n: num, s: t };
      return { empty: false, n: NaN, s: t.toLowerCase() };
    }
    return { empty: false, n: NaN, s: t.toLowerCase() };
  }

  function compare(a, b, numeric, dir) {
    // Empties always sink to the bottom regardless of direction.
    if (a.empty && b.empty) return 0;
    if (a.empty) return 1;
    if (b.empty) return -1; // empties last
    var res;
    if (numeric && !isNaN(a.n) && !isNaN(b.n)) {
      res = a.n - b.n;
    } else {
      res = a.s < b.s ? -1 : (a.s > b.s ? 1 : 0);
    }
    return dir === 'desc' ? -res : res;
  }

  function sortTable(table, thIndex, dir) {
    var head = table.tHead;
    if (!head || !head.rows.length) return;
    var headRow = head.rows[head.rows.length - 1];
    var th = headRow.cells[thIndex];
    if (!th) return;
    var numeric = th.classList.contains('num');
    var body = table.tBodies[0];
    if (!body) return;
    var rows = Array.prototype.slice.call(body.rows);
    var decorated = rows.map(function (row, i) {
      var td = row.cells[thIndex];
      return { row: row, i: i, v: toSortValue(cellText(td), numeric) };
    });
    decorated.sort(function (x, y) {
      var c = compare(x.v, y.v, numeric, dir);
      return c !== 0 ? c : x.i - y.i; // stable
    });
    decorated.forEach(function (d) { body.appendChild(d.row); });

    // Update header arrow indicators.
    for (var k = 0; k < headRow.cells.length; k++) {
      var c = headRow.cells[k];
      c.removeAttribute('data-sort-dir');
      var base = c.getAttribute('data-label');
      if (base !== null) c.textContent = base;
    }
    if (th.getAttribute('data-label') === null) {
      th.setAttribute('data-label', th.textContent);
    }
    th.setAttribute('data-sort-dir', dir);
    th.textContent = th.getAttribute('data-label') + (dir === 'asc' ? ' \u2191' : ' \u2193');
  }

  // Event delegation: works even after tables are re-rendered.
  document.addEventListener('click', function (e) {
    var th = e.target.closest ? e.target.closest('th') : null;
    if (!th) return;
    var table = th.closest ? th.closest('table[data-sortable]') : null;
    if (!table) return;
    var head = table.tHead;
    if (!head || !head.rows.length) return;
    var headRow = head.rows[head.rows.length - 1];
    var thIndex = Array.prototype.indexOf.call(headRow.cells, th);
    if (thIndex < 0) return;
    var cur = th.getAttribute('data-sort-dir');
    var dir = cur === 'asc' ? 'desc' : 'asc';
    sortTable(table, thIndex, dir);
  });
})();

  html += '<span style="background:var(--bg-surface);padding:var(--sp-xs) var(--sp-md);border-radius:4px;font-family:var(--font-mono);">'+o.totalPoints+' pts</span>';
  html += '<span style="background:var(--bg-surface);padding:var(--sp-xs) var(--sp-md);border-radius:4px;font-family:var(--font-mono);">'+o.weeksRostered+' wks</span>';
  html += '<span style="background:var(--bg-surface);padding:var(--sp-xs) var(--sp-md);border-radius:4px;font-family:var(--font-mono);">'+ppw+' pts/wk</span>';
  html += '</div></div>';
  html += '<h3>All Teams \u2014 Best Pickups</h3>';
  html += '<table class="data"><thead><tr><th>Manager</th><th>Player</th><th>Pos</th><th>Wk</th><th>Pts</th><th>Wks</th><th>Pts/Wk</th></tr></thead><tbody>';
  for (const p of bp.perTeam) {
    const nm = teamDisplayName({ primaryOwner: p.ownerKey });
    const pw = (p.totalPoints / p.weeksRostered).toFixed(1);
    html += '<tr><td>'+nm+'</td><td>'+p.playerName+'</td><td>'+(p.posLabel||'—')+'</td><td>'+p.weekAdded+'</td><td><strong>'+p.totalPoints+'</strong></td><td>'+p.weeksRostered+'</td><td>'+pw+'</td></tr>';
  }
  html += '</tbody></table>';
  display.innerHTML = html;
}

function renderWaiversAllTime(display){
  const all = [];
  for (const [year, season] of Object.entries(history.data||{})) {
    const bp = season?.computed?.bestPickup;
    if (!bp) continue;
    all.push({...bp.overall, year});
    for (const p of bp.perTeam.slice(1)) all.push({...p, year});
  }
  all.sort((a,b)=>b.totalPoints-a.totalPoints);
  const top = all.slice(0, 15);
  let html = '<h3>All-Time Best Waiver Pickups</h3><p style="color:var(--text-muted);">Top 15 across all seasons (min 3 weeks rostered)</p>';
  html += '<table class="data"><thead><tr><th>#</th><th>Year</th><th>Manager</th><th>Player</th><th>Pos</th><th>Wk</th><th>Pts</th><th>Wks</th><th>Pts/Wk</th></tr></thead><tbody>';
  top.forEach((p,i) => {
    const nm = teamDisplayName({ primaryOwner: p.ownerKey });
    const pw = (p.totalPoints / p.weeksRostered).toFixed(1);
    html += '<tr><td class="num">'+(i+1)+'</td><td class="num">'+p.year+'</td><td>'+nm+'</td><td>'+p.playerName+'</td><td class="num">'+(p.posLabel||'\u2014')+'</td><td class="num">'+p.weekAdded+'</td><td class="num"><strong>'+p.totalPoints+'</strong></td><td class="num">'+p.weeksRostered+'</td><td class="num">'+pw+'</td></tr>';
  });
  html += '</tbody></table>';
  display.innerHTML = html;
}

function renderBracketForYear(year){
  const display = document.getElementById('bracketDisplay');
  const data = history.data[year] || { teams: state.teams, schedule: state.schedule };
  if (!data || !data.schedule) { display.innerHTML = '<div class="status">No data for '+year+'.</div>'; return; }
  const nameById = {};
  const seedById = {};
  (data.teams||[]).forEach(t => { nameById[t.id] = teamDisplayName(t); seedById[t.id] = t.playoffSeed || 999; });
  const playoffGames = (data.schedule||[]).filter(g => g.playoffTierType === 'WINNERS_BRACKET' && g.home && g.away).sort((a,b) => a.matchupPeriodId - b.matchupPeriodId);
  if (!playoffGames.length) { display.innerHTML = '<div class="status">No playoff games found for '+year+'.</div>'; return; }
  const byWeek = {};
  playoffGames.forEach(g => { const wk = g.matchupPeriodId; if (!byWeek[wk]) byWeek[wk] = []; byWeek[wk].push(g); });
  const weeks = Object.keys(byWeek).map(Number).sort((a,b)=>a-b);
  const roundNames = weeks.length === 3 ? ['Quarterfinals', 'Semifinals', 'Championship'] : weeks.length === 2 ? ['Semifinals', 'Championship'] : weeks.map((_,i) => 'Round ' + (i+1));

  // Detect bye team: #1 seed that doesn't appear in first round but appears in second
  let byeHtml = '';
  if (weeks.length >= 2) {
    const firstRoundTeamIds = new Set();
    (byWeek[weeks[0]]||[]).forEach(g => { firstRoundTeamIds.add(g.home.teamId); firstRoundTeamIds.add(g.away.teamId); });
    const secondRoundTeamIds = new Set();
    (byWeek[weeks[1]]||[]).forEach(g => { secondRoundTeamIds.add(g.home.teamId); secondRoundTeamIds.add(g.away.teamId); });
    // Bye team is in round 2 but not round 1
    secondRoundTeamIds.forEach(id => {
      if (!firstRoundTeamIds.has(id) && seedById[id] <= 2) {
        const byeName = nameById[id] || 'Team '+id;
        byeHtml = '<div class="bracket-bye"><span class="bye-seed">#' + seedById[id] + '</span> <span class="winner">' + escapeHtml(byeName) + '</span> <span class="bye-label">BYE</span></div>';
      }
    });
  }

  let html = '';
  weeks.forEach((wk, idx) => {
    html += '<div class="bracket-round"><h3>' + roundNames[idx] + ' (Week ' + wk + ')</h3>';
    if (idx === 0 && byeHtml) html += byeHtml;
    byWeek[wk].forEach(g => {
      const hp = g.home.totalPoints ?? 0, ap = g.away.totalPoints ?? 0;
      const hName = nameById[g.home.teamId] || 'Team '+g.home.teamId;
      const aName = nameById[g.away.teamId] || 'Team '+g.away.teamId;
      const hSeed = seedById[g.home.teamId], aSeed = seedById[g.away.teamId];
      const hWon = g.winner === 'HOME', aWon = g.winner === 'AWAY';
      const undecided = !g.winner || g.winner === 'UNDECIDED';
      html += '<div class="bracket-game">';
      html += '<div class="team-left ' + (hWon?'winner':aWon?'loser':'') + '"><span class="bracket-seed">#'+hSeed+'</span> ' + escapeHtml(hName) + ((!undecided) ? ' <span class="score' + (hWon?' score-win':'') + '">' + hp.toFixed(1) + '</span>' : '') + '</div>';
      html += '<div class="vs-col">' + (undecided ? 'vs' : '\u2014') + '</div>';
      html += '<div class="team-right ' + (aWon?'winner':hWon?'loser':'') + '">' + ((!undecided) ? '<span class="score' + (aWon?' score-win':'') + '">' + ap.toFixed(1) + '</span> ' : '') + escapeHtml(aName) + ' <span class="bracket-seed">#'+aSeed+'</span></div>';
      html += '</div>';
    });
    html += '</div>';
  });
  display.innerHTML = html;
}

function renderCeremonyForYear(year){
  const display = document.getElementById('ceremonyDisplay');
  const data = history.data[year];
  if (!data || !data.teams) { display.innerHTML = '<div class="status">No data for '+year+'.</div>'; return; }
  const teams = data.teams || [], schedule = data.schedule || [], settings = data.settings || {};
  const p = seasonPlacements(data);
  let champHtml = '';
  if (p) {
    const champTeam = teams.find(t => t.id === p.champion);
    const champName = champTeam ? teamDisplayName(champTeam) : 'Unknown';
    const rec = champTeam?.record?.overall;
    champHtml = '<div class="ceremony-champ"><div class="ceremony-champ-trophy">\u{1f3c6}</div><div class="ceremony-champ-name">' + escapeHtml(champName) + '</div><div class="ceremony-champ-sub">' + year + ' League Champion' + (rec ? ' \u00b7 ' + (rec.wins||0) + '-' + (rec.losses||0) : '') + '</div></div>';
  }
  const awards = computeAwards(year, teams, schedule, settings) || [];
  let awardsHtml = '<div class="ceremony-section"><h3>Season Awards</h3>';
  if (awards.length) {
    awardsHtml += awards.map(a => '<div class="ceremony-award"><span class="ceremony-award-emoji">' + a.emoji + '</span><span class="ceremony-award-title">' + escapeHtml(a.title) + '</span><span class="ceremony-award-winner">' + escapeHtml(a.winner) + '</span><span class="ceremony-award-detail">' + escapeHtml(a.detail || '') + '</span></div>').join('');
  } else {
    awardsHtml += '<div class="status">No awards computed for ' + year + '.</div>';
  }
  awardsHtml += '</div>';
  display.innerHTML = champHtml + awardsHtml;
}



// ========== TRENDS TAB (season-over-season sparklines) ==========
async function renderTrendsTab(){
  if (!history.data || !Object.keys(history.data).length) {
    trendsView.innerHTML = '<div class="status">Loading...</div>';
    const cache = await loadHistoryCache();
    if (cache && Object.keys(cache).length) Object.assign(history.data, cache);
  }
  const allYears = Object.keys(history.data||{}).map(Number).sort((a,b)=>a-b);
  if (allYears.length < 2) { trendsView.innerHTML = '<div class="status">Need at least 2 seasons of data for trends.</div>'; return; }

  // Build per-owner season-over-season data
  const ownerData = {}; // ownerKey -> { name, seasons: [{year, winPct, avgPts, finish}] }
  allYears.forEach(yr => {
    const s = history.data[yr];
    if (!s || !s.teams) return;
    const teams = s.teams || [];
    const schedule = s.schedule || [];
    // Compute avg points per team for the season
    const teamPts = {};
    schedule.forEach(g => {
      if (!g.winner || g.winner === 'UNDECIDED' || !g.home || !g.away) return;
      [[g.home.teamId, g.home.totalPoints||0],[g.away.teamId, g.away.totalPoints||0]].forEach(([tid,pts]) => {
        if (!teamPts[tid]) teamPts[tid] = { total:0, games:0 };
        teamPts[tid].total += pts; teamPts[tid].games++;
      });
    });
    // Sort by wins for finish position
    const sorted = [...teams].sort((a,b) => {
      const aw = a.record?.overall?.wins||0, bw = b.record?.overall?.wins||0;
      if (bw !== aw) return bw - aw;
      return ((b.record?.overall?.pointsFor||0) - (a.record?.overall?.pointsFor||0));
    });
    teams.forEach(t => {
      const key = resolvedOwnerKey(t);
      const name = teamDisplayName(t);
      if (!ownerData[key]) ownerData[key] = { name, seasons: [] };
      const rec = t.record?.overall || {};
      const gp = (rec.wins||0)+(rec.losses||0)+(rec.ties||0);
      const winPct = gp > 0 ? (rec.wins||0)/gp : 0;
      const tp = teamPts[t.id];
      const avgPts = tp && tp.games > 0 ? tp.total/tp.games : 0;
      const finish = sorted.indexOf(t) + 1;
      ownerData[key].seasons.push({ year: yr, winPct, avgPts, finish });
    });
  });

  // Build sparkline SVG helper
  function trendSparkline(values, color, W, H) {
    if (!values || values.length < 2) return '';
    const min = Math.min(...values), max = Math.max(...values);
    const span = (max - min) || 1;
    const step = W / (values.length - 1);
    const pts = values.map((v, i) => (i * step).toFixed(1) + ',' + (H - ((v - min) / span) * (H - 4) - 2).toFixed(1)).join(' ');
    return '<svg width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'" style="vertical-align:middle;"><polyline points="'+pts+'" fill="none" stroke="'+color+'" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  }

  // Sort owners by most recent winPct
  const owners = Object.values(ownerData).filter(o => o.seasons.length >= 2).sort((a,b) => {
    const aLast = a.seasons[a.seasons.length-1].winPct;
    const bLast = b.seasons[b.seasons.length-1].winPct;
    return bLast - aLast;
  });

  const yearLabels = allYears.map(y => '<th class="num">' + String(y).slice(2) + '</th>').join('');

  let html = '<h2 class="section-title">Season-over-Season Trends</h2>';
  html += '<p class="section-note">' + allYears.length + ' seasons (' + allYears[0] + '\u2013' + allYears[allYears.length-1] + ')</p>';

  // Win% trends
  html += '<h3>Win %</h3><table class="data trends-table"><thead><tr><th>#</th><th>Manager</th><th>Trend</th>' + yearLabels + '<th>Curr</th></tr></thead><tbody>';
  owners.forEach(o => {
    const pcts = allYears.map(yr => { const s = o.seasons.find(x=>x.year===yr); return s ? s.winPct : null; });
    const validPcts = pcts.filter(v=>v!==null);
    const spark = trendSparkline(validPcts, 'var(--amber, #d9a441)', 80, 22);
    const curr = validPcts.length ? (validPcts[validPcts.length-1]*100).toFixed(0)+'%' : '\u2014';
    const cells = pcts.map(v => '<td class="num" style="text-align:center;">' + (v !== null ? (v*100).toFixed(0) : '\u2014') + '</td>').join('');
    html += '<tr><td class="rank">' + (owners.indexOf(o)+1) + '</td><td class="team-name">' + escapeHtml(o.name) + '</td><td>' + spark + '</td>' + cells + '<td class="num" style="font-weight:600;">' + curr + '</td></tr>';
  });
  html += '</tbody></table>';

  // Avg Points trends
  html += '<h3>Avg Points / Game</h3><table class="data trends-table"><thead><tr><th>#</th><th>Manager</th><th>Trend</th>' + yearLabels + '<th>Curr</th></tr></thead><tbody>';
  owners.forEach(o => {
    const pts = allYears.map(yr => { const s = o.seasons.find(x=>x.year===yr); return s ? s.avgPts : null; });
    const validPts = pts.filter(v=>v!==null);
    const spark = trendSparkline(validPts, '#4fc3f7', 80, 22);
    const curr = validPts.length ? validPts[validPts.length-1].toFixed(1) : '\u2014';
    const cells = pts.map(v => '<td class="num" style="text-align:center;">' + (v !== null ? v.toFixed(0) : '\u2014') + '</td>').join('');
    html += '<tr><td class="rank">' + (owners.indexOf(o)+1) + '</td><td class="team-name">' + escapeHtml(o.name) + '</td><td>' + spark + '</td>' + cells + '<td class="num" style="font-weight:600;">' + curr + '</td></tr>';
  });
  html += '</tbody></table>';

  // Finish position trends (lower is better, invert sparkline)
  html += '<h3>Finish Position</h3><table class="data trends-table"><thead><tr><th>#</th><th>Manager</th><th>Trend</th>' + yearLabels + '<th>Curr</th></tr></thead><tbody>';
  owners.forEach(o => {
    const fins = allYears.map(yr => { const s = o.seasons.find(x=>x.year===yr); return s ? s.finish : null; });
    const validFins = fins.filter(v=>v!==null);
    // Invert for sparkline (lower finish = higher line)
    const inverted = validFins.map(v => 13 - v);
    const spark = trendSparkline(inverted, '#81c784', 80, 22);
    const curr = validFins.length ? '#' + validFins[validFins.length-1] : '\u2014';
    const cells = fins.map(v => '<td class="num" style="text-align:center;">' + (v !== null ? v : '\u2014') + '</td>').join('');
    html += '<tr><td class="rank">' + (owners.indexOf(o)+1) + '</td><td class="team-name">' + escapeHtml(o.name) + '</td><td>' + spark + '</td>' + cells + '<td class="num" style="font-weight:600;">' + curr + '</td></tr>';
  });
  html += '</tbody></table>';

  trendsView.innerHTML = html;
}

</script>
