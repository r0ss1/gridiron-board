<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Gridiron Board — League Tracker</title>
<meta name="theme-color" content="#0C1712">
<meta name="description" content="A scoreboard for your ESPN fantasy football league.">

<!-- PWA hookup -->
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:#0C1712;
    --surface:#151F19;
    --surface-2:#1B2820;
    --line:#25352C;
    --ink:#F4F2EA;
    --ink-dim:#8FA097;
    --amber:#F0A845;
    --win:#5FB884;
    --loss:#D3684F;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter', sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    padding-bottom:56px;
  }
  .wrap{max-width:760px;margin:0 auto;padding:0 20px;}
  a{color:inherit;}

  /* Header */
  header.board{
    padding:28px 0 20px;
    border-bottom:1px solid var(--line);
  }
  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    letter-spacing:.1em;
    color:var(--amber);
    text-transform:uppercase;
  }
  h1{
    font-family:'Oswald', sans-serif;
    font-weight:600;
    font-size:clamp(26px, 6vw, 36px);
    margin:2px 0 4px;
    letter-spacing:.01em;
    line-height:1.05;
  }
  .week-chip{
    display:block;
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    color:var(--ink-dim);
  }
  .week-chip strong{color:var(--ink); font-weight:500;}

  /* Controls */
  .controls{
    display:flex;
    align-items:flex-end;
    gap:8px;
    flex-wrap:wrap;
    margin-top:20px;
  }
  .field{display:flex; flex-direction:column; gap:5px;}
  .field label{
    font-family:'JetBrains Mono', monospace;
    font-size:10px;
    letter-spacing:.07em;
    text-transform:uppercase;
    color:var(--ink-dim);
  }
  input, select{
    background:var(--surface);
    border:1px solid var(--line);
    color:var(--ink);
    font-family:'Inter', sans-serif;
    font-size:14px;
    padding:9px 11px;
    border-radius:8px;
    min-width:110px;
    height:38px;
  }
  input::placeholder{color:var(--ink-dim);}
  input:focus, select:focus, button:focus-visible{
    outline:2px solid var(--amber);
    outline-offset:1px;
  }

  /* Buttons — one system, three variants */
  .btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    height:38px;
    padding:0 18px;
    border-radius:8px;
    font-family:'Inter', sans-serif;
    font-weight:600;
    font-size:13px;
    cursor:pointer;
    border:1px solid transparent;
    white-space:nowrap;
  }
  .btn-primary{background:var(--amber); color:#1A1200; border-color:var(--amber);}
  .btn-primary:hover{filter:brightness(1.06);}
  .btn-primary:disabled{opacity:.5; cursor:not-allowed; filter:none;}
  .btn-ghost{background:transparent; color:var(--ink-dim); border-color:var(--line);}
  .btn-ghost:hover{color:var(--ink); border-color:var(--ink-dim);}
  .btn-text{
    height:auto; padding:0;
    background:none; color:var(--ink-dim);
    font-weight:500; font-size:13px;
    text-decoration:underline; text-underline-offset:3px; text-decoration-color:var(--line);
  }
  .btn-text:hover{color:var(--amber); text-decoration-color:var(--amber);}

  .cred-toggle-row{margin-top:14px;}
  .cred-fields{margin-top:14px; padding-top:14px; border-top:1px solid var(--line);}

  /* Tabs */
  nav.tabs{
    display:flex;
    gap:22px;
    margin:28px 0 18px;
    border-bottom:1px solid var(--line);
    overflow-x:auto;
    scrollbar-width:none;
  }
  nav.tabs::-webkit-scrollbar{display:none;}
  nav.tabs button{
    background:none;
    border:none;
    color:var(--ink-dim);
    font-family:'Oswald', sans-serif;
    font-size:14px;
    letter-spacing:.01em;
    padding:9px 1px 11px;
    cursor:pointer;
    border-bottom:2px solid transparent;
    white-space:nowrap;
    flex:none;
  }
  nav.tabs button.active{color:var(--ink); border-bottom-color:var(--amber);}

  /* Status / errors */
  .status{
    font-family:'Inter', sans-serif;
    font-size:13px;
    color:var(--ink-dim);
    padding:16px 0;
  }
  .error{
    background:var(--surface);
    border-left:3px solid var(--loss);
    border-radius:0 8px 8px 0;
    padding:14px 16px;
    font-size:13px;
    line-height:1.55;
    color:var(--ink);
  }
  .error strong{color:var(--loss);}

  /* Standings table */
  table{width:100%; border-collapse:collapse; margin-bottom:28px;}
  thead th{
    text-align:left;
    font-family:'JetBrains Mono', monospace;
    font-size:10px;
    letter-spacing:.07em;
    text-transform:uppercase;
    color:var(--ink-dim);
    padding:0 10px 10px;
    font-weight:500;
  }
  thead th.num, td.num{text-align:right;}
  tbody td{
    padding:13px 10px;
    border-top:1px solid var(--line);
    font-size:13px;
  }
  tbody tr:first-child td{border-top:none;}
  .rank{font-family:'JetBrains Mono', monospace; color:var(--ink-dim); width:26px;}
  .team-name{font-weight:600;}
  .team-id{font-family:'JetBrains Mono', monospace; font-weight:400; font-size:11px; color:var(--ink-dim);}
  td.num{font-family:'JetBrains Mono', monospace;}
  .rec{white-space:nowrap;}

  /* Matchups */
  .matchup{
    background:var(--surface);
    border-radius:var(--radius);
    padding:16px 18px;
    margin-bottom:10px;
    display:grid;
    grid-template-columns:1fr auto 1fr;
    align-items:center;
    gap:14px;
  }
  .side{display:flex; flex-direction:column; gap:3px;}
  .side.right{text-align:right; align-items:flex-end;}
  .side .nm{font-weight:600; font-size:13px;}
  .side .pts{font-family:'JetBrains Mono', monospace; font-size:22px; font-weight:700;}
  .side.win .pts{color:var(--win);}
  .side.lose .pts{color:var(--ink-dim);}
  .vs{font-family:'Oswald', sans-serif; color:var(--ink-dim); font-size:11px;}

  /* Power rankings */
  .chart-wrap{
    background:var(--surface);
    border-radius:var(--radius);
    padding:18px 16px 14px;
    margin-bottom:16px;
    overflow-x:auto;
  }
  .chart-wrap svg{display:block; min-width:520px;}
  .legend{
    display:flex;
    flex-wrap:wrap;
    gap:8px 16px;
    margin-top:14px;
    font-family:'Inter', sans-serif;
    font-size:11px;
    color:var(--ink-dim);
  }
  .legend-item{display:flex; align-items:center; gap:6px;}
  .legend-swatch{width:9px; height:9px; border-radius:50%; flex:none;}
  .power-score{font-family:'JetBrains Mono', monospace;}
  .trend{font-family:'JetBrains Mono', monospace; font-size:12px;}
  .trend.up{color:var(--win);}
  .trend.down{color:var(--loss);}
  .trend.flat{color:var(--ink-dim);}

  /* Awards */
  .award-grid{
    display:grid;
    grid-template-columns:1fr;
    gap:10px;
    margin-bottom:20px;
  }
  .award-card{
    background:var(--surface);
    border-radius:var(--radius);
    padding:16px 18px;
    display:grid;
    grid-template-columns:auto 1fr;
    gap:14px;
    align-items:center;
  }
  .award-emoji{font-size:26px; line-height:1;}
  .award-title{
    font-family:'Oswald', sans-serif;
    font-weight:600;
    font-size:15px;
    letter-spacing:.01em;
  }
  .award-desc{font-size:11px; color:var(--ink-dim); margin-top:1px;}
  .award-winner{font-weight:600; font-size:14px; margin-top:6px;}
  .award-detail{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    color:var(--ink-dim);
    margin-top:2px;
  }

  /* History */
  .season-picker{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    margin:16px 0 24px;
  }
  .season-chip{
    display:inline-flex;
    align-items:center;
    gap:6px;
    background:var(--surface);
    border-radius:20px;
    padding:6px 12px 6px 9px;
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    color:var(--ink-dim);
    cursor:pointer;
    user-select:none;
  }
  .season-chip:has(input:checked){color:var(--ink); background:var(--surface-2);}
  .season-chip input{margin:0; accent-color:var(--amber);}
  h2.section-title{
    font-family:'Oswald', sans-serif;
    font-weight:500;
    font-size:17px;
    letter-spacing:.01em;
    margin:0 0 6px;
  }
  .section-note{
    font-size:12px;
    color:var(--ink-dim);
    margin:0 0 14px;
    line-height:1.55;
  }
  table.h2h{font-size:11px;}
  table.h2h th, table.h2h td{padding:9px 10px; white-space:nowrap;}
  table.h2h th.rowhead, table.h2h td.rowhead{
    text-align:left;
    font-weight:600;
    position:sticky;
    left:0;
    background:var(--bg);
  }
  table.h2h td.diag{color:var(--ink-dim);}
  .h2h-scroll{overflow-x:auto; margin-bottom:30px; border-radius:var(--radius);}

  footer{
    text-align:center;
    color:var(--ink-dim);
    font-family:'Inter', sans-serif;
    font-size:11px;
    margin-top:36px;
  }

  @media (prefers-reduced-motion: reduce){ *{transition:none !important;} }
</style>
</head>
<body>

<header class="board">
  <div class="wrap">
    <span class="eyebrow">Fantasy Football</span>
    <h1 id="leagueTitle">Gridiron Board</h1>
    <span class="week-chip" id="weekChip"></span>

    <div class="controls">
      <div class="field">
        <label for="leagueId">League ID</label>
        <input id="leagueId" inputmode="numeric" value="232506">
      </div>
      <div class="field">
        <label for="season">Season</label>
        <select id="season"></select>
      </div>
      <button class="btn btn-primary" id="loadBtn">Load league</button>
    </div>

    <div class="cred-toggle-row">
      <button type="button" id="credToggle" class="btn-text">ESPN login (for private / pre-2019 seasons)</button>
    </div>
    <div id="credFields" class="cred-fields" style="display:none;">
      <p class="section-note">Saved only in this browser, never in your GitHub repo. Get these by logging into fantasy.espn.com on a computer, opening dev tools → Application → Cookies, and copying the <code>espn_s2</code> and <code>SWID</code> values.</p>
      <div class="controls" style="margin-top:0;">
        <div class="field">
          <label for="espnS2Input">espn_s2</label>
          <input id="espnS2Input" type="password" autocomplete="off" style="min-width:200px;">
        </div>
        <div class="field">
          <label for="swidInput">SWID</label>
          <input id="swidInput" type="password" autocomplete="off" style="min-width:160px;">
        </div>
        <button class="btn btn-primary" id="credSaveBtn" type="button">Save</button>
        <button type="button" id="credClearBtn" class="btn btn-ghost">Clear</button>
      </div>
      <p class="section-note" id="credStatus"></p>
    </div>
  </div>
</header>

<div class="wrap">
  <nav class="tabs">
    <button data-tab="standings" class="active">Standings</button>
    <button data-tab="matchups">Matchups</button>
    <button data-tab="power">Power Rankings</button>
    <button data-tab="awards">Awards</button>
    <button data-tab="history">History</button>
  </nav>

  <div id="statusArea"></div>
  <div id="standingsView"></div>
  <div id="matchupsView" style="display:none;"></div>
  <div id="powerView" style="display:none;"></div>
  <div id="awardsView" style="display:none;"></div>
  <div id="historyView" style="display:none;">
    <div class="controls" style="margin-top:0;">
      <div class="field">
        <label for="histFrom">From season</label>
        <input id="histFrom" inputmode="numeric">
      </div>
      <div class="field">
        <label for="histTo">To season</label>
        <input id="histTo" inputmode="numeric">
      </div>
      <button class="btn btn-primary" id="histLoadBtn">Fetch history</button>
      <button type="button" id="histDownloadBtn" class="btn btn-ghost">Download cache file</button>
    </div>
    <div id="historyStatus" class="status"></div>
    <div id="historyContent"></div>
  </div>

  <footer>Data from ESPN's public fantasy API · not affiliated with ESPN</footer>
</div>

<script>
const leagueIdInput = document.getElementById('leagueId');
const seasonSelect = document.getElementById('season');
const loadBtn = document.getElementById('loadBtn');
const credToggle = document.getElementById('credToggle');
const credFields = document.getElementById('credFields');
const espnS2Input = document.getElementById('espnS2Input');
const swidInput = document.getElementById('swidInput');
const credSaveBtn = document.getElementById('credSaveBtn');
const credClearBtn = document.getElementById('credClearBtn');
const credStatus = document.getElementById('credStatus');
const statusArea = document.getElementById('statusArea');
const standingsView = document.getElementById('standingsView');
const matchupsView = document.getElementById('matchupsView');
const powerView = document.getElementById('powerView');
const awardsView = document.getElementById('awardsView');
const historyView = document.getElementById('historyView');
const histFromInput = document.getElementById('histFrom');
const histToInput = document.getElementById('histTo');
const histLoadBtn = document.getElementById('histLoadBtn');
const histDownloadBtn = document.getElementById('histDownloadBtn');
const historyStatus = document.getElementById('historyStatus');
const historyContent = document.getElementById('historyContent');
const leagueTitle = document.getElementById('leagueTitle');
const weekChip = document.getElementById('weekChip');

// Build season dropdown: most recently completed season defaults selected.
// NFL seasons run roughly Sep -> Feb, so before ~August the "current" season
// on ESPN is still last year's completed one.
const now = new Date();
const currentCalendarYear = now.getFullYear();
const seasonInProgressCutoffMonth = 8; // August (1-indexed) - rough heuristic
const latestLikelySeason = now.getMonth() + 1 >= seasonInProgressCutoffMonth
  ? currentCalendarYear
  : currentCalendarYear - 1;

for (let y = latestLikelySeason + 1; y >= latestLikelySeason - 4; y--) {
  const opt = document.createElement('option');
  opt.value = y;
  opt.textContent = y;
  if (y === latestLikelySeason) opt.selected = true;
  seasonSelect.appendChild(opt);
}

// Pre-2019 seasons now route through ESPN's older leagueHistory endpoint
// (see the proxy function) — this floor is just a sane default range, not
// a hard limit. Type any earlier year in "From season" if your league goes
// back further.
const HISTORY_DEFAULT_LOOKBACK = 9;
histToInput.value = latestLikelySeason;
histFromInput.value = latestLikelySeason - HISTORY_DEFAULT_LOOKBACK;

// ---------------------------------------------------------------
// Rename any team here — keys are ESPN's internal team ID, which stays
// stable for a franchise slot across seasons even if the owner renames
// their team in ESPN every year. Find each team's ID in the small "#" tag
// next to their name on the Standings tab. Teams left out just show
// whatever name ESPN has for them that season.
//
// This is just the fallback/default set, edited by hand in code. The
// easier way to manage renames day-to-day is data/team-names.json — it's
// loaded automatically on startup and overrides anything set here, and
// it's plain JSON so it's editable straight on GitHub's website, no code
// required. See loadTeamNameOverrides() below.
// ---------------------------------------------------------------
const TEAM_NAME_OVERRIDES = {
  // 1: "The Gridiron Gurus",
  // 4: "Waiver Wire Wizards",
};

let state = { teams: [], schedule: [], currentWeek: null, leagueName: '', seasonYear: null, settings: {} };
let history = { data: {}, loadedSeasons: [], checkedSeasons: new Set() };

function setTab(name){
  document.querySelectorAll('nav.tabs button').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
  standingsView.style.display = name === 'standings' ? '' : 'none';
  matchupsView.style.display = name === 'matchups' ? '' : 'none';
  powerView.style.display = name === 'power' ? '' : 'none';
  awardsView.style.display = name === 'awards' ? '' : 'none';
  historyView.style.display = name === 'history' ? '' : 'none';
}
document.querySelectorAll('nav.tabs button').forEach(b => b.addEventListener('click', () => setTab(b.dataset.tab)));

function teamDisplayName(t){
  if (TEAM_NAME_OVERRIDES[t.id] !== undefined) return TEAM_NAME_OVERRIDES[t.id];
  if (t.name) return t.name;
  const loc = t.location || '';
  const nick = t.nickname || '';
  return (loc + ' ' + nick).trim() || ('Team ' + t.id);
}

// Loads data/team-names.json (a plain {"<espnTeamId>": "Custom Name"} map)
// and merges it into TEAM_NAME_OVERRIDES — its entries win over anything
// hardcoded above. Missing file, empty file, or invalid JSON all just mean
// "no overrides from the file" rather than an error. Since this can finish
// after the first render, it re-renders whatever's already on screen so
// names update immediately rather than needing a manual reload.
async function loadTeamNameOverrides(){
  try {
    const res = await fetch('./data/team-names.json');
    if (!res.ok) return;
    const map = await res.json();
    if (!map || typeof map !== 'object') return;
    Object.assign(TEAM_NAME_OVERRIDES, map);
  } catch (e) {
    return; // no file yet, or it's malformed — fall back silently
  }

  if (state.teams.length) { renderStandings(); renderMatchups(); }
  renderPowerRankings();
  renderAwards();
  if (history.loadedSeasons.length) renderHistoryContent();
}
loadTeamNameOverrides();

// ---------------------------------------------------------------
// ESPN login (optional). Only used for private leagues or pre-2019
// seasons, which now require it. Stored in this browser's localStorage
// only — never written to any file, so it's safe even though this repo
// is public. It works once this page is actually deployed (e.g. to
// Netlify); it won't persist inside Claude's in-chat preview.
// ---------------------------------------------------------------
const CRED_KEY_S2 = 'gridironEspnS2';
const CRED_KEY_SWID = 'gridironSwid';

function getCreds(){
  try {
    return {
      espnS2: localStorage.getItem(CRED_KEY_S2) || '',
      swid: localStorage.getItem(CRED_KEY_SWID) || '',
    };
  } catch (e) {
    return { espnS2: '', swid: '' }; // storage blocked (e.g. sandboxed preview)
  }
}

function credHeaders(){
  const c = getCreds();
  return (c.espnS2 && c.swid) ? { 'X-Espn-S2': c.espnS2, 'X-Espn-Swid': c.swid } : {};
}

(function initCredPanel(){
  const c = getCreds();
  espnS2Input.value = c.espnS2;
  swidInput.value = c.swid;
  if (c.espnS2 && c.swid) {
    credStatus.textContent = 'Login saved in this browser.';
    credFields.style.display = '';
  }

  credToggle.addEventListener('click', () => {
    credFields.style.display = credFields.style.display === 'none' ? '' : 'none';
  });

  credSaveBtn.addEventListener('click', () => {
    try {
      localStorage.setItem(CRED_KEY_S2, espnS2Input.value.trim());
      localStorage.setItem(CRED_KEY_SWID, swidInput.value.trim());
      credStatus.textContent = 'Saved. Try loading the league or fetching history again.';
    } catch (e) {
      credStatus.textContent = 'Could not save — this browser/preview is blocking local storage.';
    }
  });

  credClearBtn.addEventListener('click', () => {
    try {
      localStorage.removeItem(CRED_KEY_S2);
      localStorage.removeItem(CRED_KEY_SWID);
    } catch (e) {}
    espnS2Input.value = '';
    swidInput.value = '';
    credStatus.textContent = 'Cleared.';
  });
})();

async function loadLeague(){
  const leagueId = leagueIdInput.value.trim();
  const season = seasonSelect.value;
  if (!leagueId) { statusArea.innerHTML = '<div class="error">Enter a league ID.</div>'; return; }

  loadBtn.disabled = true;
  statusArea.innerHTML = '<div class="status">Loading league ' + leagueId + ' (' + season + ')…</div>';

  // Goes through our own Worker (src/worker.js), which handles /api/*
  // because ESPN's API doesn't send CORS headers, so the browser can't call
  // it directly. The proxy makes the request server-side instead.
  const proxyUrl = '/api/espn-proxy?leagueId=' + encodeURIComponent(leagueId) +
                    '&season=' + encodeURIComponent(season);

  try {
    const res = await fetch(proxyUrl, { headers: { 'Accept': 'application/json', ...credHeaders() } });

    if (res.status === 401 || res.status === 403) {
      statusArea.innerHTML = privateLeagueMessage();
      loadBtn.disabled = false;
      return;
    }
    if (res.status === 404) {
      statusArea.innerHTML = '<div class="error"><strong>Proxy function not found.</strong> ' +
        'This page needs to be deployed to Cloudflare Workers (with wrangler.jsonc and src/worker.js intact) for ' +
        'league data to load — opening index.html directly, or hosting on plain GitHub Pages, won\'t run ' +
        'the proxy. See the README for deploy steps.</div>';
      loadBtn.disabled = false;
      return;
    }
    if (!res.ok) {
      statusArea.innerHTML = '<div class="error"><strong>Error ' + res.status + '.</strong> ' +
        'Double check the league ID and season. If the season hasn\'t started yet, ESPN may not have data for it.</div>';
      loadBtn.disabled = false;
      return;
    }

    const data = await res.json();
    state.teams = data.teams || [];
    state.schedule = data.schedule || [];
    state.currentWeek = (data.status && data.status.currentMatchupPeriod) || null;
    state.leagueName = (data.settings && data.settings.name) || 'Gridiron Board';
    state.seasonYear = parseInt(season, 10);
    state.settings = data.settings || {};

    leagueTitle.textContent = state.leagueName;
    weekChip.innerHTML = state.currentWeek
      ? 'Week <strong>' + state.currentWeek + '</strong> · ' + state.teams.length + ' teams'
      : state.teams.length + ' teams';

    renderStandings();
    renderMatchups();
    renderPowerRankings();
    renderAwards();
    statusArea.innerHTML = '';
  } catch (err) {
    statusArea.innerHTML = '<div class="error"><strong>Couldn\'t reach the proxy.</strong> ' +
      'Check your internet connection, or make sure this app is deployed to Netlify (see README) ' +
      'rather than opened as a local file.</div>';
  } finally {
    loadBtn.disabled = false;
  }
}

function privateLeagueMessage(){
  return '<div class="error"><strong>This league looks private.</strong><br>' + privateLeagueMessageInner() + '</div>';
}
function privateLeagueMessageInner(){
  return 'Add your ESPN login in the "ESPN login" panel above (log into fantasy.espn.com on a computer, ' +
    'copy the <code>espn_s2</code> and <code>SWID</code> cookies from dev tools, paste them in, Save) — ' +
    'that lets the app prove it\'s you. Or ask your commissioner to set the league to public under League Settings.';
}

function renderStandings(){
  const sorted = [...state.teams].sort((a, b) => {
    const ra = a.record?.overall || {};
    const rb = b.record?.overall || {};
    if ((rb.wins||0) !== (ra.wins||0)) return (rb.wins||0) - (ra.wins||0);
    return (rb.pointsFor||0) - (ra.pointsFor||0);
  });

  let rows = sorted.map((t, i) => {
    const r = t.record?.overall || {};
    const rec = [r.wins||0, r.losses||0, r.ties||0].join('-');
    return '<tr>' +
      '<td class="rank">' + (i+1) + '</td>' +
      '<td class="team-name">' + escapeHtml(teamDisplayName(t)) + ' <span class="team-id">#' + t.id + '</span></td>' +
      '<td class="num rec">' + rec + '</td>' +
      '<td class="num">' + (r.pointsFor ?? 0).toFixed(1) + '</td>' +
      '<td class="num">' + (r.pointsAgainst ?? 0).toFixed(1) + '</td>' +
      '</tr>';
  }).join('');

  standingsView.innerHTML = state.teams.length ? (
    '<table><thead><tr>' +
    '<th></th><th>Team</th><th class="num">Record</th><th class="num">PF</th><th class="num">PA</th>' +
    '</tr></thead><tbody>' + rows + '</tbody></table>'
  ) : '';
}

function renderMatchups(){
  const teamsById = {};
  state.teams.forEach(t => teamsById[t.id] = t);

  const week = state.currentWeek;
  const games = state.schedule.filter(g => g.matchupPeriodId === week);

  if (!games.length) {
    matchupsView.innerHTML = '<div class="status">No matchup data for this week yet.</div>';
    return;
  }

  matchupsView.innerHTML = games.map(g => {
    const home = g.home, away = g.away;
    if (!home || !away) return '';
    const homeTeam = teamsById[home.teamId];
    const awayTeam = teamsById[away.teamId];
    const homePts = home.totalPoints ?? 0;
    const awayPts = away.totalPoints ?? 0;
    const homeWin = homePts > awayPts;
    const awayWin = awayPts > homePts;
    return '<div class="matchup">' +
      '<div class="side ' + (homeWin?'win':(awayWin?'lose':'')) + '">' +
        '<span class="nm">' + escapeHtml(homeTeam ? teamDisplayName(homeTeam) : 'TBD') + '</span>' +
        '<span class="pts">' + homePts.toFixed(1) + '</span>' +
      '</div>' +
      '<span class="vs">VS</span>' +
      '<div class="side right ' + (awayWin?'win':(homeWin?'lose':'')) + '">' +
        '<span class="nm">' + escapeHtml(awayTeam ? teamDisplayName(awayTeam) : 'TBD') + '</span>' +
        '<span class="pts">' + awayPts.toFixed(1) + '</span>' +
      '</div>' +
    '</div>';
  }).join('');
}

// Collects each team's score for every *completed* week (skips the
// in-progress week so partial scores don't skew the trend).
function weeklyScoresByTeam(){
  const byTeam = {};
  state.teams.forEach(t => byTeam[t.id] = []);

  state.schedule.forEach(g => {
    if (!g.winner || g.winner === 'UNDECIDED') return; // not finished yet
    [g.home, g.away].forEach(side => {
      if (!side || !byTeam[side.teamId]) return;
      byTeam[side.teamId].push({ week: g.matchupPeriodId, points: side.totalPoints ?? 0 });
    });
  });

  Object.values(byTeam).forEach(weeks => weeks.sort((a, b) => a.week - b.week));
  return byTeam;
}

// Same idea, but strings multiple seasons together into one continuous
// timeline (a global "idx" instead of raw week number, since week numbers
// reset every season). Used for the all-time / select-years power view.
function weeklyScoresAcrossSeasons(years){
  const points = []; // chronological list of {year, week}
  years.forEach(year => {
    const sched = (history.data[year].schedule || []);
    const weeks = [...new Set(sched
      .filter(g => g.winner && g.winner !== 'UNDECIDED')
      .map(g => g.matchupPeriodId))].sort((a, b) => a - b);
    weeks.forEach(w => points.push({ year, week: w }));
  });
  const idxOf = {};
  points.forEach((p, i) => idxOf[p.year + '-' + p.week] = i);

  const byTeam = {};
  const teamsMeta = {};
  years.forEach(year => {
    const data = history.data[year];
    (data.teams || []).forEach(t => { teamsMeta[t.id] = t; if (!byTeam[t.id]) byTeam[t.id] = []; });
    (data.schedule || []).forEach(g => {
      if (!g.winner || g.winner === 'UNDECIDED' || !g.home || !g.away) return;
      const idx = idxOf[year + '-' + g.matchupPeriodId];
      [g.home, g.away].forEach(side => {
        if (!byTeam[side.teamId]) byTeam[side.teamId] = [];
        byTeam[side.teamId].push({ idx, points: side.totalPoints ?? 0, year, week: g.matchupPeriodId });
      });
    });
  });
  Object.values(byTeam).forEach(arr => arr.sort((a, b) => a.idx - b.idx));

  const seasonBoundaries = [];
  let lastYear = null;
  points.forEach((p, i) => { if (p.year !== lastYear) { seasonBoundaries.push({ idx: i, year: p.year }); lastYear = p.year; } });

  return { byTeam, teamsMeta, seasonBoundaries, totalPoints: points.length };
}

// Power score = weighted blend of recent form (last 2 games) and season
// average, weighted toward recent form. Same idea most fantasy power
// ranking tools use. Works the same whether "weeks" spans one season or
// several strung together.
function powerScore(weeks){
  if (!weeks.length) return null;
  const seasonAvg = weeks.reduce((s, w) => s + w.points, 0) / weeks.length;
  const recent = weeks.slice(-2);
  const recentAvg = recent.reduce((s, w) => s + w.points, 0) / recent.length;
  return recentAvg * 0.6 + seasonAvg * 0.4;
}

function colorForIndex(i, total){
  const hue = Math.round((i * 360) / Math.max(total, 1));
  return `hsl(${hue} 65% 62%)`;
}

function renderPowerRankings(){
  if (history.loadedSeasons.length) {
    renderPowerRankingsMultiSeason();
  } else {
    renderPowerRankingsSingleSeason();
  }
}

function renderPowerRankingsSingleSeason(){
  const byTeam = weeklyScoresByTeam();
  const allWeeks = [...new Set(state.schedule
    .filter(g => g.winner && g.winner !== 'UNDECIDED')
    .map(g => g.matchupPeriodId))].sort((a, b) => a - b);

  const note = '<p class="section-note">Showing the current season only. Fetch history on the History tab to unlock all-time / select-years power rankings here too.</p>';

  if (!allWeeks.length) {
    powerView.innerHTML = note + '<div class="status">No completed weeks yet — power rankings show up once week 1 finishes.</div>';
    return;
  }

  const ranked = state.teams.map(t => ({ id: t.id, name: teamDisplayName(t), score: powerScore(byTeam[t.id]) }))
    .filter(r => r.score !== null)
    .sort((a, b) => b.score - a.score);

  const prevWeek = allWeeks[allWeeks.length - 1];
  const rankedPrev = state.teams.map(t => {
    const trimmed = byTeam[t.id].filter(w => w.week < prevWeek);
    return { id: t.id, score: powerScore(trimmed) };
  }).filter(r => r.score !== null).sort((a, b) => b.score - a.score);

  const table = buildPowerTable(ranked, rankedPrev);
  const teamList = state.teams.map(t => ({ id: t.id, name: teamDisplayName(t) }));
  const chart = renderPointsTrendChart(byTeam, allWeeks, teamList, []);

  powerView.innerHTML = note + chart + table;
}

function renderPowerRankingsMultiSeason(){
  const years = history.loadedSeasons.filter(y => history.checkedSeasons.has(y)).sort((a, b) => a - b);
  const picker = renderSeasonPicker();

  if (!years.length) {
    powerView.innerHTML = picker + '<div class="status">Select at least one season above.</div>';
    return;
  }

  const { byTeam, teamsMeta, seasonBoundaries, totalPoints } = weeklyScoresAcrossSeasons(years);

  if (!totalPoints) {
    powerView.innerHTML = picker + '<div class="status">No completed weeks in the selected season(s).</div>';
    return;
  }

  // All-time ranking = win% (60%) blended with scoring output (40%, normalized
  // across the field) — NOT the same recency-weighted formula as the
  // single-season view. A "last 2 games" bias makes sense for gauging
  // current form within one season, but across multiple completed seasons
  // it let two hot recent weeks outweigh years of a losing record, which
  // produced rankings that didn't match the actual standings. This version
  // is anchored to wins first, same as the standings are.
  const ranked = rankAllTime(years, byTeam, teamsMeta);

  // "Trend" = how the ranking would've looked without the most recently
  // checked season, so it still shows movement without reintroducing a
  // recency-dominated score.
  let rankedPrev = [];
  if (years.length > 1) {
    const prevYears = years.slice(0, -1);
    const prevData = weeklyScoresAcrossSeasons(prevYears);
    rankedPrev = rankAllTime(prevYears, prevData.byTeam, prevData.teamsMeta);
  }

  const table = buildPowerTable(ranked, rankedPrev);
  const teamIds = Object.keys(teamsMeta);
  const teamList = teamIds.map(id => ({ id, name: teamDisplayName(teamsMeta[id]) }));
  const chart = renderPointsTrendChart(byTeam, null, teamList, seasonBoundaries, totalPoints);

  powerView.innerHTML = picker +
    '<p class="section-note">All-time score blends win% (60%) with average points scored (40%, normalized against the field) — not the recent-form weighting used for a single season.</p>' +
    chart + table;

  powerView.querySelectorAll('.season-chip input').forEach(cb => {
    cb.addEventListener('change', () => {
      const year = parseInt(cb.dataset.year, 10);
      if (cb.checked) history.checkedSeasons.add(year); else history.checkedSeasons.delete(year);
      refreshSeasonDependentViews();
    });
  });
}

// Sums wins/losses/ties directly from each season's team record (reliable,
// same field the Standings tab uses) rather than re-deriving them from
// schedule results.
function allTimeRecordTotals(years){
  const totals = {};
  years.forEach(year => {
    (history.data[year].teams || []).forEach(t => {
      const r = t.record?.overall || {};
      const cur = totals[t.id] || (totals[t.id] = { wins: 0, losses: 0, ties: 0 });
      cur.wins += r.wins || 0; cur.losses += r.losses || 0; cur.ties += r.ties || 0;
    });
  });
  return totals;
}

function rankAllTime(years, byTeam, teamsMeta){
  const recordTotals = allTimeRecordTotals(years);
  const teamIds = Object.keys(teamsMeta);

  const metrics = teamIds.map(id => {
    const rec = recordTotals[id] || { wins: 0, losses: 0, ties: 0 };
    const gp = rec.wins + rec.losses + rec.ties;
    if (!gp) return null;
    const games = byTeam[id] || [];
    const avgPts = games.length ? games.reduce((s, w) => s + w.points, 0) / games.length : 0;
    const winPct = (rec.wins + rec.ties * 0.5) / gp;
    return { id, name: teamDisplayName(teamsMeta[id]), avgPts, winPct };
  }).filter(Boolean);

  if (!metrics.length) return [];

  const ptsValues = metrics.map(m => m.avgPts);
  const minPts = Math.min(...ptsValues), maxPts = Math.max(...ptsValues);
  const normPts = v => maxPts > minPts ? (v - minPts) / (maxPts - minPts) : 0.5;

  return metrics
    .map(m => ({ id: m.id, name: m.name, score: (m.winPct * 0.6 + normPts(m.avgPts) * 0.4) * 100 }))
    .sort((a, b) => b.score - a.score);
}

function buildPowerTable(ranked, rankedPrev){
  const prevPosition = {};
  rankedPrev.forEach((r, i) => prevPosition[r.id] = i);

  const rows = ranked.map((r, i) => {
    const prevIdx = prevPosition[r.id];
    let trendHtml = '<span class="trend flat">–</span>';
    if (prevIdx !== undefined) {
      const diff = prevIdx - i; // positive = moved up
      if (diff > 0) trendHtml = '<span class="trend up">▲ ' + diff + '</span>';
      else if (diff < 0) trendHtml = '<span class="trend down">▼ ' + Math.abs(diff) + '</span>';
    }
    return '<tr>' +
      '<td class="rank">' + (i + 1) + '</td>' +
      '<td class="team-name">' + escapeHtml(r.name) + '</td>' +
      '<td class="num power-score">' + r.score.toFixed(1) + '</td>' +
      '<td class="num">' + trendHtml + '</td>' +
      '</tr>';
  }).join('');

  return '<table><thead><tr>' +
    '<th></th><th>Team</th><th class="num">Power score</th><th class="num">Trend</th>' +
    '</tr></thead><tbody>' + rows + '</tbody></table>';
}

// allWeeks: single-season mode (array of week numbers), pass null for multi-season.
// seasonBoundaries/totalPoints: multi-season mode only.
function renderPointsTrendChart(byTeam, allWeeks, teamList, seasonBoundaries, totalPoints){
  const width = 640, height = 260, padL = 40, padR = 12, padT = 12, padB = 28;
  const plotW = width - padL - padR, plotH = height - padT - padB;
  const multi = allWeeks === null;

  let minPts = Infinity, maxPts = -Infinity;
  teamList.forEach(t => (byTeam[t.id] || []).forEach(w => {
    minPts = Math.min(minPts, w.points);
    maxPts = Math.max(maxPts, w.points);
  }));
  if (!isFinite(minPts)) { minPts = 0; maxPts = 100; }
  const pad = (maxPts - minPts) * 0.1 || 10;
  minPts -= pad; maxPts += pad;

  const xSpan = multi ? Math.max(totalPoints - 1, 1) : Math.max(allWeeks.length - 1, 1);
  const xFor = multi
    ? idx => padL + (idx / xSpan) * plotW
    : week => padL + ((week - allWeeks[0]) / xSpan) * plotW;
  const yFor = pts => padT + plotH - ((pts - minPts) / (maxPts - minPts)) * plotH;

  const gridLines = multi
    ? seasonBoundaries.map(b =>
        `<line x1="${xFor(b.idx)}" y1="${padT}" x2="${xFor(b.idx)}" y2="${padT + plotH}" stroke="#20402C" stroke-width="1"/>` +
        `<text x="${xFor(b.idx)}" y="${height - 8}" fill="#B9C2BC" font-size="9" font-family="JetBrains Mono, monospace" text-anchor="middle">${b.year}</text>`
      ).join('')
    : allWeeks.map(w =>
        `<line x1="${xFor(w)}" y1="${padT}" x2="${xFor(w)}" y2="${padT + plotH}" stroke="#20402C" stroke-width="1"/>` +
        `<text x="${xFor(w)}" y="${height - 8}" fill="#B9C2BC" font-size="9" font-family="JetBrains Mono, monospace" text-anchor="middle">W${w}</text>`
      ).join('');

  const paths = teamList.map((t, i) => {
    const weeks = byTeam[t.id] || [];
    if (weeks.length < 1) return '';
    const color = colorForIndex(i, teamList.length);
    const xOf = w => multi ? xFor(w.idx) : xFor(w.week);
    const d = weeks.map((w, idx) => (idx === 0 ? 'M' : 'L') + xOf(w).toFixed(1) + ',' + yFor(w.points).toFixed(1)).join(' ');
    const dots = weeks.map(w =>
      `<circle cx="${xOf(w).toFixed(1)}" cy="${yFor(w.points).toFixed(1)}" r="2.5" fill="${color}"/>`
    ).join('');
    return `<path d="${d}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round"/>` + dots;
  }).join('');

  const legend = teamList.map((t, i) =>
    '<span class="legend-item"><span class="legend-swatch" style="background:' + colorForIndex(i, teamList.length) + '"></span>' +
    escapeHtml(t.name) + '</span>'
  ).join('');

  return '<div class="chart-wrap">' +
    `<svg viewBox="0 0 ${width} ${height}" role="img" aria-label="Weekly points by team">` +
    gridLines + paths +
    '</svg>' +
    '<div class="legend">' + legend + '</div>' +
    '</div>';
}

function renderAwards(){

}

function renderAwardsSingleSeason(){

// Awards are always computed for a single season at a time — no pooling
// across years, so "highest score" etc. means highest in that season, not
// of all time. With multiple seasons checked, each gets its own section.
function renderAwardsSection(year, teams, schedule, settings, showHeading){
  const awards = computeAwards(year, teams, schedule, settings);
  const heading = showHeading ? '<h2 class="section-title">' + year + '</h2>' : '';

  if (!awards || !awards.length) {
    return heading + '<div class="status">Not enough completed games in ' + year + ' yet.</div>';
  }

  const cards = awards.map(a =>
    '<div class="award-card">' +
      '<div class="award-emoji">' + a.emoji + '</div>' +
      '<div>' +
        '<div class="award-title">' + escapeHtml(a.title) + '</div>' +
        '<div class="award-desc">' + escapeHtml(a.desc) + '</div>' +
        '<div class="award-winner">' + escapeHtml(a.winner) + '</div>' +
        '<div class="award-detail">' + escapeHtml(a.detail) + '</div>' +
      '</div>' +
    '</div>'
  ).join('');

  return heading + '<div class="award-grid">' + cards + '</div>';
}

// Flattens one season's {teams, schedule} into:
//  - teamGames: one row per team per completed game (for score/streak awards)
//  - games: one row per completed game (for margin awards)
//  - seasonRecords: one row per team (for record-based awards, incl. playoff seed)
//  - teamTotals: one row per team (for season-total and schedule-strength awards)
function buildAwardsFromSeason(teams, schedule, settings){
  const teamGames = [];
  const games = [];
  const seasonRecords = [];
  const playoffSpots = settings?.scheduleSettings?.playoffTeamCount || 0;

  const nameById = {};
  teams.forEach(t => { nameById[t.id] = teamDisplayName(t); });

  teams.forEach(t => {
    const r = t.record?.overall || {};
    const gp = (r.wins || 0) + (r.losses || 0) + (r.ties || 0);
    if (gp > 0) {
      seasonRecords.push({
        teamId: t.id, name: nameById[t.id],
        wins: r.wins || 0, losses: r.losses || 0, ties: r.ties || 0,
        winPct: ((r.wins || 0) + (r.ties || 0) * 0.5) / gp,
        playoffSeed: t.playoffSeed || null,
        madePlayoffs: !!(playoffSpots && t.playoffSeed && t.playoffSeed <= playoffSpots),
      });
    }
  });

  (schedule || []).forEach(g => {
    if (!g.winner || g.winner === 'UNDECIDED' || !g.home || !g.away) return;
    const hp = g.home.totalPoints ?? 0, ap = g.away.totalPoints ?? 0;
    const hName = nameById[g.home.teamId] || ('Team ' + g.home.teamId);
    const aName = nameById[g.away.teamId] || ('Team ' + g.away.teamId);

    games.push({ week: g.matchupPeriodId, homeName: hName, homePts: hp, awayName: aName, awayPts: ap, margin: Math.abs(hp - ap), winner: g.winner });

    const hResult = g.winner === 'HOME' ? 'W' : g.winner === 'AWAY' ? 'L' : 'T';
    const aResult = g.winner === 'AWAY' ? 'W' : g.winner === 'HOME' ? 'L' : 'T';
    teamGames.push({ teamId: g.home.teamId, name: hName, week: g.matchupPeriodId, points: hp, oppPoints: ap, oppName: aName, result: hResult });
    teamGames.push({ teamId: g.away.teamId, name: aName, week: g.matchupPeriodId, points: ap, oppPoints: hp, oppName: hName, result: aResult });
  });

  const teamTotalsMap = {};
  teamGames.forEach(g => {
    const t = teamTotalsMap[g.teamId] || (teamTotalsMap[g.teamId] = { teamId: g.teamId, name: g.name, points: 0, oppPoints: 0, games: 0 });
    t.points += g.points;
    t.oppPoints += g.oppPoints;
    t.games++;
  });
  const recordByTeam = {};
  seasonRecords.forEach(r => { recordByTeam[r.teamId] = r; });
  const teamTotals = Object.values(teamTotalsMap).map(t => ({
    ...t,
    avgPoints: t.points / t.games,
    avgOppPoints: t.oppPoints / t.games,
    madePlayoffs: recordByTeam[t.teamId] ? recordByTeam[t.teamId].madePlayoffs : false,
  }));

  return { teamGames, games, seasonRecords, teamTotals };
}

function weekLabel(g){
  return 'Week ' + g.week;
}

function stdDev(values){
  const mean = values.reduce((s, v) => s + v, 0) / values.length;
  const variance = values.reduce((s, v) => s + (v - mean) ** 2, 0) / values.length;
  return Math.sqrt(variance);
}

// Looks up a team's win% in the season immediately before `year`, using
// whatever's in the history cache — doesn't require that season to be
// checked/displayed, just previously fetched. Returns null if unavailable
// (team wasn't in the league, season not fetched, or in single-season mode
// with no history loaded at all).
function previousSeasonWinPct(year, teamId){
  const prev = history.data[year - 1];
  if (!prev) return null;
  const t = (prev.teams || []).find(tt => tt.id === teamId);
  if (!t) return null;
  const r = t.record?.overall || {};
  const gp = (r.wins || 0) + (r.losses || 0) + (r.ties || 0);
  if (!gp) return null;
  return ((r.wins || 0) + (r.ties || 0) * 0.5) / gp;
}

function computeAwards(year, teams, schedule, settings){
  const { teamGames, games, seasonRecords, teamTotals } = buildAwardsFromSeason(teams, schedule, settings);
  if (!teamGames.length) return null;
  const awards = [];

  const highest = teamGames.reduce((a, b) => b.points > a.points ? b : a);
  awards.push({ emoji: '🔥', title: 'Blowtorch', desc: 'Highest single-week score', winner: highest.name, detail: highest.points.toFixed(1) + ' pts · ' + weekLabel(highest) });

  const lowest = teamGames.reduce((a, b) => b.points < a.points ? b : a);
  awards.push({ emoji: '🥶', title: 'Ice Cold', desc: 'Lowest single-week score', winner: lowest.name, detail: lowest.points.toFixed(1) + ' pts · ' + weekLabel(lowest) });

  const decisive = games.filter(g => g.winner !== 'TIE');
  if (decisive.length) {
    const blowout = decisive.reduce((a, b) => b.margin > a.margin ? b : a);
    const bWinner = blowout.winner === 'HOME' ? blowout.homeName : blowout.awayName;
    const bLoser = blowout.winner === 'HOME' ? blowout.awayName : blowout.homeName;
    awards.push({ emoji: '💥', title: 'Mercy Rule', desc: 'Biggest margin of victory', winner: bWinner, detail: '+' + blowout.margin.toFixed(1) + ' over ' + bLoser + ' · ' + weekLabel(blowout) });

    const nail = decisive.reduce((a, b) => b.margin < a.margin ? b : a);
    const nWinner = nail.winner === 'HOME' ? nail.homeName : nail.awayName;
    const nLoser = nail.winner === 'HOME' ? nail.awayName : nail.homeName;
    awards.push({ emoji: '😰', title: 'Nail-Biter', desc: 'Closest final margin', winner: nWinner, detail: '+' + nail.margin.toFixed(1) + ' over ' + nLoser + ' · ' + weekLabel(nail) });
  }

  const losses = teamGames.filter(g => g.result === 'L');
  if (losses.length) {
    const heartbreak = losses.reduce((a, b) => b.points > a.points ? b : a);
    awards.push({ emoji: '💔', title: 'Heartbreaker', desc: 'Highest score in a loss', winner: heartbreak.name, detail: heartbreak.points.toFixed(1) + ' pts, lost to ' + heartbreak.oppName + ' · ' + weekLabel(heartbreak) });
  }

  const wins = teamGames.filter(g => g.result === 'W');
  if (wins.length) {
    const lucky = wins.reduce((a, b) => b.points < a.points ? b : a);
    awards.push({ emoji: '🍀', title: 'Lucky Escape', desc: 'Lowest score in a win', winner: lucky.name, detail: lucky.points.toFixed(1) + ' pts, beat ' + lucky.oppName + ' · ' + weekLabel(lucky) });
  }

  if (seasonRecords.length) {
    const best = seasonRecords.reduce((a, b) => b.winPct > a.winPct ? b : a);
    awards.push({ emoji: '👑', title: 'Best Record', desc: 'Best regular-season record', winner: best.name, detail: best.wins + '-' + best.losses + (best.ties ? '-' + best.ties : '') });

    const worst = seasonRecords.reduce((a, b) => b.winPct < a.winPct ? b : a);
    awards.push({ emoji: '🪦', title: 'Worst Record', desc: 'Worst regular-season record', winner: worst.name, detail: worst.wins + '-' + worst.losses + (worst.ties ? '-' + worst.ties : '') });
  }

  const streaks = computeStreaks(teamGames);
  if (streaks.bestWin) awards.push({ emoji: '🚀', title: 'Hot Streak', desc: 'Longest win streak', winner: streaks.bestWin.name, detail: streaks.bestWin.length + ' straight wins · ' + streaks.bestWin.range });
  if (streaks.worstLoss) awards.push({ emoji: '📉', title: 'The Skid', desc: 'Longest losing streak', winner: streaks.worstLoss.name, detail: streaks.worstLoss.length + ' straight losses · ' + streaks.worstLoss.range });

  // ---- Consistency ----
  const byTeamPoints = {};
  teamGames.forEach(g => { (byTeamPoints[g.teamId] = byTeamPoints[g.teamId] || { name: g.name, pts: [] }).pts.push(g.points); });
  const consistency = Object.values(byTeamPoints)
    .filter(t => t.pts.length >= 3)
    .map(t => ({ name: t.name, sd: stdDev(t.pts) }));
  if (consistency.length) {
    const steady = consistency.reduce((a, b) => b.sd < a.sd ? b : a);
    awards.push({ emoji: '📏', title: 'Steady Eddy', desc: 'Most consistent scorer week to week', winner: steady.name, detail: '±' + steady.sd.toFixed(1) + ' pts std. dev.' });

    const volatile = consistency.reduce((a, b) => b.sd > a.sd ? b : a);
    awards.push({ emoji: '🎢', title: 'Boom or Bust', desc: 'Least consistent scorer week to week', winner: volatile.name, detail: '±' + volatile.sd.toFixed(1) + ' pts std. dev.' });
  }

  // ---- Season totals & schedule strength ----
  if (teamTotals.length) {
    const machine = teamTotals.reduce((a, b) => b.points > a.points ? b : a);
    awards.push({ emoji: '🏗️', title: 'The Machine', desc: 'Most total points scored', winner: machine.name, detail: machine.points.toFixed(1) + ' pts on the season' });

    const punchless = teamTotals.reduce((a, b) => b.points < a.points ? b : a);
    awards.push({ emoji: '🧱', title: 'Offense Optional', desc: 'Fewest total points scored', winner: punchless.name, detail: punchless.points.toFixed(1) + ' pts on the season' });

    const gauntlet = teamTotals.reduce((a, b) => b.avgOppPoints > a.avgOppPoints ? b : a);
    awards.push({ emoji: '🥊', title: "Murderers' Row", desc: 'Toughest schedule faced', winner: gauntlet.name, detail: gauntlet.avgOppPoints.toFixed(1) + ' opp. pts/wk on average' });

    const cakewalk = teamTotals.reduce((a, b) => b.avgOppPoints < a.avgOppPoints ? b : a);
    awards.push({ emoji: '🎯', title: 'Easy Slate', desc: 'Softest schedule faced', winner: cakewalk.name, detail: cakewalk.avgOppPoints.toFixed(1) + ' opp. pts/wk on average' });

    const nonPlayoff = teamTotals.filter(t => !t.madePlayoffs);
    if (nonPlayoff.length) {
      const snakeBitten = nonPlayoff.reduce((a, b) => b.points > a.points ? b : a);
      awards.push({ emoji: '💣', title: 'Snake-Bitten', desc: 'Highest scorer to miss the playoffs', winner: snakeBitten.name, detail: snakeBitten.points.toFixed(1) + ' pts, missed the playoffs anyway' });
    }
  }

  // ---- Playoff narrative ----
  const placements = seasonPlacements({ teams, schedule });
  if (placements) {
    const champTotal = teamTotals.find(t => t.teamId === placements.champion);
    const pointsLeader = teamTotals.length ? teamTotals.reduce((a, b) => b.points > a.points ? b : a) : null;
    if (champTotal && pointsLeader && champTotal.teamId !== pointsLeader.teamId) {
      awards.push({ emoji: '📜', title: 'Paper Champion', desc: 'Won it without leading the league in points', winner: champTotal.name, detail: champTotal.points.toFixed(1) + ' pts vs. ' + pointsLeader.name + "'s league-best " + pointsLeader.points.toFixed(1) });
    }

    const champRecord = seasonRecords.find(r => r.teamId === placements.champion);
    if (champRecord && champRecord.playoffSeed && champRecord.playoffSeed >= 3) {
      awards.push({ emoji: '🐊', title: 'Giant Killer', desc: 'Won it all as a low playoff seed', winner: champRecord.name, detail: 'No. ' + champRecord.playoffSeed + ' seed' });
    }
  }

  // ---- Year-over-year (only when the prior season is in the cache) ----
  const deltas = seasonRecords
    .map(r => {
      const prevPct = previousSeasonWinPct(year, r.teamId);
      return prevPct === null ? null : { name: r.name, delta: r.winPct - prevPct };
    })
    .filter(Boolean);
  if (deltas.length) {
    const riser = deltas.reduce((a, b) => b.delta > a.delta ? b : a);
    if (riser.delta > 0) awards.push({ emoji: '📈', title: 'Most Improved', desc: "Biggest win% jump vs. the previous season", winner: riser.name, detail: '+' + Math.round(riser.delta * 100) + ' pts of win%' });

    const faller = deltas.reduce((a, b) => b.delta < a.delta ? b : a);
    if (faller.delta < 0) awards.push({ emoji: '📉', title: 'Biggest Fall-Off', desc: "Biggest win% drop vs. the previous season", winner: faller.name, detail: Math.round(faller.delta * 100) + ' pts of win%' });
  }

  return awards;
}
function computeStreaks(teamGames){
  const byTeam = {};
  teamGames.forEach(g => { (byTeam[g.teamId] = byTeam[g.teamId] || []).push(g); });
  Object.values(byTeam).forEach(arr => arr.sort((a, b) => a.week - b.week));

  let bestWin = null, worstLoss = null;

  Object.values(byTeam).forEach(arr => {
    let curResult = null, curLen = 0, curStart = null;
    arr.forEach(g => {
      const relevant = g.result === 'W' ? 'W' : g.result === 'L' ? 'L' : null;
      if (relevant && relevant === curResult) {
        curLen++;
      } else {
        curResult = relevant;
        curLen = relevant ? 1 : 0;
        curStart = g;
      }
      if (curResult === 'W' && curLen >= 2 && (!bestWin || curLen > bestWin.length)) {
        bestWin = { name: g.name, length: curLen, range: streakRange(curStart, g) };
      }
      if (curResult === 'L' && curLen >= 2 && (!worstLoss || curLen > worstLoss.length)) {
        worstLoss = { name: g.name, length: curLen, range: streakRange(curStart, g) };
      }
    });
  });

  return { bestWin, worstLoss };
}

function streakRange(start, end){
  const s = weekLabel(start), e = weekLabel(end);
  return s === e ? s : s + ' – ' + e;
}

// Static cache, committed to the repo at data/history-cache.json. Anyone
// visiting the site reads old seasons straight from this file — no ESPN
// login needed on their end. Only whoever generates the file (via the
// "Download cache file" button) needs cookies, once.
let historyCachePromise = null;
function loadHistoryCache(){
  if (!historyCachePromise) {
    historyCachePromise = fetch('./data/history-cache.json')
      .then(r => r.ok ? r.json() : {})
      .catch(() => ({}));
  }
  return historyCachePromise;
}

async function fetchHistorySeason(leagueId, season){
  const cache = await loadHistoryCache();
  if (cache[season]) {
    return { ok: true, data: cache[season], fromCache: true };
  }

  const proxyUrl = '/api/espn-proxy?leagueId=' + encodeURIComponent(leagueId) +
                    '&season=' + encodeURIComponent(season);
  try {
    const res = await fetch(proxyUrl, { headers: { 'Accept': 'application/json', ...credHeaders() } });
    const payload = await res.json().catch(() => null);

    if (!res.ok) {
      let reason = (payload && payload.error) ? payload.error : ('HTTP ' + res.status);
      if (payload && payload.status) reason += ' [ESPN status ' + payload.status + ']';
      if (payload && payload.detail) reason += ' — ' + payload.detail.slice(0, 120);
      return { ok: false, reason };
    }
    if (!payload || !payload.teams || !payload.teams.length) {
      return { ok: false, reason: 'no league data returned' };
    }
    return { ok: true, data: payload };
  } catch (err) {
    return { ok: false, reason: 'network error' };
  }
}

async function loadHistory(){
  const leagueId = leagueIdInput.value.trim();
  const from = parseInt(histFromInput.value, 10);
  const to = parseInt(histToInput.value, 10);
  if (!leagueId || !from || !to || from > to) {
    historyStatus.textContent = 'Check your league ID and season range.';
    return;
  }

  histLoadBtn.disabled = true;
  history.data = {};
  history.loadedSeasons = [];
  const failures = []; // { year, reason }
  let cacheHits = 0;

  for (let year = from; year <= to; year++) {
    historyStatus.textContent = 'Loading ' + year + '… (' + (year - from + 1) + '/' + (to - from + 1) + ')';
    const result = await fetchHistorySeason(leagueId, year);
    if (result.ok) {
      history.data[year] = result.data;
      history.loadedSeasons.push(year);
      if (result.fromCache) cacheHits++;
    } else {
      failures.push({ year, reason: result.reason });
    }
  }

  history.loadedSeasons.sort((a, b) => a - b);
  history.checkedSeasons = new Set(history.loadedSeasons);

  let statusMsg = history.loadedSeasons.length
    ? 'Loaded ' + history.loadedSeasons.length + ' season(s)' + (cacheHits ? ' (' + cacheHits + ' from cache file)' : '') + '.'
    : 'No seasons found in that range for this league ID.';
  if (failures.length) {
    statusMsg += ' Skipped: ' + failures.map(f => f.year + ' (' + f.reason + ')').join('; ') + '.';
  }
  historyStatus.textContent = statusMsg;

  histLoadBtn.disabled = false;
  refreshSeasonDependentViews();
}

async function downloadHistoryCache(){
  histDownloadBtn.disabled = true;
  histDownloadBtn.textContent = 'Preparing…';
  try {
    const existing = await loadHistoryCache();
    // Merge so downloading after a partial re-fetch doesn't drop seasons
    // that were cached before but weren't reloaded this time.
    const merged = { ...existing, ...history.data };

    const blob = new Blob([JSON.stringify(merged)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'history-cache.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  } finally {
    histDownloadBtn.disabled = false;
    histDownloadBtn.textContent = 'Download cache file';
  }
}

function historyTeamNames(){
  const names = {};
  history.loadedSeasons.forEach(year => {
    (history.data[year].teams || []).forEach(t => { names[t.id] = teamDisplayName(t); });
  });
  return names;
}

function renderSeasonPicker(){
  if (!history.loadedSeasons.length) return '';
  const chips = history.loadedSeasons.map(y =>
    '<label class="season-chip"><input type="checkbox" data-year="' + y + '" ' +
    (history.checkedSeasons.has(y) ? 'checked' : '') + '>' + y + '</label>'
  ).join('');
  return '<div class="season-picker">' + chips + '</div>';
}

// The "toilet bowl championship" is the winner of the final week's game in
// the consolation bracket (playoffTierType is anything other than NONE or
// WINNERS_BRACKET). If the ladder has multiple games in its last week, the
// top one is picked using playoff seed — the ladder keeps higher seeds in
// the top bracket slot all the way through, so the best-seeded pair is the
// actual toilet bowl game rather than a lower consolation-ladder rung.
function toiletBowlChampion(data){
  const teams = data.teams || [];
  const schedule = data.schedule || [];

  const consolationGames = schedule.filter(g =>
    g.playoffTierType && g.playoffTierType !== 'NONE' && g.playoffTierType !== 'WINNERS_BRACKET' &&
    g.winner && g.winner !== 'UNDECIDED' && g.home && g.away
  );
  if (!consolationGames.length) return null;

  const finalWeek = Math.max(...consolationGames.map(g => g.matchupPeriodId));
  const finalGames = consolationGames.filter(g => g.matchupPeriodId === finalWeek);
  if (!finalGames.length) return null;

  const seedById = {};
  teams.forEach(t => seedById[t.id] = t.playoffSeed || 999);

  let best = finalGames[0], bestSeedSum = Infinity;
  finalGames.forEach(g => {
    const sum = (seedById[g.home.teamId] || 999) + (seedById[g.away.teamId] || 999);
    if (sum < bestSeedSum) { bestSeedSum = sum; best = g; }
  });

  return best.winner === 'HOME' ? best.home.teamId : best.away.teamId;
}

// Championship / runner-up / 3rd place, derived the same way as the toilet
// bowl above — straight from bracket games rather than ESPN's rankFinal
// field, which isn't reliably populated for every league. The winners
// bracket keeps playing its losers too (for 3rd place, 5th place, etc.), all
// still tagged WINNERS_BRACKET, so in the final week there can be more than
// one game there. The pair with the best (lowest) combined seed is the
// championship game; the next-best pair is the 3rd place game.
function seasonPlacements(data){
  const teams = data.teams || [];
  const schedule = data.schedule || [];

  const games = schedule.filter(g =>
    g.playoffTierType === 'WINNERS_BRACKET' &&
    g.winner && g.winner !== 'UNDECIDED' && g.home && g.away
  );
  if (!games.length) return null;

  const finalWeek = Math.max(...games.map(g => g.matchupPeriodId));
  const finalGames = games.filter(g => g.matchupPeriodId === finalWeek);
  if (!finalGames.length) return null;

  const seedById = {};
  teams.forEach(t => seedById[t.id] = t.playoffSeed || 999);

  const bySeed = finalGames
    .map(g => ({ g, sum: (seedById[g.home.teamId] || 999) + (seedById[g.away.teamId] || 999) }))
    .sort((a, b) => a.sum - b.sum);

  const champGame = bySeed[0].g;
  const champion = champGame.winner === 'HOME' ? champGame.home.teamId : champGame.away.teamId;
  const runnerUp = champGame.winner === 'HOME' ? champGame.away.teamId : champGame.home.teamId;

  let thirdPlace = null;
  if (bySeed[1]) {
    const tg = bySeed[1].g;
    thirdPlace = tg.winner === 'HOME' ? tg.home.teamId : tg.away.teamId;
  }

  return { champion, runnerUp, thirdPlace };
}

// Loads data/manual-adjustments.json — for real-world overrides the API
// has no field for, like a championship getting vacated after the fact.
// Currently supports: { "vacatedChampionshipSeasons": [2020] } — any season
// listed there has its championship stripped from whoever the bracket says
// won, and counted as a DQ for that team instead. Missing/empty/invalid
// file just means no adjustments, same as the other data files.
let MANUAL_ADJUSTMENTS = { vacatedChampionshipSeasons: [] };
async function loadManualAdjustments(){
  try {
    const res = await fetch('./data/manual-adjustments.json');
    if (!res.ok) return;
    const data = await res.json();
    if (data && Array.isArray(data.vacatedChampionshipSeasons)) {
      MANUAL_ADJUSTMENTS.vacatedChampionshipSeasons = data.vacatedChampionshipSeasons;
    }
  } catch (e) {
    return;
  }
  if (history.loadedSeasons.length) refreshSeasonDependentViews();
}
loadManualAdjustments();

function renderHistoryContent(){
  if (!history.loadedSeasons.length) { historyContent.innerHTML = ''; return; }

  const names = historyTeamNames();
  const checked = history.loadedSeasons.filter(y => history.checkedSeasons.has(y));

  // ---- All-time records ----
  const agg = {}; // teamId -> stats
  const ensure = id => agg[id] || (agg[id] = { w:0, l:0, t:0, championships:0, top3:0, playoffs:0, toiletBowl:0, dq:0 });

  checked.forEach(year => {
    const data = history.data[year];
    const teams = data.teams || [];
    const settings = data.settings || {};
    const playoffSpots = settings.scheduleSettings?.playoffTeamCount || 0;

    teams.forEach(t => {
      const s = ensure(t.id);
      const r = t.record?.overall || {};
      s.w += r.wins || 0; s.l += r.losses || 0; s.t += r.ties || 0;
      if (playoffSpots && t.playoffSeed && t.playoffSeed <= playoffSpots) s.playoffs++;
    });

    const placements = seasonPlacements(data);
    if (placements) {
      const vacated = MANUAL_ADJUSTMENTS.vacatedChampionshipSeasons.includes(year);
      if (vacated) {
        ensure(placements.champion).dq++;
      } else {
        ensure(placements.champion).championships++;
      }
      ensure(placements.champion).top3++;
      ensure(placements.runnerUp).top3++;
      if (placements.thirdPlace) ensure(placements.thirdPlace).top3++;
    }

    const toiletChamp = toiletBowlChampion(data);
    if (toiletChamp !== null) ensure(toiletChamp).toiletBowl++;
  });

  const rows = Object.entries(agg)
    .sort((a, b) => b[1].championships - a[1].championships || (b[1].w / Math.max(b[1].w+b[1].l+b[1].t,1)) - (a[1].w / Math.max(a[1].w+a[1].l+a[1].t,1)))
    .map(([id, s]) => '<tr>' +
      '<td class="team-name">' + escapeHtml(names[id] || ('Team ' + id)) + '</td>' +
      '<td class="num rec">' + s.w + '-' + s.l + '-' + s.t + '</td>' +
      '<td class="num">' + s.championships + '</td>' +
      '<td class="num">' + s.top3 + '</td>' +
      '<td class="num">' + s.playoffs + '</td>' +
      '<td class="num">' + s.toiletBowl + '</td>' +
      '<td class="num">' + s.dq + '</td>' +
      '</tr>').join('');

  const recordsTable = '<h2 class="section-title">All-time records</h2>' +
    '<p class="section-note">Across the seasons checked below. Championships, top-3, and toilet bowl are all read directly from each season\'s final bracket games rather than a summary field, since ESPN doesn\'t populate that consistently for every league. DQ reflects manual adjustments in data/manual-adjustments.json (e.g. a vacated championship) — the top-3 finish for that season is left as-is, only the championship credit moves to the DQ column.</p>' +
    '<table><thead><tr><th>Team</th><th class="num">Record</th><th class="num">🏆</th><th class="num">Top 3</th><th class="num">Playoffs</th><th class="num">🚽</th><th class="num">DQ</th></tr></thead>' +
    '<tbody>' + rows + '</tbody></table>';

  // ---- Head-to-head matrix ----
  const teamIds = Object.keys(agg);
  const h2h = {}; // "a|b" -> {w,l,t} from a's perspective
  teamIds.forEach(a => teamIds.forEach(b => { if (a !== b) h2h[a+'|'+b] = { w:0, l:0, t:0 }; }));

  checked.forEach(year => {
    (history.data[year].schedule || []).forEach(g => {
      if (!g.winner || g.winner === 'UNDECIDED' || !g.home || !g.away) return;
      const a = String(g.home.teamId), b = String(g.away.teamId);
      if (!h2h[a+'|'+b] || !h2h[b+'|'+a]) return;
      if (g.winner === 'HOME') { h2h[a+'|'+b].w++; h2h[b+'|'+a].l++; }
      else if (g.winner === 'AWAY') { h2h[a+'|'+b].l++; h2h[b+'|'+a].w++; }
      else { h2h[a+'|'+b].t++; h2h[b+'|'+a].t++; }
    });
  });

  const header = '<th class="rowhead"></th>' + teamIds.map(id => '<th>' + escapeHtml((names[id]||'?').slice(0,10)) + '</th>').join('');
  const bodyRows = teamIds.map(a => {
    const cells = teamIds.map(b => {
      if (a === b) return '<td class="diag">—</td>';
      const rec = h2h[a+'|'+b];
      return '<td class="num">' + rec.w + '-' + rec.l + (rec.t ? '-' + rec.t : '') + '</td>';
    }).join('');
    return '<tr><td class="rowhead">' + escapeHtml((names[a]||'?').slice(0,14)) + '</td>' + cells + '</tr>';
  }).join('');

  const h2hTable = teamIds.length
    ? '<h2 class="section-title">Head-to-head</h2>' +
      '<p class="section-note">Row team\'s record against column team, wins-losses(-ties), across checked seasons.</p>' +
      '<div class="h2h-scroll"><table class="h2h"><thead><tr>' + header + '</tr></thead><tbody>' + bodyRows + '</tbody></table></div>'
    : '';

  historyContent.innerHTML = renderSeasonPicker() + recordsTable + h2hTable;

  historyContent.querySelectorAll('.season-chip input').forEach(cb => {
    cb.addEventListener('change', () => {
      const year = parseInt(cb.dataset.year, 10);
      if (cb.checked) history.checkedSeasons.add(year); else history.checkedSeasons.delete(year);
      refreshSeasonDependentViews();
    });
  });
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

loadBtn.addEventListener('click', loadLeague);
leagueIdInput.addEventListener('keydown', e => { if (e.key === 'Enter') loadLeague(); });
histLoadBtn.addEventListener('click', loadHistory);
histDownloadBtn.addEventListener('click', downloadHistoryCache);

// Kick off an initial load with the pre-filled league ID.
loadLeague();

// If a data/history-cache.json file has been committed to the repo, load it
// automatically on startup — no one has to tap "Fetch history" first. Tapping
// "Fetch history" later still works as before (e.g. to pull in newer seasons
// not yet in the cache file, or ones outside the cache entirely).
function refreshSeasonDependentViews(){
  renderHistoryContent();
  renderPowerRankings();
  renderAwards();
}

async function autoLoadHistoryFromCache(){
  const cache = await loadHistoryCache();
  const years = Object.keys(cache)
    .map(Number)
    .filter(y => cache[y] && cache[y].teams && cache[y].teams.length)
    .sort((a, b) => a - b);

  if (!years.length) return; // no cache file yet, or it's empty — nothing to do

  history.data = cache;
  history.loadedSeasons = years;
  history.checkedSeasons = new Set(years);

  historyStatus.textContent = 'Loaded ' + years.length + ' season(s) from the cache file.';
  refreshSeasonDependentViews();
}
autoLoadHistoryFromCache();

// Register the service worker so the app can be installed and work offline
// once it's hosted somewhere (this no-ops harmlessly inside a sandboxed preview).
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
