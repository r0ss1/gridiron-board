<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Gridiron Board — League Tracker</title>
<meta name="theme-color" content="#3F3F3F">
<meta name="description" content="A scoreboard for your ESPN fantasy football league.">

<!-- PWA hookup -->
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.jpg">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:#3F3F3F;
    --surface:#4A4A4A;
    --surface-2:#565656;
    --line:#5F5F5F;
    --ink:#E5E5E5;
    --ink-dim:#A8A8A8;
    --amber:#CEB888;
    --win:#8FBF9F;
    --loss:#D3684F;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter', sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    padding-bottom:3.5rem;
  }
  .wrap{max-width:760px;margin:0 auto;padding:0 var(--sp-xl);}
  a{color:inherit;}

  /* Header */
  header.board{
    padding:1.5rem 0 var(--sp-xl);
    border-bottom:1px solid var(--line);
  }
  .eyebrow{
    font-family:var(--font-mono);
    font-size:var(--fs-sm);
    letter-spacing:.1em;
    color:var(--amber);
    text-transform:uppercase;
  }
  h1{
    font-family:'Oswald', sans-serif;
    font-weight:600;
    font-size:clamp(26px, 6vw, 36px);
    margin:var(--sp-xs) 0 var(--sp-xs);
    letter-spacing:.01em;
    line-height:1.05;
  }
  .week-chip{
    display:block;
    font-family:var(--font-mono);
    font-size:var(--fs-sm);
    color:var(--ink-dim);
  }
  .week-chip strong{color:var(--ink); font-weight:500;}

  /* Controls */
  .controls{
    display:flex;
    align-items:flex-end;
    gap:8px;
    flex-wrap:wrap;
    margin-top:var(--sp-xl);
  }
  .field{display:flex; flex-direction:column; gap:5px;}
  .field label{
    font-family:var(--font-mono);
    font-size:var(--fs-xs);
    letter-spacing:.07em;
    text-transform:uppercase;
    color:var(--ink-dim);
  }
  .controls-compact{ align-items:center; gap:12px; }
  .fieldC{ display:flex; flex-direction:column; gap:5px; }
  .label-spacer{ display:block; font-size:var(--fs-xs); line-height:1.2; min-height:12px; }
  .fieldC label{
    font-family:var(--font-mono);
    font-size:var(--fs-xs); letter-spacing:.07em;
    text-transform:uppercase; color:var(--ink-dim);
  }
  .year-chips{ display:inline-flex; align-items:stretch; border:1px solid var(--line); border-radius:8px; overflow:hidden; }
  .year-chips button{
    appearance:none; border:0; background:var(--surface); color:var(--ink-dim);
    font-family:var(--font-mono); font-size:var(--fs-sm); font-weight:600;
    padding:var(--sp-sm) var(--sp-md); cursor:pointer; border-right:1px solid var(--line);
    transition:background .12s, color .12s;
  }
  .year-chips button:last-child{ border-right:0; }
  .year-chips button:hover{ color:var(--ink); }
  .year-chips button.on{ background:var(--amber); color:#1a1a1a; }
    appearance:none; border:0; background:none; padding:0; cursor:pointer;
    font-family:var(--font-mono); font-size:var(--fs-sm); font-weight:600;
    color:var(--ink-dim); text-transform:uppercase; letter-spacing:.03em;
    transition:color .12s;
  }
  .sel-sm{ font-size:var(--fs-sm); padding:var(--sp-sm) var(--sp-md); }
  .btn-icon-sm{ padding:var(--sp-sm) var(--sp-md); font-size:var(--fs-base); line-height:1; }
  .visually-hidden{
    position:absolute !important; width:1px; height:1px; padding:0; margin:-1px;
    overflow:hidden; clip:rect(0 0 0 0); white-space:nowrap; border:0;
  }
  input, select{
    background:var(--surface);
    border:1px solid var(--line);
    color:var(--ink);
    font-family:'Inter', sans-serif;
    font-size:var(--fs-base);
    padding:var(--sp-md) var(--sp-md);
    border-radius:8px;
    min-width:110px;
    height:38px;
  }
  input::placeholder{color:var(--ink-dim);}
  input:focus, select:focus, button:focus-visible{
    outline:2px solid var(--amber);
    outline-offset:1px;
  }

  /* Buttons — one system, three variants */
  .btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    height:38px;
    padding:0 var(--sp-xl);
    border-radius:8px;
    font-family:'Inter', sans-serif;
    font-weight:600;
    cursor:pointer;
    border:1px solid transparent;
    white-space:nowrap;
  }
  .btn-primary{background:var(--amber); color:#1A1200; border-color:var(--amber);}
  .btn-primary:hover{filter:brightness(1.06);}
  .btn-primary:disabled{opacity:.5; cursor:not-allowed; filter:none;}
  .btn-ghost{background:transparent; color:var(--ink-dim); border-color:var(--line);}
  .btn-ghost:hover{color:var(--ink); border-color:var(--ink-dim);}
  .btn-text{
    height:auto; padding:0;
    background:none; color:var(--ink-dim);
    font-weight:500; font-size:var(--fs-base);
    text-decoration:underline; text-underline-offset:3px; text-decoration-color:var(--line);
  }
  .btn-text:hover{color:var(--amber); text-decoration-color:var(--amber);}

  /* Tabs */
  .tabs-wrap{
    margin:var(--sp-xl) 0 var(--sp-lg);
  }
  .tab-grid{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    padding:4px 0;
  }
  .tab-grid button{
    background:var(--surface);
    border:1px solid var(--line);
    color:var(--ink-dim);
    font-family:'Oswald', sans-serif;
    font-size:var(--fs-sm);
    letter-spacing:.01em;
    padding:5px 12px;
    cursor:pointer;
    border-radius:6px;
    white-space:nowrap;
    transition:all .15s;
  }
  .tab-grid button:hover{border-color:var(--ink-dim); color:var(--ink);}
  .tab-grid button.active{
    background:var(--amber); color:#1a1a1a;
    border-color:var(--amber); font-weight:500;
  }
  .tab-divider{
    width:1px; height:24px; background:var(--line);
    align-self:center; margin:0 4px;
  }

  /* Context bar — adapts per active tab */
  .context-bar{
    margin-top:var(--sp-lg);
    padding:10px 0;
    border-bottom:1px solid var(--line);
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    gap:10px;
    min-height:40px;
    animation:ctxFadeIn .2s ease;
  }
  .context-bar.empty{
    border-bottom:none; min-height:0; padding:4px 0;
  }
  @keyframes ctxFadeIn{
    from{opacity:0;transform:translateY(-4px)}
    to{opacity:1;transform:translateY(0)}
  }
  .ctx-label{
    font-family:'Inter',sans-serif;
    font-size:var(--fs-xs); font-weight:600;
    color:var(--ink-dim); text-transform:uppercase;
    letter-spacing:.06em; margin-right:2px;
  }
  .ctx-years{
    display:flex; flex-wrap:wrap; gap:4px; align-items:center;
  }
  .ctx-years button{
    background:var(--surface); border:1px solid var(--line); color:var(--ink-dim);
    font-family:'Oswald',sans-serif; font-size:var(--fs-sm);
    padding:4px 10px; cursor:pointer; border-radius:4px;
    white-space:nowrap; transition:all .15s;
  }
  .ctx-years button:hover{border-color:var(--ink-dim); color:var(--ink);}
  .ctx-years button.active{
    background:var(--amber); color:#1a1a1a; border-color:var(--amber); font-weight:500;
  }
  .ctx-years.multi button{
    padding-left:20px; position:relative;
  }
  .ctx-years.multi button::before{
    content:''; position:absolute; left:6px; top:50%; transform:translateY(-50%);
    width:10px; height:10px; border-radius:2px;
    border:1.5px solid var(--ink-dim); transition:all .15s;
  }
  .ctx-years.multi button.active::before{
    background:var(--amber); border-color:var(--amber);
    box-shadow:inset 0 0 0 1.5px #1a1a1a;
  }
  .ctx-years.multi button.active{
    background:rgba(206,184,136,.15); color:var(--ink); border-color:var(--amber);
  }
  .ctx-bulk{
    display:flex; gap:4px; align-items:center; margin-left:4px;
  }
  .ctx-bulk button{
    background:none; border:none; color:var(--ink-dim);
    font-family:'Inter',sans-serif; font-size:var(--fs-xs);
    cursor:pointer; text-decoration:underline; padding:2px 4px;
  }
  .ctx-bulk button:hover{color:var(--ink);}
  .ctx-bulk .sep{color:var(--line); font-size:var(--fs-xs);}
  .ctx-sep{
    width:1px; height:20px; background:var(--line); margin:0 6px;
  }
  .ctx-weeks{
    display:flex; gap:3px; align-items:center; flex-wrap:wrap;
  }
  .ctx-weeks button{
    background:none; border:1px solid transparent; color:var(--ink-dim);
    font-family:'Inter',sans-serif; font-size:var(--fs-xs); font-weight:500;
    padding:3px 7px; cursor:pointer; border-radius:10px;
    white-space:nowrap; transition:all .15s;
    min-width:24px; text-align:center;
  }
  .ctx-weeks button:hover{color:var(--ink); border-color:var(--line);}
  .ctx-weeks button.active{
    background:var(--amber); color:#1a1a1a; border-color:var(--amber); font-weight:600;
  }
  .ctx-weeks .week-sep{
    width:1px; height:14px; background:var(--line); margin:0 3px;
  }
  .ctx-info{
    font-family:'Inter',sans-serif; font-size:var(--fs-sm);
    color:var(--ink-dim); font-style:italic;
  }
  .ctx-info strong{color:var(--ink); font-weight:500; font-style:normal;}
  .ctx-refresh{
    margin-left:auto;
  }
  .ctx-refresh button{
    background:none; border:1px solid var(--line); color:var(--ink-dim);
    font-family:'Inter',sans-serif; font-size:var(--fs-xs);
    padding:4px 10px; cursor:pointer; border-radius:4px; transition:all .15s;
  }
  .ctx-refresh button:hover{border-color:var(--ink-dim); color:var(--ink);}

  /* Status / errors */
  .status{
    font-family:'Inter', sans-serif;
    color:var(--ink-dim);
    padding:var(--sp-xl) 0;
  }
  .error{
    background:var(--surface);
    border-left:3px solid var(--loss);
    border-radius:0 8px 8px 0;
    padding:var(--sp-lg) var(--sp-xl);
    line-height:1.55;
    color:var(--ink);
  }
  .error strong{color:var(--loss);}

  /* Standings table */
  table{width:100%; border-collapse:collapse; margin-bottom:1.5rem;}
  thead th{
    text-align:left;
    font-family:var(--font-mono);
    font-size:var(--fs-xs);
    letter-spacing:.07em;
    text-transform:uppercase;
    color:var(--ink-dim);
    padding:0 var(--sp-md) var(--sp-md);
    font-weight:500;
  }
  thead th.num, td.num{text-align:right;}
  tbody td{
    padding:var(--sp-lg) var(--sp-md);
    border-top:1px solid var(--line);
  }
  tbody tr:first-child td{border-top:none;}
  .rank{font-family:var(--font-mono); color:var(--ink-dim); width:26px;}
  .team-name{font-weight:600; font-family:'Inter', sans-serif;}
  .team-id{font-family:var(--font-mono); font-weight:400; font-size:var(--fs-sm); color:var(--ink-dim);}
  .owner-key{
    display:block;
    font-family:var(--font-mono);
    font-weight:400;
    font-size:var(--fs-xs);
    color:var(--ink-dim);
    word-break:break-all;
    margin-top:var(--sp-xs);
    -webkit-user-select:text;
    user-select:text;
  }
  td.num{font-family:var(--font-mono);}
  .pos-rank{display:inline-block; margin-left:var(--sp-sm); font-family:var(--font-mono); font-size:var(--fs-xs); color:var(--ink-dim); vertical-align:middle;}
  .pos-rank.top{color:var(--amber); font-weight:700;}

  .owner-ref{margin:var(--sp-xl) 0 1.5rem;}
  .owner-ref summary{
    cursor:pointer;
    font-family:'Oswald', sans-serif;
    font-size:var(--fs-base);
    color:var(--ink-dim);
    padding:var(--sp-md) 0;
    list-style:none;
  }
  .owner-ref summary::-webkit-details-marker{display:none;}
  .owner-ref summary::before{content:'▸ '; }
  .owner-ref[open] summary::before{content:'▾ ';}
  .owner-ref summary:hover{color:var(--ink);}
  .owner-ref table{font-size:var(--fs-sm);}
  .owner-ref td, .owner-ref th{padding:var(--sp-sm) var(--sp-md);}
  .owner-ref .oid{
    font-family:var(--font-mono);
    word-break:break-all;
    color:var(--ink-dim);
    -webkit-user-select:text;
    user-select:text;
  }
  .rec{white-space:nowrap;}

  /* Matchups */
  .matchup{
    background:var(--surface);
    border-radius:var(--radius);
    padding:var(--sp-xl) var(--sp-xl);
    margin-bottom:var(--sp-md);
    display:grid;
    grid-template-columns:1fr auto 1fr;
    align-items:center;
    gap:14px;
    color:inherit;
    text-decoration:none;
    transition:transform .12s ease, box-shadow .12s ease;
  }
  .matchup:hover{transform:translateY(-1px); box-shadow:0 4px 14px rgba(0,0,0,.18);}
  .side{display:flex; flex-direction:column; gap:3px;}
  .side.right{text-align:right; align-items:flex-end;}
  .side .nm{font-weight:600; font-size:var(--fs-base);}
  .side .pts{font-family:var(--font-mono); font-size:var(--fs-xl); font-weight:700;}
  .side.win .pts{color:var(--win);}
  .side.lose .pts{color:var(--ink-dim);}
  .vs{font-family:'Oswald', sans-serif; color:var(--ink-dim); font-size:var(--fs-sm);}

  /* Preview / Review */
  .placeholder-banner{
    background:var(--surface);
    border-left:3px solid var(--amber);
    border-radius:0 8px 8px 0;
    padding:var(--sp-lg) var(--sp-lg);
    font-size:var(--fs-sm);
    color:var(--ink-dim);
    line-height:1.55;
    margin-bottom:var(--sp-xl);
  }
  .spotlight-card{
    background:linear-gradient(135deg, var(--surface) 0%, var(--surface-2) 100%);
    border-radius:var(--radius);
    padding:var(--sp-xl) var(--sp-xl) var(--sp-lg);
    margin-bottom:var(--sp-lg);
  }
  .spotlight-label{
    font-family:var(--font-mono);
    font-size:var(--fs-xs);
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--amber);
  }
  .spotlight-matchup{
    font-family:'Oswald', sans-serif;
    font-weight:600;
    font-size:var(--fs-xl);
    margin:var(--sp-sm) 0 var(--sp-md);
  }
  .spotlight-banter{font-size:var(--fs-base); line-height:1.55; color:var(--ink);}

  .pr-matchup{
    background:var(--surface);
    border-radius:var(--radius);
    padding:var(--sp-xl) var(--sp-xl);
    margin-bottom:var(--sp-lg);
    display:block;
    color:inherit;
    text-decoration:none;
    transition:transform .12s ease, box-shadow .12s ease;
  }
  .pr-matchup:hover{transform:translateY(-1px); box-shadow:0 4px 14px rgba(0,0,0,.18);}
  .pr-matchup-teams{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    font-family:'Oswald', sans-serif;
    font-weight:600;
    font-size:var(--fs-md);
    margin-bottom:var(--sp-xs);
  }
  .pr-matchup-teams .vs-sep{color:var(--ink-dim); font-family:'Inter', sans-serif; font-weight:400; font-size:var(--fs-sm); margin:0 var(--sp-sm);}
  .pr-matchup-sub{font-family:var(--font-mono); font-size:var(--fs-sm); color:var(--ink-dim); margin-bottom:var(--sp-md);}
  .pr-matchup-banter{font-size:var(--fs-base); line-height:1.55; color:var(--ink); margin-top:var(--sp-md);}
  .pr-matchup-result{font-family:var(--font-mono); font-size:var(--fs-base); margin-top:var(--sp-xs);}
  .winner-name{color:var(--win); font-weight:700;}

  /* Awards */
  .award-grid{
    display:grid;
    grid-template-columns:1fr;
    gap:10px;
    margin-bottom:var(--sp-xl);
  }
  .award-card{
    background:var(--surface);
    border-radius:var(--radius);
    padding:var(--sp-xl) var(--sp-xl);
    display:grid;
    grid-template-columns:auto 1fr;
    gap:14px;
    align-items:center;
  }
  .award-emoji{font-size:var(--fs-xxl); line-height:1;}
  .award-title{
    font-family:'Oswald', sans-serif;
    font-weight:600;
    font-size:var(--fs-lg);
    letter-spacing:.01em;
  }
  .award-desc{font-size:var(--fs-sm); color:var(--ink-dim); margin-top:var(--sp-xs);}
  .award-winner{font-weight:600; font-size:var(--fs-base); margin-top:var(--sp-sm);}
  .award-detail{
    font-family:var(--font-mono);
    font-size:var(--fs-sm);
    color:var(--ink-dim);
    margin-top:var(--sp-xs);
  }

  /* Profile */
  .profile-header{
    background:linear-gradient(135deg, var(--surface) 0%, var(--surface-2) 100%);
    border-radius:var(--radius);
    padding:1.5rem var(--sp-xl);
    margin:var(--sp-xl) 0 var(--sp-xl);
  }
  .profile-name{
    font-family:'Oswald', sans-serif;
    font-weight:600;
    font-size:var(--fs-xxl);
    letter-spacing:.01em;
  }
  .profile-sub{font-size:var(--fs-sm); color:var(--ink-dim); margin-top:var(--sp-xs);}
  .profile-record{
    font-family:var(--font-mono);
    font-size:var(--fs-xxl);
    font-weight:700;
    color:var(--amber);
    margin-top:var(--sp-md);
  }
  .profile-record-label{font-size:var(--fs-sm); color:var(--ink-dim); text-transform:uppercase; letter-spacing:.06em;}

  .stat-tile-grid{
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:8px;
    margin-bottom:1.5rem;
  }
  .stat-tile{
    background:var(--surface);
    border-radius:var(--radius);
    padding:var(--sp-lg) var(--sp-lg);
  }
  .stat-tile-value{font-family:var(--font-mono); font-size:var(--fs-xl); font-weight:700;}
  .stat-tile-label{font-size:var(--fs-xs); color:var(--ink-dim); text-transform:uppercase; letter-spacing:.05em; margin-top:var(--sp-xs);}

  .profile-pair-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-bottom:1.5rem;
  }
  .profile-pair-card{
    background:var(--surface);
    border-radius:var(--radius);
    padding:var(--sp-lg) var(--sp-lg);
  }
  .profile-pair-label{font-size:var(--fs-xs); color:var(--ink-dim); text-transform:uppercase; letter-spacing:.05em;}
  .profile-pair-name{font-weight:600; font-size:var(--fs-base); margin-top:var(--sp-sm);}
  .profile-pair-detail{font-family:var(--font-mono); font-size:var(--fs-sm); color:var(--ink-dim); margin-top:var(--sp-xs);}

  .badge-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(56px, 1fr));
    gap:6px;
    margin:var(--sp-lg) 0 1.5rem;
  }
  .badge-card{
    background:var(--surface);
    border-radius:8px;
    padding:var(--sp-sm) var(--sp-xs) var(--sp-sm);
    text-align:center;
    position:relative;
  }
  .badge-card.locked{opacity:.32; filter:grayscale(1);}
  .badge-emoji{font-size:var(--fs-lg); display:block; margin-bottom:var(--sp-xs); line-height:1;}
  .badge-title{
    font-family:'Oswald', sans-serif;
    font-size:var(--fs-xs);
    line-height:1.15;
    color:var(--ink-dim);
  }
  .badge-card:not(.locked) .badge-title{color:var(--ink);}
  .badge-count{
    position:absolute;
    top:2px;
    right:3px;
    background:var(--amber);
    color:#1A1200;
    font-family:var(--font-mono);
    font-size:var(--fs-xs);
    font-weight:700;
    border-radius:6px;
    padding:0 var(--sp-xs);
  }

  /* History */
  .season-picker{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    margin:var(--sp-xl) 0 1.5rem;
  }
  .season-chip{
    display:inline-flex;
    align-items:center;
    gap:6px;
    background:var(--surface);
    border-radius:20px;
    padding:var(--sp-sm) var(--sp-lg) var(--sp-sm) var(--sp-md);
    font-family:var(--font-mono);
    font-size:var(--fs-sm);
    color:var(--ink-dim);
    cursor:pointer;
    user-select:none;
  }
  .season-chip:has(input:checked){color:var(--ink); background:var(--surface-2);}
  .season-chip input{margin:0; accent-color:var(--amber);}
  h2.section-title{
    font-family:'Oswald', sans-serif;
    font-weight:500;
    font-size:var(--fs-lg);
    letter-spacing:.01em;
    margin:0 0 var(--sp-sm);
  }

  <div id="h2hView" style="display:none;"></div><div id="eloView" style="display:none;"></div><div id="otdView" style="display:none;"></div><div id="whatifView" style="display:none;"></div><div id="recapView" style="display:none;"></div><div id="draftView" style="display:none;"></div><div id="waiversView" style="display:none;"></div><div id="bracketView" style="display:none;"></div><div id="trendsView" style="display:none;"></div>

<script>
// This app is built for one specific league — no need to expose the ID
// in the UI. Change it here if you ever repoint this deployment.
const LEAGUE_ID = '232506';

// Virtual select stand-ins (old DOM elements removed; context bar handles UI)
const viewSeasonSelect = { value: '', get innerHTML(){ return ''; }, set innerHTML(v){} };
const viewWeekSelect = { value: '', get innerHTML(){ return ''; }, set innerHTML(v){} };
const refreshBtn = { disabled: false };
let activeTabName = 'standings';
const statusArea = document.getElementById('statusArea');
const standingsView = document.getElementById('standingsView');
const matchupsView = document.getElementById('matchupsView');
const previewView = document.getElementById('previewView');
const reviewView = document.getElementById('reviewView');
const positionsView = document.getElementById('positionsView');
const awardsView = document.getElementById('awardsView');
const profileView = document.getElementById('profileView');
const profileManagerSelect = document.getElementById('profileManagerSelect');
const profileContent = document.getElementById('profileContent');
const historyView = document.getElementById('historyView');
const beltView = document.getElementById('beltView');
const recordBookView = document.getElementById('recordBookView');
  const milestonesView = document.getElementById('milestonesView');
  const h2hView = document.getElementById('h2hView');
  const eloView = document.getElementById('eloView');
const waiversView = document.getElementById('waiversView');
const bracketView = document.getElementById('bracketView');
const trendsView = document.getElementById('trendsView');
const histDownloadBtn = document.getElementById('histDownloadBtn');
const historyStatus = document.getElementById('historyStatus');
const historyContent = document.getElementById('historyContent');
const leagueTitle = document.getElementById('leagueTitle');
const weekChip = document.getElementById('weekChip');

// Build season dropdown: most recently completed season defaults selected.
// NFL seasons run roughly Sep -> Feb, so before ~August the "current" season
// on ESPN is still last year's completed one.
const now = new Date();
const currentCalendarYear = now.getFullYear();
const seasonInProgressCutoffMonth = 8; // August (1-indexed) - rough heuristic
const latestLikelySeason = now.getMonth() + 1 >= seasonInProgressCutoffMonth
  ? currentCalendarYear
  : currentCalendarYear - 1;

// Pre-2019 seasons now route through ESPN's older leagueHistory endpoint
// (see the proxy function) — this floor is just a sane default range, not
// a hard limit. Type any earlier year in "From season" if your league goes
// back further.
// Earliest season this league existed. Header chips always show the full
// range LEAGUE_FIRST_SEASON..latestLikelySeason; uncached older seasons are
// fetched on demand when their chip is checked.
const LEAGUE_FIRST_SEASON = 2016;

// ---------------------------------------------------------------
// Rename any team here — keys are the owner's ESPN member ID
// (team.primaryOwner), NOT the team ID. This is what actually stays tied
// to a person across seasons, even if their team ID changes or the ESPN
// team name changes every year. Find each owner's ID in the small tag
// under their name on the Standings tab (shows their ESPN display name
// too when available, purely as a hint — the ID string is the actual key).
// Teams left out just show whatever name ESPN has for them that season.
//
// This is just the fallback/default set, edited by hand in code. The
// easier way to manage renames day-to-day is data/team-names.json — it's
// loaded automatically on startup and overrides anything set here, and
// it's plain JSON so it's editable straight on GitHub's website, no code
// required. See loadTeamNameOverrides() below.
//
// Falls back to matching by team ID if a team has no primaryOwner for some
// reason, so this doesn't just silently do nothing in that edge case.
// ---------------------------------------------------------------
const TEAM_NAME_OVERRIDES = {
  // '{A1B2C3D4-E5F6-7890-ABCD-EF1234567890}': 'The Gridiron Gurus',
};

let state = { teams: [], schedule: [], currentWeek: null, leagueName: '', seasonYear: null, settings: {}, members: [] };
let history = { data: {}, loadedSeasons: [], checkedSeasons: new Set() };

function setTab(name){
  document.querySelectorAll('.tabs-wrap button').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
  standingsView.style.display = name === 'standings' ? '' : 'none';
  matchupsView.style.display = name === 'matchups' ? '' : 'none';
  previewView.style.display = name === 'preview' ? '' : 'none';
  reviewView.style.display = name === 'review' ? '' : 'none';
  positionsView.style.display = name === 'positions' ? '' : 'none';
  if (name === 'positions') renderPositions();
  awardsView.style.display = name === 'awards' ? '' : 'none';
  profileView.style.display = name === 'profile' ? '' : 'none';
  historyView.style.display = name === 'history' ? '' : 'none';
  beltView.style.display = name === 'belt' ? '' : 'none';
  if (name === 'belt') renderBeltContent();
  recordBookView.style.display = name === 'records' ? '' : 'none';
  if (name === 'records') renderRecordBookContent();
  milestonesView.style.display = name === 'milestones' ? '' : 'none';
  if (name === 'milestones') renderMilestonesContent();
  h2hView.style.display = name === 'h2h' ? '' : 'none';
  if (name === 'h2h') renderH2HContent();
  eloView.style.display = name === 'elo' ? '' : 'none';
  if (name === 'elo') renderEloContent();
  otdView.style.display = name === 'otd' ? '' : 'none';
  if (name === 'otd') renderOnThisDayContent();
  whatifView.style.display = name === 'whatif' ? '' : 'none';
  if (name === 'whatif') renderWhatIfContent();
  draftView.style.display = name === 'draft' ? '' : 'none';
  if (name === 'draft') renderDraftContent();
  waiversView.style.display = name === 'waivers' ? '' : 'none';
  if (name === 'waivers') renderWaiversTab();
  bracketView.style.display = name === 'bracket' ? '' : 'none';
  if (name === 'bracket') renderBracketTab();
  trendsView.style.display = name === 'trends' ? '' : 'none';
  if (name === 'trends') renderTrendsTab();
  activeTabName = name;
  updateContextBar();
}
document.querySelectorAll('.tabs-wrap button').forEach(b => b.addEventListener('click', () => setTab(b.dataset.tab)));

// ===== Context Bar =====
const CTX_TAB_CONFIG = {
  standings:'season', matchups:'season-week', preview:'season-week', review:'season-week',
  positions:'season-week', draft:'season', waivers:'season', bracket:'season', whatif:'season',
  awards:'multi', h2h:'multi', elo:'multi',
  profile:'all', history:'multi', records:'all', trends:'all',
  milestones:'all', otd:'all', belt:'multi'
};

function getAvailableYears(){
  const years = new Set(history.loadedSeasons);
  years.add(latestLikelySeason);
  for (let y = LEAGUE_FIRST_SEASON; y <= latestLikelySeason; y++) years.add(y);
  return [...years].sort((a, b) => a - b);
}

function getAvailableWeeks(){
  const weeks = [...new Set(state.schedule.map(g => g.matchupPeriodId))].sort((a, b) => a - b);
  return weeks;
}

function getPlayoffStartWeek(){
  const s = state.settings;
  const regLen = s?.scheduleSettings?.matchupPeriodCount || 14;
  return regLen + 1;
}

function updateContextBar(){
  const bar = document.getElementById('contextBar');
  if (!bar) return;
  const type = CTX_TAB_CONFIG[activeTabName] || 'season';
  const years = getAvailableYears();
  const selYear = state.seasonYear || years[years.length - 1];
  let html = '';

  bar.classList.remove('empty');

  if (type === 'season' || type === 'season-week') {
    html += '<span class="ctx-label">Season</span>';
    html += '<div class="ctx-years" id="ctxYears">';
    years.forEach(y => {
      const cls = y === selYear ? ' class="active"' : '';
      html += '<button data-year="'+y+'"'+cls+'>'+y+'</button>';
    });
    html += '</div>';

    if (type === 'season-week') {
      const weeks = getAvailableWeeks();
      const curWeek = viewWeekSelect.value ? parseInt(viewWeekSelect.value, 10) : (state.currentWeek || weeks[weeks.length-1] || 1);
      const poStart = getPlayoffStartWeek();
      html += '<span class="ctx-sep"></span>';
      html += '<span class="ctx-label">Week</span>';
      html += '<div class="ctx-weeks" id="ctxWeeks">';
      let addedSep = false;
      weeks.forEach(w => {
        if (w >= poStart && !addedSep) { html += '<span class="week-sep"></span>'; addedSep = true; }
        const cls = w === curWeek ? ' class="active"' : '';
        html += '<button data-week="'+w+'"'+cls+'>'+w+'</button>';
      });
      html += '</div>';
    }

    // Refresh button
    html += '<span class="ctx-refresh"><button id="ctxRefresh" title="Pull fresh data for this season">↻</button></span>';
  }
  else if (type === 'multi') {
    html += '<span class="ctx-label">Seasons</span>';
    html += '<div class="ctx-years multi" id="ctxYears">';
    years.forEach(y => {
      const cls = history.checkedSeasons.has(y) ? ' class="active"' : '';
      html += '<button data-year="'+y+'"'+cls+'>'+y+'</button>';
    });
    html += '</div>';
    html += '<div class="ctx-bulk">';
    html += '<button id="ctxBulkAll">All</button>';
    html += '<span class="sep">/</span>';
    html += '<button id="ctxBulkNone">None</button>';
    html += '</div>';
  }
  else if (type === 'all') {
    const n = history.loadedSeasons.length || 0;
    if (n > 0) {
      const minY = Math.min(...history.loadedSeasons);
      const maxY = Math.max(...history.loadedSeasons);
      html += '<span class="ctx-info">Showing all <strong>'+n+' seasons</strong> ('+minY+'\u2013'+maxY+')</span>';
    }
    bar.classList.add('empty');
  }

  bar.innerHTML = html;
  wireContextBarEvents(type);
}

function wireContextBarEvents(type){
  const bar = document.getElementById('contextBar');
  if (!bar) return;

  // Year clicks
  const yearsEl = document.getElementById('ctxYears');
  if (yearsEl) {
    yearsEl.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', () => {
        const yr = parseInt(btn.dataset.year, 10);
        if (type === 'multi') {
          // Toggle
          if (history.checkedSeasons.has(yr) && history.checkedSeasons.size > 1) {
            history.checkedSeasons.delete(yr);
          } else {
            if (!history.data[yr]) { selectSeason(yr, false); return; }
            history.checkedSeasons.add(yr);
          }
          activateNewestChecked();
          updateContextBar();
          rerenderActiveTab();
        } else {
          // Single select
          if (!history.data[yr]) { selectSeason(yr, false); return; }
          history.checkedSeasons = new Set([yr]);
          activateNewestChecked();
          updateContextBar();
          rerenderActiveTab();
        }
      });
    });
  }

  // Week clicks
  const weeksEl = document.getElementById('ctxWeeks');
  if (weeksEl) {
    weeksEl.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', () => {
        viewWeekSelect.value = btn.dataset.week;
        updateContextBar();
        rerenderActiveTab();
      });
    });
  }

  // Bulk controls
  const bulkAll = document.getElementById('ctxBulkAll');
  if (bulkAll) bulkAll.addEventListener('click', () => {
    history.loadedSeasons.forEach(y => { if (history.data[y]) history.checkedSeasons.add(y); });
    activateNewestChecked();
    updateContextBar();
    rerenderActiveTab();
  });
  const bulkNone = document.getElementById('ctxBulkNone');
  if (bulkNone) bulkNone.addEventListener('click', () => {
    const checked = Array.from(history.checkedSeasons).sort((a, b) => b - a);
    history.checkedSeasons = new Set([checked[0] || latestLikelySeason]);
    activateNewestChecked();
    updateContextBar();
    rerenderActiveTab();
  });

  // Refresh button
  const refBtn = document.getElementById('ctxRefresh');
  if (refBtn) refBtn.addEventListener('click', () => {
    selectSeason(state.seasonYear || parseInt(viewSeasonSelect.value, 10) || latestLikelySeason, true);
  });
}

// Re-render whichever tab is currently active (called on year/week change)
function rerenderActiveTab(){
  switch(activeTabName){
    case 'standings': renderStandings(); break;
    case 'matchups': renderMatchups(); break;
    case 'preview': renderPreview(); break;
    case 'review': renderReview(); break;
    case 'positions': renderPositions(); break;
    case 'draft': renderDraftContent(); break;
    case 'waivers': renderWaiversTab(); break;
    case 'bracket': renderBracketTab(); break;
    case 'whatif': renderWhatIfContent(); break;
    case 'awards': renderAwards(); break;
    case 'h2h': renderH2HContent(); break;
    case 'elo': renderEloContent(); break;
    case 'profile': renderProfile(); break;
    case 'records': renderRecordBookContent(); break;
    case 'trends': renderTrendsTab(); break;
    case 'milestones': renderMilestonesContent(); break;
    case 'otd': renderOnThisDayContent(); break;
    case 'belt': renderBeltContent(); break;
    case 'history': renderHistoryContent(); break;
  }
}

// ---- Draft recap / grades (Task 9) ----
const DRAFT_MIN_YEAR = 2018;
function draftAvailableYears(){
  const ys = [];
  const now = new Date().getFullYear();
  for (let y = now; y >= DRAFT_MIN_YEAR; y--) ys.push(y);
  return ys;
}

function buildDraftPlayerMap(data){
  const map = {};
  (data.players || []).forEach(entry => {
    const pl = entry.player || {};
    const r0 = (entry.ratings && entry.ratings["0"]) || {};
    map[entry.id] = {
      fullName: pl.fullName || ('Player ' + entry.id),
      posId: pl.defaultPositionId,
      pos: POSITION_NAMES[pl.defaultPositionId] || '?',
      positionalRanking: (typeof r0.positionalRanking === 'number' && r0.positionalRanking > 0) ? r0.positionalRanking : null,
      totalRanking: (typeof r0.totalRanking === 'number') ? r0.totalRanking : null,
      totalRating: (typeof r0.totalRating === 'number') ? r0.totalRating : null
    };
  });
  return map;
}

function draftTeamNameMap(data){
  const m = {};
  (data.teams || []).forEach(t => { m[t.id] = teamDisplayName(t); });
  return m;
}

// Steal/bust score: positional draft order vs. end-of-season positional rank.
// Positive = outperformed draft slot (steal); negative = underperformed (bust).
function gradeDraftPicks(picks, pmap){
  const posOrder = {}; // pos -> running count of how many at that pos drafted so far
  const graded = [];
  picks.slice().sort((a,b)=> (a.overallPickNumber||0)-(b.overallPickNumber||0)).forEach(pk => {
    const info = pmap[pk.playerId];
    if (!info) return;
    posOrder[info.pos] = (posOrder[info.pos] || 0) + 1;
    const draftPosRank = posOrder[info.pos]; // Nth at this position taken in the draft
    const endPosRank = info.positionalRanking;
    let delta = null;
    if (endPosRank != null) delta = draftPosRank - endPosRank; // >0 steal, <0 bust
    graded.push({ pk, info, draftPosRank, endPosRank, delta });
  });
  return graded;
}

async function renderDraftContent(){
  const view = document.getElementById('draftView');
  if (!view) return;
  view.innerHTML = '<div id="draftBody"></div>';
  renderDraftBody();
}

// Reusable: compute draft superlatives (data-only) for a given year.
// Returns { supl: [{emoji,title,desc,winner,detail}], tmap } or null if no draft data.
// Reuses fetchDraftData cache, so calling from multiple tabs is cheap.
async function computeDraftSuperlatives(year){
  const data = await fetchDraftData(year);
  if (!data || !data.draftDetail || !Array.isArray(data.draftDetail.picks) || !data.draftDetail.picks.length) return null;
  const pmap = buildDraftPlayerMap(data);
  const tmap = draftTeamNameMap(data);
  const graded = gradeDraftPicks(data.draftDetail.picks, pmap);
  const rated = graded.filter(g => g.delta != null);
  const ownerTally = {};
  graded.forEach(g => {
    if (g.delta == null) return;
    const info = g.info;
    const who = tmap[g.pk.teamId] || ('Team ' + g.pk.teamId);
    const rec = ownerTally[who] || (ownerTally[who] = { steals: 0, busts: 0 });
    if (g.delta >= 15) rec.steals++;
    else if (g.delta <= -15 && info.posId !== 5 && info.posId !== 16) rec.busts++;
  });
  const tallyRows = Object.keys(ownerTally)
    .map(who => ({ who: who, steals: ownerTally[who].steals, busts: ownerTally[who].busts }))
    .sort((a,b)=> (b.steals - b.busts) - (a.steals - a.busts) || b.steals - a.steals);

  const supl = [];
  const isKD = info => info.posId === 5 || info.posId === 16;
  if (rated.length){
    const g = rated.slice().sort((a,b)=> b.delta - a.delta)[0];
    if (g && g.delta >= 8){
      supl.push({emoji:'\ud83c\udfc6', title:'Heist of the Draft', desc:'Biggest single-pick steal',
        winner: g.info.fullName + ' (' + g.info.pos + ')',
        detail: (tmap[g.pk.teamId]||('Team '+g.pk.teamId)) + ' \u00b7 pick ' + (g.pk.overallPickNumber||'?') + ' \u00b7 +' + g.delta + ' spots'});
    }
  }
  {
    const pool = rated.filter(g => !isKD(g.info));
    const g = pool.slice().sort((a,b)=> a.delta - b.delta)[0];
    if (g && g.delta <= -8){
      supl.push({emoji:'\ud83e\udd26', title:'Reach of the Draft', desc:'Biggest single-pick bust',
        winner: g.info.fullName + ' (' + g.info.pos + ')',
        detail: (tmap[g.pk.teamId]||('Team '+g.pk.teamId)) + ' \u00b7 pick ' + (g.pk.overallPickNumber||'?') + ' \u00b7 ' + g.delta + ' spots'});
    }
  }
  const ownerStats = {};
  rated.forEach(g => {
    const who = tmap[g.pk.teamId] || ('Team ' + g.pk.teamId);
    const st = ownerStats[who] || (ownerStats[who] = {sumAbs:0, n:0});
    st.sumAbs += Math.abs(g.delta); st.n++;
  });
  if (tallyRows.length){
    const r = tallyRows[0];
    if ((r.steals - r.busts) > 0)
      supl.push({emoji:'\ud83e\udde0', title:'Best Drafter', desc:'Best net steals minus busts',
        winner: r.who, detail: '+' + (r.steals - r.busts) + ' net \u00b7 ' + r.steals + ' steals, ' + r.busts + ' busts'});
  }
  {
    const bob = tallyRows.slice().sort((a,b)=> (b.steals+b.busts) - (a.steals+a.busts))[0];
    if (bob && (bob.steals + bob.busts) > 0)
      supl.push({emoji:'\ud83c\udfa2', title:'Boom or Bust', desc:'Most steals and busts combined',
        winner: bob.who, detail: (bob.steals + bob.busts) + ' swings \u00b7 ' + bob.steals + ' steals, ' + bob.busts + ' busts'});
  }
  {
    const cand = Object.keys(ownerStats).map(w => ({who:w, avg: ownerStats[w].sumAbs/ownerStats[w].n, n: ownerStats[w].n}))
      .filter(o => o.n >= 4).sort((a,b)=> a.avg - b.avg)[0];
    if (cand)
      supl.push({emoji:'\ud83c\udfaf', title:'Mr. Consistent', desc:'Smallest average draft-vs-finish gap',
        winner: cand.who, detail: cand.avg.toFixed(1) + ' avg spots off \u00b7 ' + cand.n + ' picks'});
  }
  {
    const early = rated.filter(g => !isKD(g.info) && (g.pk.roundId === 1 || g.pk.roundId === 2));
    const g = early.slice().sort((a,b)=> a.delta - b.delta)[0];
    if (g && g.delta <= -5)
      supl.push({emoji:'\ud83d\udcb8', title:'Early Round Whiff', desc:'Biggest Round 1-2 bust',
        winner: g.info.fullName + ' (' + g.info.pos + ')',
        detail: (tmap[g.pk.teamId]||('Team '+g.pk.teamId)) + ' \u00b7 R' + g.pk.roundId + ' pick ' + (g.pk.overallPickNumber||'?') + ' \u00b7 ' + g.delta + ' spots'});
  }
  return { supl: supl, tmap: tmap };
}

async function renderDraftBody(){
  const body = document.getElementById('draftBody');
  const year = state.seasonYear || document.getElementById('draftYearSel')?.value || latestLikelySeason;
  body.innerHTML = '<p>Loading draft data\u2026</p>';
  const data = await fetchDraftData(year);
  if (!data || !data.draftDetail || !Array.isArray(data.draftDetail.picks) || !data.draftDetail.picks.length){
    body.innerHTML = '<p>No draft data available for ' + year + '.</p>';
    return;
  }
  const pmap = buildDraftPlayerMap(data);
  const tmap = draftTeamNameMap(data);
  const picks = data.draftDetail.picks;
  const graded = gradeDraftPicks(picks, pmap);

  // Steals & busts (only picks with an end-of-season positional rank)
  const rated = graded.filter(g => g.delta != null);
  const steals = rated.slice().sort((a,b)=> b.delta - a.delta).slice(0,10);
  const busts  = rated.slice().sort((a,b)=> a.delta - b.delta).slice(0,10);

  function pickRow(g){
    const pk = g.pk, info = g.info;
    const who = tmap[pk.teamId] || ('Team ' + pk.teamId);
    const rank = info.positionalRanking != null ? (info.pos + info.positionalRanking) : '\u2014';
    let tag = '';
    if (g.delta != null){
      if (g.delta >= 15) tag = ' <span class="draft-chip draft-chip-steal">STEAL</span>';
      else if (g.delta <= -15 && info.posId !== 5 && info.posId !== 16) tag = ' <span class="draft-chip draft-chip-bust">BUST</span>';
    }
    return '<tr><td>' + (pk.overallPickNumber||'') + '</td><td>' + escapeHtml(info.fullName)
         + '</td><td>' + info.pos + '</td><td>' + escapeHtml(who) + '</td><td>' + rank + tag + '</td></tr>';
  }

  // Group by round
  const rounds = {};
  picks.forEach(pk => { (rounds[pk.roundId] = rounds[pk.roundId] || []).push(pk); });
  const gByPlayer = {};
  graded.forEach(g => { gByPlayer[g.pk.playerId + ':' + g.pk.overallPickNumber] = g; });

  // Count steals & busts drafted by each owner (same thresholds as pick tags)
  const ownerTally = {};
  graded.forEach(g => {
    if (g.delta == null) return;
    const info = g.info;
    const who = tmap[g.pk.teamId] || ('Team ' + g.pk.teamId);
    const rec = ownerTally[who] || (ownerTally[who] = { steals: 0, busts: 0 });
    if (g.delta >= 15) rec.steals++;
    else if (g.delta <= -15 && info.posId !== 5 && info.posId !== 16) rec.busts++;
  });
  const tallyRows = Object.keys(ownerTally)
    .map(who => ({ who: who, steals: ownerTally[who].steals, busts: ownerTally[who].busts }))
    .sort((a,b)=> (b.steals - b.busts) - (a.steals - a.busts) || b.steals - a.steals);

  let html = '';
  html += '<p class="draft-legend">'
        + '<span class="draft-chip draft-chip-steal">Steal</span> drafted &ge; 15 spots below where the player finished at their position. '
        + '<span class="draft-chip draft-chip-bust">Bust</span> drafted &ge; 15 spots above their final position rank (kickers &amp; defenses excluded).'
        + '</p>';

  // ---- Draft Superlatives (computed via shared helper; render below) ----
  const _dsl = await computeDraftSuperlatives(year);
  const supl = (_dsl && _dsl.supl) || [];
  if (supl.length){
    html += '<h3>Draft Superlatives</h3><div class="award-grid">'
      + supl.map(a => '<div class="award-card">'
          + '<div class="award-emoji">' + a.emoji + '</div><div>'
          + '<div class="award-title">' + escapeHtml(a.title) + '</div>'
          + '<div class="award-desc">' + escapeHtml(a.desc) + '</div>'
          + '<div class="award-winner">' + escapeHtml(a.winner) + '</div>'
          + '<div class="award-detail">' + escapeHtml(a.detail) + '</div>'
          + '</div></div>').join('')
      + '</div>';
  }
  html += '<h3>Steals &amp; Busts by Owner</h3><table class="data"><thead><tr><th>Owner</th><th>Steals</th><th>Busts</th></tr></thead><tbody>'
        + tallyRows.map(r => '<tr><td>' + escapeHtml(r.who)
            + '</td><td>' + (r.steals ? '<span class="draft-chip draft-chip-steal">' + r.steals + '</span>' : '\u2014')
            + '</td><td>' + (r.busts ? '<span class="draft-chip draft-chip-bust">' + r.busts + '</span>' : '\u2014')
            + '</td></tr>').join('') + '</tbody></table>';

  html += '<h3>Full Draft Board</h3>';
  Object.keys(rounds).map(Number).sort((a,b)=>a-b).forEach(rd => {
    html += '<h4>Round ' + rd + '</h4>';
    html += '<table class="data"><thead><tr><th>Pick</th><th>Player</th><th>Pos</th><th>Team</th><th>End Rank</th></tr></thead><tbody>';
    rounds[rd].slice().sort((a,b)=>(a.overallPickNumber||0)-(b.overallPickNumber||0)).forEach(pk => {
      const g = gByPlayer[pk.playerId + ':' + pk.overallPickNumber];
      if (g) html += pickRow(g);
      else {
        const info = pmap[pk.playerId] || { fullName: 'Player ' + pk.playerId, pos: '?' };
        html += '<tr><td>' + (pk.overallPickNumber||'') + '</td><td>' + escapeHtml(info.fullName)
             + '</td><td>' + info.pos + '</td><td>' + escapeHtml(tmap[pk.teamId] || ('Team ' + pk.teamId))
             + '</td><td>\u2014</td></tr>';
      }
    });
    html += '</tbody></table>';
  });
  body.innerHTML = html;
}


function ownerKey(t){
  return t.primaryOwner || ('teamid:' + t.id); // fallback if a team has no owner on record
}

// Maps a raw owner GUID to a canonical one, for merging duplicate ESPN
// accounts belonging to the same real person (e.g. someone who joined
// under a second account in some seasons). Loaded from
// data/owner-aliases.json — {"<duplicate GUID>": "<canonical GUID>"}.
// Anything not listed just maps to itself.
let OWNER_ALIASES = {};

// This is the identity actually used for grouping/display everywhere
// (teamDisplayName, History all-time, Awards year-over-
// year) — raw ownerKey() is still used on its own only by the Owner ID
// reference table, since that table's job is to show the raw, pre-alias
// GUIDs so you know what to put into owner-aliases.json in the first place.
function resolvedOwnerKey(t){
  const raw = ownerKey(t);
  return OWNER_ALIASES[raw] || raw;
}

// Builds a {teamId: resolvedOwnerKey} lookup for one season's teams array.
// Needed anywhere a numeric team ID from schedule/bracket data (which only
// makes sense within a single season) has to be translated into the
// stable cross-season identity before it's used to accumulate multi-season
// stats — otherwise two different owners who held the same team ID slot
// in different years (or the same owner across two different accounts)
// get scattered across separate rows instead of merged into one.
function idToOwnerKeyMap(teams){
  const m = {};
  teams.forEach(t => { m[t.id] = resolvedOwnerKey(t); });
  return m;
}

function teamDisplayName(t){
  const key = resolvedOwnerKey(t);
  if (TEAM_NAME_OVERRIDES[key] !== undefined) return TEAM_NAME_OVERRIDES[key];
  if (t.name) return t.name;
  const loc = t.location || '';
  const nick = t.nickname || '';
  return (loc + ' ' + nick).trim() || ('Team ' + t.id);
}

// ESPN's league response sometimes includes a top-level "members" array
// (id/displayName pairs) alongside teams — when it's there, this gives a
// human-readable hint on Standings next to the raw owner ID. When it's
// not there, the raw ID still works fine as the override key, it's just
// less friendly to look at while you're setting names up.
function ownerDisplayHint(t, members){
  const m = (members || []).find(mm => mm.id === t.primaryOwner);
  if (!m) return null;
  return m.displayName || [m.firstName, m.lastName].filter(Boolean).join(' ') || null;
}

// Loads data/team-names.json (a plain {"<espnTeamId>": "Custom Name"} map)
// and merges it into TEAM_NAME_OVERRIDES — its entries win over anything
// hardcoded above. Missing file, empty file, or invalid JSON all just mean
// "no overrides from the file" rather than an error. Since this can finish
// after the first render, it re-renders whatever's already on screen so
// names update immediately rather than needing a manual reload.
async function loadTeamNameOverrides(){
  try {
    const res = await fetch('./data/team-names.json');
    if (!res.ok) return;
    const map = await res.json();
    if (!map || typeof map !== 'object') return;
    Object.assign(TEAM_NAME_OVERRIDES, map);
  } catch (e) {
    return; // no file yet, or it's malformed — fall back silently
  }

  if (state.teams.length) { renderStandings(); renderMatchups(); }
  renderAwards();
  renderProfile();
  if (history.loadedSeasons.length) renderHistoryContent();
}
loadTeamNameOverrides();

// Loads data/owner-aliases.json (a plain {"<duplicate GUID>": "<canonical
// GUID>"} map) and merges it into OWNER_ALIASES — see resolvedOwnerKey()
// above for how it's used. Same silent-fallback behavior as the other data
// files: missing/empty/invalid just means no aliases, not an error.
async function loadOwnerAliases(){
  try {
    const res = await fetch('./data/owner-aliases.json');
    if (!res.ok) return;
    const map = await res.json();
    if (!map || typeof map !== 'object') return;
    Object.assign(OWNER_ALIASES, map);
  } catch (e) {
    return;
  }

  if (state.teams.length) { renderStandings(); renderMatchups(); }
  if (history.loadedSeasons.length) {
    refreshSeasonDependentViews();
  } else {
    renderAwards();
  }
  renderProfile();
}
loadOwnerAliases();

async function selectSeason(year, forceLive){
  refreshBtn.disabled = true;
  statusArea.innerHTML = '<div class="status">Loading ' + year + (forceLive ? ' (live)' : '') + '…</div>';

  const result = await fetchHistorySeason(LEAGUE_ID, year, forceLive);

  if (!result.ok) {
    if (result.status === 401 || result.status === 403) {
      statusArea.innerHTML = privateLeagueMessage();
    } else if (result.status === 404 && !result.hasPayload) {
      statusArea.innerHTML = '<div class="error"><strong>Proxy function not found.</strong> ' +
        'This page needs to be deployed to Cloudflare Workers (with wrangler.jsonc and src/worker.js intact) for ' +
        'league data to load — opening index.html directly, or hosting on plain GitHub Pages, won\'t run ' +
        'the proxy. See the README for deploy steps.</div>';
    } else {
      statusArea.innerHTML = '<div class="error"><strong>Couldn\'t load ' + year + '.</strong> ' + escapeHtml(result.reason || 'Unknown error') + '</div>';
    }
    refreshBtn.disabled = false;
    return;

    history.loadedSeasons.push(year);
    history.loadedSeasons.sort((a, b) => a - b);

  history.checkedSeasons.add(year);

  activateNewestChecked();

  statusArea.innerHTML = '';
  refreshBtn.disabled = false;
