// against real data (no network access here to test). This tries a
// couple of plausible field paths and standard ESPN ID mappings, but if
// it comes back with all zeros or an empty table, that means the actual
// shape differs from what's assumed here — see the diagnostic message
// below for what to check. This is the same "verify against reality"
// situation we hit with trade transactions earlier.
// ---------------------------------------------------------------

const POSITION_NAMES = { 1: 'QB', 2: 'RB', 3: 'WR', 4: 'TE', 5: 'K', 16: 'D/ST' };
const BENCH_SLOTS = new Set([20, 21, 24]); // Bench, IR, and a second IR slot some leagues have
const rosterDataCache = {}; // year -> raw data with box score info, once fetched

async function fetchRosterData(year){
  if (rosterDataCache[year]) return rosterDataCache[year];

  const proxyUrl = '/api/espn-proxy?leagueId=' + encodeURIComponent(LEAGUE_ID) +
                    '&season=' + encodeURIComponent(year) + '&roster=1';
  try {
    const res = await fetch(proxyUrl, { headers: { 'Accept': 'application/json' } });
    const payload = await res.json().catch(() => null);
    if (!res.ok || !payload) return null;
    rosterDataCache[year] = payload;
    return payload;
  } catch (e) {
    return null;
  }
}

const draftDataCache = {}; // year -> raw data with draftDetail + players
async function fetchDraftData(year){
  if (draftDataCache[year]) return draftDataCache[year];
  const proxyUrl = '/api/espn-proxy?leagueId=' + encodeURIComponent(LEAGUE_ID) +
                    '&season=' + encodeURIComponent(year) + '&draft=1';
  try {
    const res = await fetch(proxyUrl, { headers: { 'Accept': 'application/json' } });
    const payload = await res.json().catch(() => null);
    if (!res.ok || !payload) return null;
    draftDataCache[year] = payload;
    return payload;
  } catch (e) {
    return null;
  }
}

// Pulls a per-team roster-with-points array out of one schedule/box-score
// entry, trying a couple of plausible field names since this isn't
// verified against real data yet.
function extractRosterEntries(sideObj){
  if (!sideObj) return null;
  const candidates = [
    sideObj.rosterForCurrentScoringPeriod,
    sideObj.rosterForMatchupPeriod,
  ];
  for (const c of candidates) {
    if (c && Array.isArray(c.entries)) return c.entries;
  }
  return null;
}

function computePositionalTotals(data){
  const teams = data.teams || [];
  const nameById = {};
  teams.forEach(t => { nameById[t.id] = teamDisplayName(t); });

  const totals = {}; // teamId -> { QB:0, RB:0, ... }
  teams.forEach(t => { totals[t.id] = {}; });

  let foundAnyRosterData = false;

  (data.schedule || []).forEach(g => {
    [{ side: g.home, teamId: g.home?.teamId }, { side: g.away, teamId: g.away?.teamId }].forEach(({ side, teamId }) => {
      if (!teamId || !totals[teamId]) return;
      const entries = extractRosterEntries(side);
      if (!entries) return;
      foundAnyRosterData = true;

      entries.forEach(entry => {
        if (BENCH_SLOTS.has(entry.lineupSlotId)) return; // only started players count
        const player = entry.playerPoolEntry?.player;
        if (!player) return;
        const posName = POSITION_NAMES[player.defaultPositionId];
        if (!posName) return; // FLEX/OP/IDP etc. not in the standard set — skipped rather than guessed at

        const pts = entry.playerPoolEntry?.appliedStatTotal ?? 0;
        totals[teamId][posName] = (totals[teamId][posName] || 0) + pts;
      });
    });
  });

  return { totals, nameById, foundAnyRosterData };
}

async function renderPositions(){
  if (!state.seasonYear) {
    positionsView.innerHTML = '<div class="status">Load a league first.</div>';
    return;
  }

  // Determine which seasons drive this view: checked seasons from the picker,
  // or fall back to the single active season if none are checked.
  const checked = history.loadedSeasons.filter(y => history.checkedSeasons.has(y));
  const seasons = checked.length ? checked.slice().sort((a, b) => a - b) : [state.seasonYear];
  const aggregated = seasons.length > 1;
  const picker = '';  // in-view picker removed; header chips drive season selection

  // Owner-keyed accumulator so identity is stable across seasons.
  const acc = {};        // ownerKey -> { QB:0, RB:0, ... }
  const nameByKey = {};  // ownerKey -> display name
  let foundAny = false;

  for (const yr of seasons) {
    positionsView.innerHTML = picker +
      '<div class="status">Loading roster data for ' + yr + '??? this pulls every team\'s weekly lineup, so it can take a few seconds.</div>';

    const data = await fetchRosterData(yr);
    if (!data) {
      positionsView.innerHTML = picker +
        '<div class="error"><strong>Couldn\'t load roster data for ' + yr + '.</strong> The proxy request failed ??" try again, or check the season is valid.</div>';
      wirePositionsPicker();
      return;
    }

    const { totals, foundAnyRosterData } = computePositionalTotals(data);
    if (foundAnyRosterData) foundAny = true;
    const keyById = idToOwnerKeyMap(data.teams || []);

    Object.keys(totals).forEach(teamId => {
      const key = keyById[teamId] || teamId;
      if (!acc[key]) acc[key] = {};
      const src = totals[teamId];
      Object.keys(src).forEach(p => { acc[key][p] = (acc[key][p] || 0) + (src[p] || 0); });
      if (!nameByKey[key]) {
        const t = (data.teams || []).find(tm => String(tm.id) === String(teamId));
        if (t) nameByKey[key] = teamDisplayName(t);
      }
    });
  }

  if (!foundAny) {
    positionsView.innerHTML = picker +
      '<div class="error"><strong>No roster data found in the response.</strong> ' +
      'This means ESPN\'s box-score field names are different from what this tab assumes (it looks for ' +
      '<code>rosterForCurrentScoringPeriod</code> or <code>rosterForMatchupPeriod</code> on each matchup). ' +
      'To fix this, visit <code>/api/espn-proxy?leagueId=' + escapeHtml(LEAGUE_ID) + '&season=' + seasons[0] + '&roster=1</code> ' +
      'directly in Safari, find a <code>schedule</code> entry, and check what field actually holds the per-player roster/points data ??" ' +
      'then send me what you find and I\'ll fix the field name.</div>';
    wirePositionsPicker();
    return;
  }

  const positions = ['QB', 'RB', 'WR', 'TE', 'K', 'D/ST'];
  const keys = Object.keys(acc);
  const rows = keys.map(key => {
    const t = acc[key];
    const total = positions.reduce((s, p) => s + (t[p] || 0), 0);
    return { key, name: nameByKey[key] || key, t, total };
  }).sort((a, b) => b.total - a.total);

  // Per-position rank across the aggregated totals (all-time positional rank).
  const posRank = {}; // posRank[position][ownerKey] = 1-based rank
  positions.forEach(p => {
    posRank[p] = {};
    keys.slice()
      .sort((a, b) => (acc[b][p] || 0) - (acc[a][p] || 0))
      .forEach((key, i) => { posRank[p][key] = i + 1; });
  });

  const header = '<th></th><th>Team</th>' + positions.map(p => '<th class="num">' + p + '</th>').join('') + '<th class="num">Total</th>';
  const body = rows.map((r, i) => '<tr>' +
    '<td class="rank">' + (i + 1) + '</td>' +
    '<td class="team-name">' + escapeHtml(r.name) + '</td>' +
    positions.map(p => '<td class="num">' + (r.t[p] ? r.t[p].toFixed(1) + '<span class="pos-rank' + (posRank[p][r.key] === 1 ? ' top' : '') + '">#' + posRank[p][r.key] + '</span>' : '??"') + '</td>').join('') +
    '<td class="num" style="font-weight:700;">' + r.total.toFixed(1) + '</td>' +
    '</tr>'
  ).join('');

  const noteScope = aggregated
    ? ('all-time across ' + seasons.length + ' seasons (' + seasons[0] + '??"' + seasons[seasons.length - 1] + ')')
    : (seasons[0] + ' season');
  positionsView.innerHTML = picker +
    '<p class="section-note">Total points scored by each team\'s STARTED players at each position, ' + noteScope + '. ' +
    'FLEX/superflex starts count toward the player\'s actual position, not as a separate column.' +
    (aggregated ? ' Position rank badges reflect all-time totals.' : '') + '</p>' +
    '<div class="h2h-scroll"><table data-sortable><thead><tr>' + header + '</tr></thead><tbody>' + body + '</tbody></table></div>';

  wirePositionsPicker();
}

function wirePositionsPicker(){
  positionsView.querySelectorAll('.season-chip input').forEach(cb => {
    cb.addEventListener('change', () => {
      const yr = Number(cb.dataset.year);
      if (cb.checked) history.checkedSeasons.add(yr);
      else history.checkedSeasons.delete(yr);
      refreshSeasonDependentViews();
    });
  });
}
// Collects each team's score for every *completed* week (skips the
// in-progress week so partial scores don't skew the trend).
function weeklyScoresByTeam(){
  const byTeam = {};
  state.teams.forEach(t => byTeam[t.id] = []);

  state.schedule.forEach(g => {
    if (!g.winner || g.winner === 'UNDECIDED') return; // not finished yet
    [g.home, g.away].forEach(side => {
      if (!side || !byTeam[side.teamId]) return;
      byTeam[side.teamId].push({ week: g.matchupPeriodId, points: side.totalPoints ?? 0 });
    });
  });

  Object.values(byTeam).forEach(weeks => weeks.sort((a, b) => a.week - b.week));
  return byTeam;
}

// Same idea, but strings multiple seasons together into one continuous
// timeline (a global "idx" instead of raw week number, since week numbers
// reset every season). Used for the all-time / select-years power view.
function weeklyScoresAcrossSeasons(years){
  const points = []; // chronological list of {year, week}
  years.forEach(year => {
    const sched = (history.data[year].schedule || []);
    const weeks = [...new Set(sched
      .filter(g => g.winner && g.winner !== 'UNDECIDED')
      .map(g => g.matchupPeriodId))].sort((a, b) => a - b);
    weeks.forEach(w => points.push({ year, week: w }));
  });
  const idxOf = {};
  points.forEach((p, i) => idxOf[p.year + '-' + p.week] = i);

  const byTeam = {};
  const teamsMeta = {}; // ownerKey -> most recently seen team object (for display name lookup)
  years.forEach(year => {
    const data = history.data[year];
    const teams = data.teams || [];
    const ownerById = idToOwnerKeyMap(teams);
    teams.forEach(t => {
      const ok = ownerById[t.id];
      teamsMeta[ok] = t;
      if (!byTeam[ok]) byTeam[ok] = [];
    });
    (data.schedule || []).forEach(g => {
      if (!g.winner || g.winner === 'UNDECIDED' || !g.home || !g.away) return;
      const idx = idxOf[year + '-' + g.matchupPeriodId];
      [g.home, g.away].forEach(side => {
        const ok = ownerById[side.teamId];
        if (!ok) return;
        if (!byTeam[ok]) byTeam[ok] = [];
        byTeam[ok].push({ idx, points: side.totalPoints ?? 0, year, week: g.matchupPeriodId });
      });
    });
  });
  Object.values(byTeam).forEach(arr => arr.sort((a, b) => a.idx - b.idx));

  const seasonBoundaries = [];
  let lastYear = null;
  points.forEach((p, i) => { if (p.year !== lastYear) { seasonBoundaries.push({ idx: i, year: p.year }); lastYear = p.year; } });

  return { byTeam, teamsMeta, seasonBoundaries, totalPoints: points.length };
}

// Power score = weighted blend of recent form (last 2 games) and season
// average, weighted toward recent form. Same idea most fantasy power
// ranking tools use. Works the same whether "weeks" spans one season or
// several strung together.
function powerScore(weeks){
  if (!weeks.length) return null;
  const seasonAvg = weeks.reduce((s, w) => s + w.points, 0) / weeks.length;
  const recent = weeks.slice(-2);
  const recentAvg = recent.reduce((s, w) => s + w.points, 0) / recent.length;
  return recentAvg * 0.6 + seasonAvg * 0.4;
}

function colorForIndex(i, total){
  const hue = Math.round((i * 360) / Math.max(total, 1));
  return `hsl(${hue} 65% 62%)`;
}

// Sums wins/losses/ties directly from each season's team record (reliable,
// same field the Standings tab uses) rather than re-deriving them from
// schedule results.
function allTimeRecordTotals(years){
  const totals = {};
  years.forEach(year => {
    (history.data[year].teams || []).forEach(t => {
      const key = resolvedOwnerKey(t);
      const r = t.record?.overall || {};
      const cur = totals[key] || (totals[key] = { wins: 0, losses: 0, ties: 0 });
      cur.wins += r.wins || 0; cur.losses += r.losses || 0; cur.ties += r.ties || 0;
    });
  });
  return totals;
}

function rankAllTime(years, byTeam, teamsMeta){
  const recordTotals = allTimeRecordTotals(years);
  const teamIds = Object.keys(teamsMeta);

  const metrics = teamIds.map(id => {
    const rec = recordTotals[id] || { wins: 0, losses: 0, ties: 0 };
    const gp = rec.wins + rec.losses + rec.ties;
    if (!gp) return null;
    const games = byTeam[id] || [];
    const avgPts = games.length ? games.reduce((s, w) => s + w.points, 0) / games.length : 0;
    const winPct = (rec.wins + rec.ties * 0.5) / gp;
    return { id, name: teamDisplayName(teamsMeta[id]), avgPts, winPct };
  }).filter(Boolean);

  if (!metrics.length) return [];

  const ptsValues = metrics.map(m => m.avgPts);
  const minPts = Math.min(...ptsValues), maxPts = Math.max(...ptsValues);
  const normPts = v => maxPts > minPts ? (v - minPts) / (maxPts - minPts) : 0.5;

  return metrics
    .map(m => ({ id: m.id, name: m.name, score: (m.winPct * 0.6 + normPts(m.avgPts) * 0.4) * 100 }))
    .sort((a, b) => b.score - a.score);
}

// Awards. Works from the same single-season-vs-history split as Power

const AWARDS_HEADER = '<h2 class="section-title">Awards <button type="button" class="award-count-btn" onclick="openAwardGlossary()" title="What does each award mean?">Award Glossary</button></h2>';

function renderAwardsMultiSeason(){

const TRADE_AWARDS_NOTE = '<p class="section-note">Trade Machine reflects how many trades each team made — ESPN\'s API only exposes that count, not who traded with whom, when, or which players, so there\'s no "who won the trade" evaluation here.</p>';

// Awards are always computed for a single season at a time — no pooling
// across years, so "highest score" etc. means highest in that season, not
// of all time. With multiple seasons checked, each gets its own section.
function renderAwardsSection(year, teams, schedule, settings, showHeading){
  const awards = computeAwards(year, teams, schedule, settings);
  const heading = showHeading ? '<h2 class="section-title">' + year + '</h2>' : '';

  if (!awards || !awards.length) {
    return heading + '<div class="status">Not enough completed games in ' + year + ' yet.</div>';
  }

  const cards = awards.map(a =>
    '<div class="award-card" role="button" tabindex="0" style="cursor:pointer;" onclick="openAwardGlossary()">' +
      '<div class="award-emoji">' + a.emoji + '</div>' +
      '<div>' +
        '<div class="award-title">' + escapeHtml(a.title) + '</div>' +
        '<div class="award-desc">' + escapeHtml(a.desc) + '</div>' +
        '<div class="award-winner">' + escapeHtml(a.winner) + '</div>' +
        '<div class="award-detail">' + escapeHtml(a.detail) + '</div>' +
      '</div>' +
    '</div>'
  ).join('');

  return heading + '<div class="award-grid">' + cards + '</div>';
}

// Flattens one season's {teams, schedule} into:
//  - teamGames: one row per team per completed game (for score/streak awards)
//  - games: one row per completed game (for margin awards)
//  - seasonRecords: one row per team (for record-based awards, incl. playoff seed)
//  - teamTotals: one row per team (for season-total and schedule-strength awards)
function buildAwardsFromSeason(teams, schedule, settings){
  const teamGames = [];
  const games = [];
  const seasonRecords = [];
  const playoffSpots = settings?.scheduleSettings?.playoffTeamCount || 0;

  const nameById = {};
  teams.forEach(t => { nameById[t.id] = teamDisplayName(t); });

  teams.forEach(t => {
    const r = t.record?.overall || {};
    const gp = (r.wins || 0) + (r.losses || 0) + (r.ties || 0);
    if (gp > 0) {
      seasonRecords.push({
        teamId: t.id, owner: resolvedOwnerKey(t), name: nameById[t.id],
        wins: r.wins || 0, losses: r.losses || 0, ties: r.ties || 0,
        winPct: ((r.wins || 0) + (r.ties || 0) * 0.5) / gp,
        playoffSeed: t.playoffSeed || null,
        madePlayoffs: !!(playoffSpots && t.playoffSeed && t.playoffSeed <= playoffSpots),
      });
    }
  });

  (schedule || []).forEach(g => {
    if (!g.winner || g.winner === 'UNDECIDED' || !g.home || !g.away) return;
    const hp = g.home.totalPoints ?? 0, ap = g.away.totalPoints ?? 0;
    const hName = nameById[g.home.teamId] || ('Team ' + g.home.teamId);
    const aName = nameById[g.away.teamId] || ('Team ' + g.away.teamId);

    games.push({ week: g.matchupPeriodId, homeName: hName, homePts: hp, awayName: aName, awayPts: ap, margin: Math.abs(hp - ap), winner: g.winner });

    const hResult = g.winner === 'HOME' ? 'W' : g.winner === 'AWAY' ? 'L' : 'T';
    const aResult = g.winner === 'AWAY' ? 'W' : g.winner === 'HOME' ? 'L' : 'T';
    teamGames.push({ teamId: g.home.teamId, name: hName, week: g.matchupPeriodId, points: hp, oppPoints: ap, oppName: aName, result: hResult });
    teamGames.push({ teamId: g.away.teamId, name: aName, week: g.matchupPeriodId, points: ap, oppPoints: hp, oppName: hName, result: aResult });
  });

  const teamTotalsMap = {};
  teamGames.forEach(g => {
    const t = teamTotalsMap[g.teamId] || (teamTotalsMap[g.teamId] = { teamId: g.teamId, name: g.name, points: 0, oppPoints: 0, games: 0 });
    t.points += g.points;
    t.oppPoints += g.oppPoints;
    t.games++;
  });
  const recordByTeam = {};
  seasonRecords.forEach(r => { recordByTeam[r.teamId] = r; });
  const teamTotals = Object.values(teamTotalsMap).map(t => ({
    ...t,
    avgPoints: t.points / t.games,
    avgOppPoints: t.oppPoints / t.games,
    madePlayoffs: recordByTeam[t.teamId] ? recordByTeam[t.teamId].madePlayoffs : false,
  }));

  return { teamGames, games, seasonRecords, teamTotals };
}

function weekLabel(g){
  return 'Week ' + g.week;
}

function stdDev(values){
  const mean = values.reduce((s, v) => s + v, 0) / values.length;
  const variance = values.reduce((s, v) => s + (v - mean) ** 2, 0) / values.length;
  return Math.sqrt(variance);
}

// Looks up a team's win% in the season immediately before `year`, using
// whatever's in the history cache — doesn't require that season to be
// checked/displayed, just previously fetched. Matches by owner rather than
// team ID, since the numeric ID isn't guaranteed to stay with the same
// person across seasons. Returns null if unavailable (owner wasn't in the
// league that year, season not fetched, or in single-season mode with no
// history loaded at all).
function previousSeasonWinPct(year, owner){
  const prev = history.data[year - 1];
  if (!prev) return null;
  const t = (prev.teams || []).find(tt => resolvedOwnerKey(tt) === owner);
  if (!t) return null;
  const r = t.record?.overall || {};
  const gp = (r.wins || 0) + (r.losses || 0) + (r.ties || 0);
  if (!gp) return null;
  return ((r.wins || 0) + (r.ties || 0) * 0.5) / gp;
}

function computeAwards(year, teams, schedule, settings){
  const { teamGames, games, seasonRecords, teamTotals } = buildAwardsFromSeason(teams, schedule, settings);
  if (!teamGames.length) return null;
  const awards = [];

  const highest = teamGames.reduce((a, b) => b.points > a.points ? b : a);
  awards.push({ emoji: '🔥', title: 'Blowtorch', desc: 'Highest single-week score', winner: highest.name, detail: highest.points.toFixed(1) + ' pts · ' + weekLabel(highest) });

  const lowest = teamGames.reduce((a, b) => b.points < a.points ? b : a);
  awards.push({ emoji: '🥶', title: 'Ice Cold', desc: 'Lowest single-week score', winner: lowest.name, detail: lowest.points.toFixed(1) + ' pts · ' + weekLabel(lowest) });

  const decisive = games.filter(g => g.winner !== 'TIE');
  if (decisive.length) {
    const blowout = decisive.reduce((a, b) => b.margin > a.margin ? b : a);
    const bWinner = blowout.winner === 'HOME' ? blowout.homeName : blowout.awayName;
    const bLoser = blowout.winner === 'HOME' ? blowout.awayName : blowout.homeName;
    awards.push({ emoji: '💥', title: 'Mercy Rule', desc: 'Biggest margin of victory', winner: bWinner, detail: '+' + blowout.margin.toFixed(1) + ' over ' + bLoser + ' · ' + weekLabel(blowout) });

    const nail = decisive.reduce((a, b) => b.margin < a.margin ? b : a);
    const nWinner = nail.winner === 'HOME' ? nail.homeName : nail.awayName;
    const nLoser = nail.winner === 'HOME' ? nail.awayName : nail.homeName;
    awards.push({ emoji: '😰', title: 'Nail-Biter', desc: 'Closest final margin', winner: nWinner, detail: '+' + nail.margin.toFixed(1) + ' over ' + nLoser + ' · ' + weekLabel(nail) });
  }

  const losses = teamGames.filter(g => g.result === 'L');
  if (losses.length) {
    const heartbreak = losses.reduce((a, b) => b.points > a.points ? b : a);
    awards.push({ emoji: '💔', title: 'Heartbreaker', desc: 'Highest score in a loss', winner: heartbreak.name, detail: heartbreak.points.toFixed(1) + ' pts, lost to ' + heartbreak.oppName + ' · ' + weekLabel(heartbreak) });
  }

  const wins = teamGames.filter(g => g.result === 'W');
  if (wins.length) {
    const lucky = wins.reduce((a, b) => b.points < a.points ? b : a);
    awards.push({ emoji: '🍀', title: 'Lucky Escape', desc: 'Lowest score in a win', winner: lucky.name, detail: lucky.points.toFixed(1) + ' pts, beat ' + lucky.oppName + ' · ' + weekLabel(lucky) });
  }

  if (seasonRecords.length) {
    const best = seasonRecords.reduce((a, b) => b.winPct > a.winPct ? b : a);
    awards.push({ emoji: '👑', title: 'Best Record', desc: 'Best regular-season record', winner: best.name, detail: best.wins + '-' + best.losses + (best.ties ? '-' + best.ties : '') });

    const worst = seasonRecords.reduce((a, b) => b.winPct < a.winPct ? b : a);
    awards.push({ emoji: '🪦', title: 'Worst Record', desc: 'Worst regular-season record', winner: worst.name, detail: worst.wins + '-' + worst.losses + (worst.ties ? '-' + worst.ties : '') });
  }

  const streaks = computeStreaks(teamGames);
  if (streaks.bestWin) awards.push({ emoji: '🚀', title: 'Hot Streak', desc: 'Longest win streak', winner: streaks.bestWin.name, detail: streaks.bestWin.length + ' straight wins · ' + streaks.bestWin.range });
  if (streaks.worstLoss) awards.push({ emoji: '📉', title: 'The Skid', desc: 'Longest losing streak', winner: streaks.worstLoss.name, detail: streaks.worstLoss.length + ' straight losses · ' + streaks.worstLoss.range });

  // ---- Consistency ----
  const byTeamPoints = {};
  teamGames.forEach(g => { (byTeamPoints[g.teamId] = byTeamPoints[g.teamId] || { name: g.name, pts: [] }).pts.push(g.points); });
  const consistency = Object.values(byTeamPoints)
    .filter(t => t.pts.length >= 3)
    .map(t => ({ name: t.name, sd: stdDev(t.pts) }));
  if (consistency.length) {
    const steady = consistency.reduce((a, b) => b.sd < a.sd ? b : a);
    awards.push({ emoji: '📏', title: 'Steady Eddy', desc: 'Most consistent scorer week to week', winner: steady.name, detail: '±' + steady.sd.toFixed(1) + ' pts std. dev.' });

    const volatile = consistency.reduce((a, b) => b.sd > a.sd ? b : a);
    awards.push({ emoji: '🎢', title: 'Boom or Bust', desc: 'Least consistent scorer week to week', winner: volatile.name, detail: '±' + volatile.sd.toFixed(1) + ' pts std. dev.' });
  }

  // ---- Season totals & schedule strength ----
  if (teamTotals.length) {
    const machine = teamTotals.reduce((a, b) => b.points > a.points ? b : a);
    awards.push({ emoji: '🏗️', title: 'The Machine', desc: 'Most total points scored', winner: machine.name, detail: machine.points.toFixed(1) + ' pts on the season' });

    const punchless = teamTotals.reduce((a, b) => b.points < a.points ? b : a);
    awards.push({ emoji: '🧱', title: 'Offense Optional', desc: 'Fewest total points scored', winner: punchless.name, detail: punchless.points.toFixed(1) + ' pts on the season' });

    const gauntlet = teamTotals.reduce((a, b) => b.avgOppPoints > a.avgOppPoints ? b : a);
    awards.push({ emoji: '🥊', title: "Murderers' Row", desc: 'Toughest schedule faced', winner: gauntlet.name, detail: gauntlet.avgOppPoints.toFixed(1) + ' opp. pts/wk on average' });

    const cakewalk = teamTotals.reduce((a, b) => b.avgOppPoints < a.avgOppPoints ? b : a);
    awards.push({ emoji: '🎯', title: 'Easy Slate', desc: 'Softest schedule faced', winner: cakewalk.name, detail: cakewalk.avgOppPoints.toFixed(1) + ' opp. pts/wk on average' });

    const nonPlayoff = teamTotals.filter(t => !t.madePlayoffs);
    if (nonPlayoff.length) {
      const snakeBitten = nonPlayoff.reduce((a, b) => b.points > a.points ? b : a);
      awards.push({ emoji: '💣', title: 'Snake-Bitten', desc: 'Highest scorer to miss the playoffs', winner: snakeBitten.name, detail: snakeBitten.points.toFixed(1) + ' pts, missed the playoffs anyway' });
    }
  }

  // ---- Playoff narrative ----
  const placements = seasonPlacements({ teams, schedule });
  if (placements) {
    const champTotal = teamTotals.find(t => t.teamId === placements.champion);
    const pointsLeader = teamTotals.length ? teamTotals.reduce((a, b) => b.points > a.points ? b : a) : null;
    if (champTotal && pointsLeader && champTotal.teamId !== pointsLeader.teamId) {
      awards.push({ emoji: '📜', title: 'Paper Champion', desc: 'Won it without leading the league in points', winner: champTotal.name, detail: champTotal.points.toFixed(1) + ' pts vs. ' + pointsLeader.name + "'s league-best " + pointsLeader.points.toFixed(1) });
    }

    const champRecord = seasonRecords.find(r => r.teamId === placements.champion);
    if (champRecord && champRecord.playoffSeed && champRecord.playoffSeed >= 3) {
      awards.push({ emoji: '🐊', title: 'Giant Killer', desc: 'Won it all as a low playoff seed', winner: champRecord.name, detail: 'No. ' + champRecord.playoffSeed + ' seed' });
    }
  }

  // ---- Year-over-year (only when the prior season is in the cache) ----
  const deltas = seasonRecords
    .map(r => {
      const prevPct = previousSeasonWinPct(year, r.owner);
      return prevPct === null ? null : { name: r.name, delta: r.winPct - prevPct };
    })
    .filter(Boolean);
  if (deltas.length) {
    const riser = deltas.reduce((a, b) => b.delta > a.delta ? b : a);
    if (riser.delta > 0) awards.push({ emoji: '📈', title: 'Most Improved', desc: "Biggest win% jump vs. the previous season", winner: riser.name, detail: '+' + Math.round(riser.delta * 100) + ' pts of win%' });

    const faller = deltas.reduce((a, b) => b.delta < a.delta ? b : a);
    if (faller.delta < 0) awards.push({ emoji: '📉', title: 'Biggest Fall-Off', desc: "Biggest win% drop vs. the previous season", winner: faller.name, detail: Math.round(faller.delta * 100) + ' pts of win%' });
  }

  // ---- Overachiever / underachiever (win-rank vs. scoring-rank) ----
  if (seasonRecords.length && teamTotals.length) {
    const byWin = [...seasonRecords].sort((a, b) => b.winPct - a.winPct);
    const winRank = {}; byWin.forEach((r, i) => { winRank[r.teamId] = i + 1; });
    const byPts = [...teamTotals].sort((a, b) => b.points - a.points);
    const ptsRank = {}; byPts.forEach((t, i) => { ptsRank[t.teamId] = i + 1; });

    const rankDiffs = seasonRecords
      .filter(r => ptsRank[r.teamId] !== undefined)
      .map(r => ({ name: r.name, diff: ptsRank[r.teamId] - winRank[r.teamId], winRank: winRank[r.teamId], ptsRank: ptsRank[r.teamId] }));

    if (rankDiffs.length) {
      const over = rankDiffs.reduce((a, b) => b.diff > a.diff ? b : a);
      if (over.diff > 0) awards.push({ emoji: '🎖️', title: 'Overachiever', desc: 'Won more than the scoreboard says they should have', winner: over.name, detail: 'No. ' + over.winRank + ' in wins, No. ' + over.ptsRank + ' in points' });

      const under = rankDiffs.reduce((a, b) => b.diff < a.diff ? b : a);
      if (under.diff < 0) awards.push({ emoji: '🫠', title: 'Underachiever', desc: 'Scored better than their record shows', winner: under.name, detail: 'No. ' + under.ptsRank + ' in points, No. ' + under.winRank + ' in wins' });
    }
  }

  // ---- Playoff bubble ----
  const playoffSpotsCount = settings?.scheduleSettings?.playoffTeamCount || 0;
  if (playoffSpotsCount && seasonRecords.length) {
    const bubble = seasonRecords.find(r => r.playoffSeed === playoffSpotsCount + 1);
    if (bubble) awards.push({ emoji: '🥅', title: 'Bubble Team', desc: 'First team left out of the playoffs', winner: bubble.name, detail: bubble.wins + '-' + bubble.losses + (bubble.ties ? '-' + bubble.ties : '') + ' · No. ' + bubble.playoffSeed + ' seed' });

    const sneakIn = seasonRecords.find(r => r.playoffSeed === playoffSpotsCount);
    if (sneakIn) awards.push({ emoji: '🎟️', title: 'Snuck In', desc: 'Grabbed the last playoff spot', winner: sneakIn.name, detail: sneakIn.wins + '-' + sneakIn.losses + (sneakIn.ties ? '-' + sneakIn.ties : '') + ' · No. ' + sneakIn.playoffSeed + ' seed' });
  }

  // ---- Week-over-week swings ----
  const byTeamWeeks = {};
  teamGames.forEach(g => { (byTeamWeeks[g.teamId] = byTeamWeeks[g.teamId] || { name: g.name, rows: [] }).rows.push(g); });
  Object.values(byTeamWeeks).forEach(t => t.rows.sort((a, b) => a.week - b.week));

  let biggestJump = null, biggestDrop = null;
  Object.values(byTeamWeeks).forEach(t => {
    for (let i = 1; i < t.rows.length; i++) {
      const delta = t.rows[i].points - t.rows[i - 1].points;
      const info = { name: t.name, delta, fromWeek: t.rows[i - 1].week, toWeek: t.rows[i].week };
      if (!biggestJump || delta > biggestJump.delta) biggestJump = info;
      if (!biggestDrop || delta < biggestDrop.delta) biggestDrop = info;
    }
  });
  if (biggestJump && biggestJump.delta > 0) awards.push({ emoji: '⚡', title: 'Tide Turner', desc: 'Biggest week-over-week point jump', winner: biggestJump.name, detail: '+' + biggestJump.delta.toFixed(1) + ' pts, Week ' + biggestJump.fromWeek + ' → ' + biggestJump.toWeek });
  if (biggestDrop && biggestDrop.delta < 0) awards.push({ emoji: '🧊', title: 'Wet Blanket', desc: 'Biggest week-over-week point drop', winner: biggestDrop.name, detail: biggestDrop.delta.toFixed(1) + ' pts, Week ' + biggestDrop.fromWeek + ' → ' + biggestDrop.toWeek });

  // ---- Close games (margin ≤ 5 pts) ----
  const closeGames = teamGames.map(g => ({ ...g, margin: Math.abs(g.points - g.oppPoints) })).filter(g => g.margin <= 5 && g.result !== 'T');
  const closeByTeam = {};
  closeGames.forEach(g => {
    const t = closeByTeam[g.teamId] || (closeByTeam[g.teamId] = { name: g.name, w: 0, l: 0 });
    if (g.result === 'W') t.w++; else t.l++;
  });
  const closeStats = Object.values(closeByTeam).filter(t => (t.w + t.l) >= 2).map(t => ({ ...t, pct: t.w / (t.w + t.l) }));
  if (closeStats.length) {
    const clutch = closeStats.reduce((a, b) => b.pct > a.pct ? b : a);
    awards.push({ emoji: '💪', title: 'Clutch', desc: 'Best record in games decided by 5 pts or less', winner: clutch.name, detail: clutch.w + '-' + clutch.l + ' in close games' });

    const choke = closeStats.reduce((a, b) => b.pct < a.pct ? b : a);
    awards.push({ emoji: '🃏', title: 'Choke Artist', desc: 'Worst record in games decided by 5 pts or less', winner: choke.name, detail: choke.w + '-' + choke.l + ' in close games' });
  }

  // ---- Fast/slow starts (first 3 weeks of the season) ----
  const allWeeksSorted = [...new Set(teamGames.map(g => g.week))].sort((a, b) => a - b);
  const firstWeeks = new Set(allWeeksSorted.slice(0, 3));
  if (firstWeeks.size >= 2) {
    const startByTeam = {};
    teamGames.filter(g => firstWeeks.has(g.week)).forEach(g => {
      const t = startByTeam[g.teamId] || (startByTeam[g.teamId] = { name: g.name, w: 0, l: 0, t: 0, gp: 0 });
      t.gp++;
      if (g.result === 'W') t.w++; else if (g.result === 'L') t.l++; else t.t++;
    });
    const starters = Object.values(startByTeam).filter(t => t.gp === firstWeeks.size).map(t => ({ ...t, pct: (t.w + t.t * 0.5) / t.gp }));
    if (starters.length) {
      const fast = starters.reduce((a, b) => b.pct > a.pct ? b : a);
      awards.push({ emoji: '🏁', title: 'Fast Starter', desc: 'Best record in the first ' + firstWeeks.size + ' weeks', winner: fast.name, detail: fast.w + '-' + fast.l + (fast.t ? '-' + fast.t : '') + ' to open the season' });

      const slow = starters.reduce((a, b) => b.pct < a.pct ? b : a);
      awards.push({ emoji: '🐌', title: 'Slow Starter', desc: 'Worst record in the first ' + firstWeeks.size + ' weeks', winner: slow.name, detail: slow.w + '-' + slow.l + (slow.t ? '-' + slow.t : '') + ' to open the season' });
    }
  }

  // ---- Strong finish (final 3 regular-season weeks) ----
  const regSeasonWeeks = [...new Set(schedule
    .filter(g => (!g.playoffTierType || g.playoffTierType === 'NONE') && g.winner && g.winner !== 'UNDECIDED')
    .map(g => g.matchupPeriodId))].sort((a, b) => a - b);
  const finalWeeks = new Set(regSeasonWeeks.slice(-3));
  if (finalWeeks.size >= 2) {
    const finishByTeam = {};
    teamGames.filter(g => finalWeeks.has(g.week)).forEach(g => {
      const t = finishByTeam[g.teamId] || (finishByTeam[g.teamId] = { name: g.name, w: 0, l: 0, t: 0, gp: 0 });
      t.gp++;
      if (g.result === 'W') t.w++; else if (g.result === 'L') t.l++; else t.t++;
    });
    const closers = Object.values(finishByTeam).filter(t => t.gp === finalWeeks.size).map(t => ({ ...t, pct: (t.w + t.t * 0.5) / t.gp }));
    if (closers.length) {
      const closer = closers.reduce((a, b) => b.pct > a.pct ? b : a);
      awards.push({ emoji: '🎬', title: 'The Closer', desc: 'Best record in the final ' + finalWeeks.size + ' regular-season weeks', winner: closer.name, detail: closer.w + '-' + closer.l + (closer.t ? '-' + closer.t : '') + ' down the stretch' });
    }
  }

  // ---- Roster activity (trades, waivers) ----
  awards.push(...computeActivityAwards(teams));

  return awards;
}

// Each team object carries its own transactionCounter summary (present
// because the proxy requests view=mTransactions2) — trades/acquisitions/
// drops counts, but no line-item detail. There's no reliable way to see
// *who* traded with *whom*, *when*, or *which players* were involved from
// this view; that lives in ESPN's separate activity-feed endpoint, which
// even dedicated ESPN-scraping projects have had trouble fully resolving
// (trade transactions there don't cleanly link back to the players moved).
// So this sticks to what the count data actually supports.
function computeActivityAwards(teams){
  const awards = [];
  const withCounts = teams.map(t => {
    const tc = t.transactionCounter || {};
    return {
      name: teamDisplayName(t),
      trades: tc.trades || 0,
      acquisitions: tc.acquisitions || 0,
      drops: tc.drops || 0,
      faabSpent: tc.acquisitionBudgetSpent || 0,
    };
  });

  if (withCounts.some(t => t.trades > 0)) {
    const top = withCounts.reduce((a, b) => b.trades > a.trades ? b : a);
    awards.push({ emoji: '\ud83e\udd1d', title: 'Trade Machine', desc: 'Most trades made', winner: top.name, detail: top.trades + (top.trades === 1 ? ' trade' : ' trades') + ' this season' });
  }

  if (withCounts.some(t => t.acquisitions > 0)) {
    const busiest = withCounts.reduce((a, b) => b.acquisitions > a.acquisitions ? b : a);
    awards.push({ emoji: '\ud83d\udce1', title: 'Waiver Wire Warrior', desc: 'Most waiver/free-agent pickups', winner: busiest.name, detail: busiest.acquisitions + ' adds this season' });

    const quietest = withCounts.reduce((a, b) => b.acquisitions < a.acquisitions ? b : a);
    awards.push({ emoji: '\ud83e\uddd8', title: 'Set It and Forget It', desc: 'Fewest waiver/free-agent pickups', winner: quietest.name, detail: quietest.acquisitions + ' adds this season' });
  }

  if (withCounts.some(t => t.drops > 0)) {
    const churner = withCounts.reduce((a, b) => b.drops > a.drops ? b : a);
    awards.push({ emoji: '\ud83d\udeaa', title: 'Revolving Door', desc: 'Most roster drops', winner: churner.name, detail: churner.drops + ' drops this season' });
  }

  // Only meaningful for leagues that actually use a FAAB waiver budget —
  // stays silent (all-zero faabSpent) for standard waiver-priority leagues.
  if (withCounts.some(t => t.faabSpent > 0)) {
    const spender = withCounts.reduce((a, b) => b.faabSpent > a.faabSpent ? b : a);
    awards.push({ emoji: '\ud83d\udcb0', title: 'High Roller', desc: 'Most FAAB waiver budget spent', winner: spender.name, detail: '$' + spender.faabSpent.toFixed(0) + ' spent this season' });
  }

  return awards;
}

function computeStreaks(teamGames){
  const byTeam = {};
  teamGames.forEach(g => { (byTeam[g.teamId] = byTeam[g.teamId] || []).push(g); });
  Object.values(byTeam).forEach(arr => arr.sort((a, b) => a.week - b.week));

  let bestWin = null, worstLoss = null;

  Object.values(byTeam).forEach(arr => {
    let curResult = null, curLen = 0, curStart = null;
    arr.forEach(g => {
      const relevant = g.result === 'W' ? 'W' : g.result === 'L' ? 'L' : null;
      if (relevant && relevant === curResult) {
        curLen++;
      } else {
        curResult = relevant;
        curLen = relevant ? 1 : 0;
        curStart = g;
      }
      if (curResult === 'W' && curLen >= 2 && (!bestWin || curLen > bestWin.length)) {
        bestWin = { name: g.name, length: curLen, range: streakRange(curStart, g) };
      }
      if (curResult === 'L' && curLen >= 2 && (!worstLoss || curLen > worstLoss.length)) {
        worstLoss = { name: g.name, length: curLen, range: streakRange(curStart, g) };
      }
    });
  });

  return { bestWin, worstLoss };
}

function streakRange(start, end){
  const s = weekLabel(start), e = weekLabel(end);
  return s === e ? s : s + ' – ' + e;
}

// Static cache, committed to the repo at data/history-cache.json. Anyone
// visiting the site reads old seasons straight from this file — no ESPN
// login needed on their end. Only whoever generates the file (via the
// "Download cache file" button) needs cookies, once.
let historyCachePromise = null;
function loadHistoryCache(){
  if (!historyCachePromise) {
    historyCachePromise = fetch('./data/history-cache.json')
      .then(r => r.ok ? r.json() : {})
      .catch(() => ({}));
  }
  return historyCachePromise;
}

async function fetchHistorySeason(leagueId, season, forceLive){
  if (!forceLive) {
    const cache = await loadHistoryCache();
    if (cache[season]) {
      return { ok: true, data: cache[season], fromCache: true };
    }
  }

  const proxyUrl = '/api/espn-proxy?leagueId=' + encodeURIComponent(leagueId) +
                    '&season=' + encodeURIComponent(season);
  try {
    const res = await fetch(proxyUrl, { headers: { 'Accept': 'application/json' } });
    const payload = await res.json().catch(() => null);

    if (!res.ok) {
      let reason = (payload && payload.error) ? payload.error : ('HTTP ' + res.status);
      if (payload && payload.status) reason += ' [ESPN status ' + payload.status + ']';
      if (payload && payload.detail) reason += ' — ' + payload.detail.slice(0, 120);
      return { ok: false, status: res.status, hasPayload: !!payload, reason };
    }
    if (!payload || !payload.teams || !payload.teams.length) {
      return { ok: false, reason: 'no league data returned' };
    }
    return { ok: true, data: payload };
  } catch (err) {
    return { ok: false, reason: 'network error' };
  }
}

async function downloadHistoryCache(){
  histDownloadBtn.disabled = true;
  histDownloadBtn.textContent = 'Preparing…';
  try {
    const existing = await loadHistoryCache();
    // Merge so downloading after a partial re-fetch doesn't drop seasons
    // that were cached before but weren't reloaded this time.
    const merged = { ...existing, ...history.data };

    const blob = new Blob([JSON.stringify(merged)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'history-cache.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  } finally {
    histDownloadBtn.disabled = false;
    histDownloadBtn.textContent = 'Download cache file';
  }
}

function historyTeamNames(){
  const names = {};
  history.loadedSeasons.forEach(year => {
    (history.data[year].teams || []).forEach(t => { names[resolvedOwnerKey(t)] = teamDisplayName(t); });
  });
  return names;
}

function renderSeasonPicker(){
  if (!history.loadedSeasons.length) return '';
  const chips = history.loadedSeasons.map(y =>
    '<label class="season-chip"><input type="checkbox" data-year="' + y + '" ' +
    (history.checkedSeasons.has(y) ? 'checked' : '') + '>' + y + '</label>'
  ).join('');
  return '<div class="season-picker">' + chips + '</div>';
}

// The "toilet bowl championship" is the winner of the final week's game in
// the consolation bracket (playoffTierType is anything other than NONE or
// WINNERS_BRACKET). If the ladder has multiple games in its last week, the
// top one is picked using playoff seed — the ladder keeps higher seeds in
// the top bracket slot all the way through, so the best-seeded pair is the
// actual toilet bowl game rather than a lower consolation-ladder rung.
function toiletBowlChampion(data){
  const schedule = data.schedule || [];

  // Toilet bowl = winner of the losers-consolation-ladder FINAL (top of the
  // losers ladder). Restrict to LOSERS_CONSOLATION_LADDER, take the final week,
  // then pick the lowest matchup id (ESPN orders the ladder championship first).
  const ladderGames = schedule.filter(g =>
    g.playoffTierType === 'LOSERS_CONSOLATION_LADDER' &&
    g.winner && g.winner !== 'UNDECIDED' && g.home && g.away
  );
  if (!ladderGames.length) return null;

  const finalWeek = Math.max(...ladderGames.map(g => g.matchupPeriodId));
  const finalGames = ladderGames
    .filter(g => g.matchupPeriodId === finalWeek)
    .sort((a, b) => (a.id || 0) - (b.id || 0));
  if (!finalGames.length) return null;

  const best = finalGames[0];
  return best.winner === 'HOME' ? best.home.teamId : best.away.teamId;
}

// Championship / runner-up / 3rd place, derived the same way as the toilet
// bowl above — straight from bracket games rather than ESPN's rankFinal
// field, which isn't reliably populated for every league. The winners
// bracket keeps playing its losers too (for 3rd place, 5th place, etc.), all
// still tagged WINNERS_BRACKET, so in the final week there can be more than
// one game there. The pair with the best (lowest) combined seed is the
// championship game; the next-best pair is the 3rd place game.
function seasonPlacements(data){
  const teams = data.teams || [];
  const schedule = data.schedule || [];

  const games = schedule.filter(g =>
    g.playoffTierType === 'WINNERS_BRACKET' &&
    g.winner && g.winner !== 'UNDECIDED' && g.home && g.away
  );
  if (!games.length) return null;

  const finalWeek = Math.max(...games.map(g => g.matchupPeriodId));
  const finalGames = games.filter(g => g.matchupPeriodId === finalWeek);
  if (!finalGames.length) return null;

  const seedById = {};
  teams.forEach(t => seedById[t.id] = t.playoffSeed || 999);

  const bySeed = finalGames
    .map(g => ({ g, sum: (seedById[g.home.teamId] || 999) + (seedById[g.away.teamId] || 999) }))
    .sort((a, b) => a.sum - b.sum);

  const champGame = bySeed[0].g;
  const champion = champGame.winner === 'HOME' ? champGame.home.teamId : champGame.away.teamId;
  const runnerUp = champGame.winner === 'HOME' ? champGame.away.teamId : champGame.home.teamId;

  let thirdPlace = null;
  if (bySeed[1]) {
    const tg = bySeed[1].g;
    thirdPlace = tg.winner === 'HOME' ? tg.home.teamId : tg.away.teamId;
  }

  return { champion, runnerUp, thirdPlace };
}

// Loads data/manual-adjustments.json — for real-world overrides the API
// has no field for, like a championship getting vacated after the fact.
// Currently supports: { "vacatedChampionshipSeasons": [2020] } — any season
// listed there has its championship stripped from whoever the bracket says
// won, and counted as a DQ for that team instead. Missing/empty/invalid
// file just means no adjustments, same as the other data files.
let MANUAL_ADJUSTMENTS = { vacatedChampionshipSeasons: [] };
async function loadManualAdjustments(){
  try {
    const res = await fetch('./data/manual-adjustments.json');
    if (!res.ok) return;
    const data = await res.json();
    if (data && Array.isArray(data.vacatedChampionshipSeasons)) {
      MANUAL_ADJUSTMENTS.vacatedChampionshipSeasons = data.vacatedChampionshipSeasons;
    }
  } catch (e) {
    return;
  }
  if (history.loadedSeasons.length) refreshSeasonDependentViews();
}
loadManualAdjustments();

// ---- Championship Belt lineage ----
// Wrestling-title style: one belt travels through the league. It is first
// awarded to the champion of the earliest checked season, then changes hands
// every time the reigning holder LOSES a head-to-head game (regular season or
// playoff). A tie or a week the holder doesn't play = belt retained. Games are
// walked strictly in chronological order (year, then matchupPeriodId). Owner
// identity is resolved per season so the belt survives renames/re-registers.
// Returns an ordered list of reigns: { owner, wonYear, wonWeek, wonFrom,
// wonHow, defenses } plus a trailing { current:true } flag on the last reign.
function championshipBeltReigns(checked){
  const seasons = checked.slice().sort((a,b) => a - b);
  if (!seasons.length) return null;

  // Seed the belt with the first season that actually has a champion.
  let holder = null, seedYear = null;
  for (const year of seasons){
    const data = history.data[year];
    const placements = seasonPlacements(data);
    if (!placements) continue;
    if (MANUAL_ADJUSTMENTS.vacatedChampionshipSeasons.includes(year)) continue;
    const ownerById = idToOwnerKeyMap(data.teams || []);
    const champOwner = ownerById[placements.champion];
    if (champOwner) { holder = champOwner; seedYear = year; break; }
  }
  if (!holder) return null;

  const reigns = [{ owner: holder, wonYear: seedYear, wonWeek: null, wonFrom: null, wonHow: 'crowned', defenses: 0 }];

  seasons.forEach(year => {
    const data = history.data[year];
    const ownerById = idToOwnerKeyMap(data.teams || []);
    const games = (data.schedule || [])
      .filter(g => g.winner && g.winner !== 'UNDECIDED' && g.home && g.away)
      .slice()
      .sort((a,b) => (a.matchupPeriodId||0) - (b.matchupPeriodId||0));
    games.forEach(g => {
      const homeOwner = ownerById[g.home.teamId];
      const awayOwner = ownerById[g.away.teamId];
      if (!homeOwner || !awayOwner) return;
      if (homeOwner !== holder && awayOwner !== holder) return;
      if (g.winner === 'TIE') return; // belt retained on a tie
      const winnerOwner = g.winner === 'HOME' ? homeOwner : awayOwner;
      if (winnerOwner === holder) { reigns[reigns.length-1].defenses++; return; }
      // Holder lost: belt changes hands.
      const isPlayoff = g.playoffTierType && g.playoffTierType !== 'NONE';
      reigns.push({ owner: winnerOwner, wonYear: year, wonWeek: g.matchupPeriodId || null,
        wonFrom: holder, wonHow: isPlayoff ? 'playoff' : 'regular', defenses: 0 });
      holder = winnerOwner;
    });
  });

  if (reigns.length) reigns[reigns.length-1].current = true;
  return reigns;
}

function renderBeltContent(){
  if (!history.loadedSeasons.length) { beltView.innerHTML = ''; return; }

  const beltReigns = championshipBeltReigns(checked);
  let beltTable = '';
  if (beltReigns && beltReigns.length) {
    const beltRows = beltReigns.map((r, i) => {
      const who = escapeHtml(names[r.owner] || ('Team ' + r.owner));
      let when, how;
      if (r.wonHow === 'crowned') {
        when = r.wonYear + ' champion';
        how = 'Belt created — awarded to the earliest checked season\'s champion.';
      } else {
        when = r.wonYear + (r.wonWeek ? ' &middot; Wk ' + r.wonWeek : '');
        const from = escapeHtml(names[r.wonFrom] || ('Team ' + r.wonFrom));
        how = 'Took it from ' + from + ' (' + (r.wonHow === 'playoff' ? 'playoff' : 'regular-season') + ' win).';
      }
      const defenses = r.defenses === 1 ? '1 defense' : (r.defenses + ' defenses');
      const badge = r.current ? '<span class="belt-current">CURRENT HOLDER</span>' : '';
      return '<tr>' +
        '<td class="num">' + (i + 1) + '</td>' +
        '<td class="team-name">' + who + ' ' + badge + '</td>' +
        '<td>' + when + '</td>' +
        '<td class="num">' + defenses + '</td>' +
        '<td class="belt-how">' + how + '</td>' +
        '</tr>';
    }).join('');
    const holder = beltReigns[beltReigns.length - 1];
    const holderName = escapeHtml(names[holder.owner] || ('Team ' + holder.owner));
    beltTable = '<h2 class="section-title">\uD83C\uDFC6 Championship Belt</h2>' +
      '<p class="section-note">Wrestling-style lineage. The belt starts with the earliest checked season\'s champion, then changes hands every time the reigning holder loses a head-to-head game (regular season or playoff). Ties and byes keep it put. <strong>' + holderName + '</strong> holds it now with ' + holder.defenses + ' straight ' + (holder.defenses === 1 ? 'defense' : 'defenses') + '.</p>' +
      '<table><thead><tr><th class="num">#</th><th>Holder</th><th>Won</th><th class="num">Reign</th><th>How</th></tr></thead>' +
      '<tbody>' + beltRows + '</tbody></table>';
  }

  beltView.innerHTML = beltTable || '<p class="section-note">No belt history yet &mdash; check some seasons.</p>';
}

  owners.forEach(k => {

    const cur = stats[k];
    nmeta.forEach(m => {
      if (m.key === 'titles') {
        const gained = cur.titles - (prev.titles || 0);
        for (let n = 0; n < gained; n++) {

        }
        return;
      }
      const p = prev[m.key] || 0;
      const c = cur[m.key];
      const prevMul = Math.floor(p / m.step);
      const curMul = Math.floor(c / m.step);
      for (let mul = prevMul + 1; mul <= curMul; mul++) {
        const threshold = mul * m.step;
        achieved.push({ owner:k, label:m.label, detail:'Reached ' + m.fmt(threshold) + ' in ' + lastYear, sort:threshold });
      }
    });
  });
  achieved.sort((a,b) => (b.sort - a.sort) || nameOf(a.owner).localeCompare(nameOf(b.owner)));

        '</div>'
      ).join('') +
    '</div>';
  }

  // ---- Next up: closest owner to their next milestone in each category ----

  nmeta.forEach(m => {
    let best = null;
    owners.forEach(k => {
      const val = stats[k][m.key];
      if (m.key === 'titles') {
        // Titles: each one is a milestone; highlight who needs fewest games? Not applicable.

      const nextThreshold = (Math.floor(val / m.step) + 1) * m.step;
      const remaining = nextThreshold - val;

  let highlightHtml = '';
  if (nextUp.length) {
    highlightHtml = '<div class="milestone-section-head">Next up</div><div class="milestone-highlights">' +
      nextUp.map(n =>
        '<div class="milestone-card">' +
          '<div class="milestone-card-label">' + esc(n.label) + '</div>' +
          '<div class="milestone-card-name">' + esc(nameOf(n.best.owner)) + '</div>' +
          '<div class="milestone-card-detail">' + n.fmt(n.best.remaining) + ' from ' + n.fmt(n.best.nextThreshold) + '</div>' +
        '</div>'

      return '<td class="num">' + m.fmt(val) + '</td>';

    return '<tr><td>' + esc(nameOf(k)) + '</td>' + cells + '</tr>';

  const tableHtml = '<div class="h2h-scroll"><table class="milestone-table"><thead><tr><th>Manager</th>' + headCells + '</tr></thead>' +
    '<tbody>' + bodyRows + '</tbody></table></div>';

  milestonesView.innerHTML =

    highlightHtml +
    tableHtml;

function renderRecordBookContent(){

  const names = historyTeamNames();
  const checked = history.loadedSeasons.filter(y => history.checkedSeasons.has(y));

  // Resolve an owner display name for a history team object.
  const nameFor = (ownerById, teams, id) => {
    const key = ownerById[id];
    return (key && names[key]) || 'Unknown';
  };

  // ---- Single-game extremes ----
  let hiGame=null, loGame=null, blowout=null, narrow=null, combo=null, ptsInLoss=null, fewInWin=null;
  // ---- Season aggregates + streaks ----
  const seasonPts = {};   // key: owner|year -> {name, year, pts}
  const seasonRec = {};   // key: owner|year -> {name, year, w, l, t}
  const chron = {};       // owner -> [{year, week, win}] for streaks

  checked.forEach(year => {
    const data = history.data[year];
    if (!data) return;
    const sched = data.schedule || [];
    const teams = data.teams || [];
    const ownerById = idToOwnerKeyMap(teams);

    sched.forEach(g => {
      if (!g.winner || g.winner === 'UNDECIDED' || !g.home || !g.away) return;
      const hp = g.home.totalPoints ?? 0;
      const ap = g.away.totalPoints ?? 0;
      const week = g.matchupPeriodId;
      const hName = nameFor(ownerById, teams, g.home.teamId);
      const aName = nameFor(ownerById, teams, g.away.teamId);
      const homeWon = g.winner === 'HOME';
      const margin = Math.abs(hp - ap);
      const combined = hp + ap;

      // per-side game records
      [[hName, hp, homeWon],[aName, ap, !homeWon]].forEach(([nm, pts, won]) => {
        if (!hiGame || pts > hiGame.pts) hiGame = {name:nm, pts, year, week};
        if (!loGame || pts < loGame.pts) loGame = {name:nm, pts, year, week};
        if (won) { if (!fewInWin || pts < fewInWin.pts) fewInWin = {name:nm, pts, year, week}; }
        else { if (!ptsInLoss || pts > ptsInLoss.pts) ptsInLoss = {name:nm, pts, year, week}; }
      });

      const winNm = homeWon ? hName : aName;
      const loseNm = homeWon ? aName : hName;
      if (!blowout || margin > blowout.margin) blowout = {win:winNm, lose:loseNm, margin, year, week};
      if (!narrow || margin < narrow.margin) narrow = {win:winNm, lose:loseNm, margin, year, week};
      if (!combo || combined > combo.combined) combo = {a:hName, b:aName, combined, year, week};

      // season aggregates
      [[hName, hp, homeWon],[aName, ap, !homeWon]].forEach(([nm, pts, won]) => {
        const pk = nm + '|' + year;
        (seasonPts[pk] || (seasonPts[pk] = {name:nm, year, pts:0})).pts += pts;
        const r = seasonRec[pk] || (seasonRec[pk] = {name:nm, year, w:0, l:0, t:0});
        if (won) r.w++; else r.l++;
        (chron[nm] || (chron[nm] = [])).push({year, week, win:won});
      });
    });
  });

  // Season points leader
  let bestSeasonPts=null;
  Object.values(seasonPts).forEach(r => { if (!bestSeasonPts || r.pts > bestSeasonPts.pts) bestSeasonPts = r; });
  // Best season record (by win%, min games)
  let bestSeasonRec=null;
  Object.values(seasonRec).forEach(r => {
    const gp = r.w + r.l + r.t;
    if (gp < 4) return;
    const pct = (r.w + r.t*0.5) / gp;
    if (!bestSeasonRec || pct > bestSeasonRec.pct || (pct === bestSeasonRec.pct && r.w > bestSeasonRec.w))
      bestSeasonRec = {name:r.name, year:r.year, w:r.w, l:r.l, t:r.t, pct};
  });

  // Streaks (chronological within each owner)

    games.sort((x,y) => x.year - y.year || x.week - y.week);

      if (gm.win) {
        cw = cw ? cw+1 : 1; if (cw === 1) cwStart = gm; cl = 0;
        if (!winStreak || cw > winStreak.len) winStreak = {name:nm, len:cw, from:cwStart, to:gm};
      } else {

        if (!loseStreak || cl > loseStreak.len) loseStreak = {name:nm, len:cl, from:clStart, to:gm};
      }
    });
  });

  const n1 = v => (v ?? 0).toFixed(1);
  const wk = (y, w) => y + ' wk ' + w;
  const span = (a, b) => a.year === b.year && a.week === b.week ? wk(a.year, a.week) : (wk(a.year, a.week) + ' \u2192 ' + wk(b.year, b.week));
  const esc = t => String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  const row = (cells) => '<tr>' + cells.map((c,i) => i === 0 ? '<td>'+c+'</td>' : '<td class="num">'+c+'</td>').join('') + '</tr>';
  const tbl = (title, head, rows) =>
    '<h2 class="section-title">' + title + '</h2>' +
    '<table><thead><tr>' + head.map((h,i) => i===0 ? '<th>'+h+'</th>' : '<th class="num">'+h+'</th>').join('') + '</tr></thead><tbody>' + rows + '</tbody></table>';

  let html = '<p class="section-note">Single-game and single-season extremes across the seasons checked in the History tab. These are peaks and valleys &mdash; separate from the cumulative career records in History.</p>';

  if (hiGame) html += tbl('Highest single-game score', ['Manager','Points','When'], row([esc(hiGame.name), n1(hiGame.pts), wk(hiGame.year, hiGame.week)]));
  if (loGame) html += tbl('Lowest single-game score', ['Manager','Points','When'], row([esc(loGame.name), n1(loGame.pts), wk(loGame.year, loGame.week)]));
  if (blowout) html += tbl('Biggest blowout', ['Winner','Margin','Over','When'], '<tr><td>'+esc(blowout.win)+'</td><td class="num">'+n1(blowout.margin)+'</td><td class="num">'+esc(blowout.lose)+'</td><td class="num">'+wk(blowout.year, blowout.week)+'</td></tr>');
  if (narrow) html += tbl('Narrowest win', ['Winner','Margin','Over','When'], '<tr><td>'+esc(narrow.win)+'</td><td class="num">'+n1(narrow.margin)+'</td><td class="num">'+esc(narrow.lose)+'</td><td class="num">'+wk(narrow.year, narrow.week)+'</td></tr>');
  if (combo) html += tbl('Highest combined-score matchup', ['Matchup','Combined','When'], '<tr><td>'+esc(combo.a)+' vs '+esc(combo.b)+'</td><td class="num">'+n1(combo.combined)+'</td><td class="num">'+wk(combo.year, combo.week)+'</td></tr>');
  if (bestSeasonPts) html += tbl('Most points in a season', ['Manager','Points','Season'], row([esc(bestSeasonPts.name), n1(bestSeasonPts.pts), bestSeasonPts.year]));
  if (bestSeasonRec) html += tbl('Best single-season record', ['Manager','Record','Season'], row([esc(bestSeasonRec.name), bestSeasonRec.w+'-'+bestSeasonRec.l+(bestSeasonRec.t?'-'+bestSeasonRec.t:''), bestSeasonRec.year]));
  if (winStreak) html += tbl('Longest win streak', ['Manager','Streak','Span'], row([esc(winStreak.name), winStreak.len+'W', span(winStreak.from, winStreak.to)]));
  if (loseStreak) html += tbl('Longest losing streak', ['Manager','Streak','Span'], row([esc(loseStreak.name), loseStreak.len+'L', span(loseStreak.from, loseStreak.to)]));
  if (ptsInLoss) html += tbl('Most points in a loss', ['Manager','Points','When'], row([esc(ptsInLoss.name), n1(ptsInLoss.pts), wk(ptsInLoss.year, ptsInLoss.week)]));
  if (fewInWin) html += tbl('Fewest points in a win', ['Manager','Points','When'], row([esc(fewInWin.name), n1(fewInWin.pts), wk(fewInWin.year, fewInWin.week)]));

  recordBookView.innerHTML = html || '<p class="section-note">No records yet &mdash; check some seasons in the History tab.</p>';

  });

  const rows = Object.entries(agg)
    .sort((a, b) => b[1].championships - a[1].championships || (b[1].w / Math.max(b[1].w+b[1].l+b[1].t,1)) - (a[1].w / Math.max(a[1].w+a[1].l+a[1].t,1)))
    .map(([id, s]) => {
      const apPct = allPlayPct({ wins: s.apW, losses: s.apL, ties: s.apT });
      return '<tr>' +
      '<td class="team-name">' + escapeHtml(names[id] || ('Team ' + id)) + '</td>' +
      '<td class="num rec">' + s.w + '-' + s.l + '-' + s.t + '</td>' +
      '<td class="num">' + (powerByOwner[id] !== undefined ? powerByOwner[id].toFixed(1) : '-') + '</td>' +
      '<td class="num">' + (apPct === null ? '—' : (apPct * 100).toFixed(1) + '%') + '</td>' +
      '<td class="num">' + s.medW + '-' + s.medL + '</td>' +
      '<td class="num">' + s.championships + '</td>' +
      '<td class="num">' + s.top3 + '</td>' +
      '<td class="num">' + s.playoffs + '</td>' +
      '<td class="num">' + s.toiletBowl + '</td>' +
      '<td class="num">' + s.dq + '</td>' +
      '</tr>';
    }).join('');

  const recordsTable = '<h2 class="section-title">All-time records</h2>' +
    '<p class="section-note">Across the seasons checked below. All-Play is each team\'s win% if they\'d played every other team every week — output separate from schedule luck. Championships, top-3, and toilet bowl come from each season\'s final bracket. DQ reflects manual adjustments (e.g. a vacated championship): the top-3 finish stays, only the championship credit moves to the DQ column.</p>' +
    '<table data-sortable><thead><tr><th>Team</th><th class="num">Record</th><th class="num">Power</th><th class="num">All-Play</th><th class="num">vs Median</th><th class="num">🏆</th><th class="num">Top 3</th><th class="num">Playoffs</th><th class="num">🚽</th><th class="num">DQ</th></tr></thead>' +
    '<tbody>' + rows + '</tbody></table>';

  // ---- Head-to-head matrix ----
  const teamIds = Object.keys(agg);
  const h2h = {}; // "a|b" -> {w,l,t} from a's perspective
  teamIds.forEach(a => teamIds.forEach(b => { if (a !== b) h2h[a+'|'+b] = { w:0, l:0, t:0 }; }));

  checked.forEach(year => {
    const data = history.data[year];
    const ownerById = idToOwnerKeyMap(data.teams || []);
    (data.schedule || []).forEach(g => {
      if (!g.winner || g.winner === 'UNDECIDED' || !g.home || !g.away) return;
      const a = ownerById[g.home.teamId], b = ownerById[g.away.teamId];
      if (!a || !b || !h2h[a+'|'+b] || !h2h[b+'|'+a]) return;
      if (g.winner === 'HOME') { h2h[a+'|'+b].w++; h2h[b+'|'+a].l++; }
      else if (g.winner === 'AWAY') { h2h[a+'|'+b].l++; h2h[b+'|'+a].w++; }
      else { h2h[a+'|'+b].t++; h2h[b+'|'+a].t++; }
    });
  });

  const header = '<th class="rowhead"></th>' + teamIds.map(id => '<th>' + escapeHtml((names[id]||'?').slice(0,10)) + '</th>').join('');
  const bodyRows = teamIds.map(a => {
    const cells = teamIds.map(b => {
      if (a === b) return '<td class="diag">—</td>';
      const rec = h2h[a+'|'+b];
      return '<td class="num">' + rec.w + '-' + rec.l + (rec.t ? '-' + rec.t : '') + '</td>';
    }).join('');
    return '<tr><td class="rowhead">' + escapeHtml((names[a]||'?').slice(0,14)) + '</td>' + cells + '</tr>';
  }).join('');

  const h2hTable = teamIds.length
    ? '<h2 class="section-title">Head-to-head</h2>' +
      '<p class="section-note">Row team\'s record against column team, wins-losses(-ties), across checked seasons.</p>' +
      '<div class="h2h-scroll"><table class="h2h"><thead><tr>' + header + '</tr></thead><tbody>' + bodyRows + '</tbody></table></div>'
    : '';

historyContent.innerHTML = recordsTable + h2hTable + ownerIdReferenceHtml();
}
