<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Gridiron Board — League Tracker</title>
<meta name="theme-color" content="#3F3F3F">
<meta name="description" content="A scoreboard for your ESPN fantasy football league.">

<!-- PWA hookup -->
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:#3F3F3F;
    --surface:#4A4A4A;
    --surface-2:#565656;
    --line:#5F5F5F;
    --ink:#E5E5E5;
    --ink-dim:#A8A8A8;
    --amber:#CEB888;
    --win:#8FBF9F;
    --loss:#D3684F;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter', sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    padding-bottom:56px;
  }
  .wrap{max-width:760px;margin:0 auto;padding:0 20px;}
  a{color:inherit;}

  /* Header */
  header.board{
    padding:28px 0 20px;
    border-bottom:1px solid var(--line);
  }
  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    letter-spacing:.1em;
    color:var(--amber);
    text-transform:uppercase;
  }
  h1{
    font-family:'Oswald', sans-serif;
    font-weight:600;
    font-size:clamp(26px, 6vw, 36px);
    margin:2px 0 4px;
    letter-spacing:.01em;
    line-height:1.05;
  }
  .week-chip{
    display:block;
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    color:var(--ink-dim);
  }
  .week-chip strong{color:var(--ink); font-weight:500;}

  /* Controls */
  .controls{
    display:flex;
    align-items:flex-end;
    gap:8px;
    flex-wrap:wrap;
    margin-top:20px;
  }
  .field{display:flex; flex-direction:column; gap:5px;}
  .field label{
    font-family:'JetBrains Mono', monospace;
    font-size:10px;
    letter-spacing:.07em;
    text-transform:uppercase;
    color:var(--ink-dim);
  }
  .controls-compact{ align-items:center; gap:12px; }
  .fieldC{ display:flex; flex-direction:column; gap:5px; }
  .label-spacer{ display:block; font-size:10px; line-height:1.2; min-height:12px; }
  .fieldC label{
    font-family:'JetBrains Mono', monospace;
    font-size:10px; letter-spacing:.07em;
    text-transform:uppercase; color:var(--ink-dim);
  }
  .year-chips{ display:inline-flex; align-items:stretch; border:1px solid var(--line); border-radius:8px; overflow:hidden; }
  .year-chips button{
    appearance:none; border:0; background:var(--surface); color:var(--ink-dim);
    font-family:'JetBrains Mono', monospace; font-size:12px; font-weight:600;
    padding:6px 11px; cursor:pointer; border-right:1px solid var(--line);
    transition:background .12s, color .12s;
  }
  .year-chips button:last-child{ border-right:0; }
  .year-chips button:hover{ color:var(--ink); }
  .year-chips button.on{ background:var(--amber); color:#1a1a1a; }
  .season-bulk{ display:inline-flex; align-items:center; gap:4px; margin-top:5px; }
  .season-bulk-btn{
    appearance:none; border:0; background:none; padding:0; cursor:pointer;
    font-family:'JetBrains Mono', monospace; font-size:11px; font-weight:600;
    color:var(--ink-dim); text-transform:uppercase; letter-spacing:.03em;
    transition:color .12s;
  }
  .season-bulk-btn:hover{ color:var(--amber); }
  .season-bulk-sep{ color:var(--line); font-size:11px; }
  .sel-sm{ font-size:12px; padding:6px 8px; }
  .btn-icon-sm{ padding:6px 9px; font-size:13px; line-height:1; }
  .visually-hidden{
    position:absolute !important; width:1px; height:1px; padding:0; margin:-1px;
    overflow:hidden; clip:rect(0 0 0 0); white-space:nowrap; border:0;
  }
  input, select{
    background:var(--surface);
    border:1px solid var(--line);
    color:var(--ink);
    font-family:'Inter', sans-serif;
    font-size:14px;
    padding:9px 11px;
    border-radius:8px;
    min-width:110px;
    height:38px;
  }
  input::placeholder{color:var(--ink-dim);}
  input:focus, select:focus, button:focus-visible{
    outline:2px solid var(--amber);
    outline-offset:1px;
  }

  /* Buttons — one system, three variants */
  .btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    height:38px;
    padding:0 18px;
    border-radius:8px;
    font-family:'Inter', sans-serif;
    font-weight:600;
    font-size:13px;
    cursor:pointer;
    border:1px solid transparent;
    white-space:nowrap;
  }
  .btn-primary{background:var(--amber); color:#1A1200; border-color:var(--amber);}
  .btn-primary:hover{filter:brightness(1.06);}
  .btn-primary:disabled{opacity:.5; cursor:not-allowed; filter:none;}
  .btn-ghost{background:transparent; color:var(--ink-dim); border-color:var(--line);}
  .btn-ghost:hover{color:var(--ink); border-color:var(--ink-dim);}
  .btn-text{
    height:auto; padding:0;
    background:none; color:var(--ink-dim);
    font-weight:500; font-size:13px;
    text-decoration:underline; text-underline-offset:3px; text-decoration-color:var(--line);
  }
  .btn-text:hover{color:var(--amber); text-decoration-color:var(--amber);}

  /* Tabs */
  nav.tabs{
    display:flex;
    gap:22px;
    margin:28px 0 18px;
    border-bottom:1px solid var(--line);
    overflow-x:auto;
    scrollbar-width:none;
  }
  nav.tabs::-webkit-scrollbar{display:none;}
  nav.tabs button{
    background:none;
    border:none;
    color:var(--ink-dim);
    font-family:'Oswald', sans-serif;
    font-size:14px;
    letter-spacing:.01em;
    padding:9px 1px 11px;
    cursor:pointer;
    border-bottom:2px solid transparent;
    white-space:nowrap;
    flex:none;
  }
  nav.tabs button.active{color:var(--ink); border-bottom-color:var(--amber);}

  /* Status / errors */
  .status{
    font-family:'Inter', sans-serif;
    font-size:13px;
    color:var(--ink-dim);
    padding:16px 0;
  }
  .error{
    background:var(--surface);
    border-left:3px solid var(--loss);
    border-radius:0 8px 8px 0;
    padding:14px 16px;
    font-size:13px;
    line-height:1.55;
    color:var(--ink);
  }
  .error strong{color:var(--loss);}

  /* Standings table */
  table{width:100%; border-collapse:collapse; margin-bottom:28px;}
  thead th{
    text-align:left;
    font-family:'JetBrains Mono', monospace;
    font-size:10px;
    letter-spacing:.07em;
    text-transform:uppercase;
    color:var(--ink-dim);
    padding:0 10px 10px;
    font-weight:500;
  }
  thead th.num, td.num{text-align:right;}
  tbody td{
    padding:13px 10px;
    border-top:1px solid var(--line);
    font-size:13px;
  }
  tbody tr:first-child td{border-top:none;}
  .rank{font-family:'JetBrains Mono', monospace; color:var(--ink-dim); width:26px;}
  .team-name{font-weight:600;}
  .team-id{font-family:'JetBrains Mono', monospace; font-weight:400; font-size:11px; color:var(--ink-dim);}
  .owner-key{
    display:block;
    font-family:'JetBrains Mono', monospace;
    font-weight:400;
    font-size:10px;
    color:var(--ink-dim);
    word-break:break-all;
    margin-top:2px;
    -webkit-user-select:text;
    user-select:text;
  }
  td.num{font-family:'JetBrains Mono', monospace;}
  .pos-rank{display:inline-block; margin-left:5px; font-family:'JetBrains Mono', monospace; font-size:9px; color:var(--ink-dim); vertical-align:middle;}
  .pos-rank.top{color:var(--amber); font-weight:700;}

  .owner-ref{margin:20px 0 30px;}
  .owner-ref summary{
    cursor:pointer;
    font-family:'Oswald', sans-serif;
    font-size:14px;
    color:var(--ink-dim);
    padding:10px 0;
    list-style:none;
  }
  .owner-ref summary::-webkit-details-marker{display:none;}
  .owner-ref summary::before{content:'▸ '; }
  .owner-ref[open] summary::before{content:'▾ ';}
  .owner-ref summary:hover{color:var(--ink);}
  .owner-ref table{font-size:11px;}
  .owner-ref td, .owner-ref th{padding:7px 9px;}
  .owner-ref .oid{
    font-family:'JetBrains Mono', monospace;
    word-break:break-all;
    color:var(--ink-dim);
    -webkit-user-select:text;
    user-select:text;
  }
  .rec{white-space:nowrap;}

  /* Matchups */
  .matchup{
    background:var(--surface);
    border-radius:var(--radius);
    padding:16px 18px;
    margin-bottom:10px;
    display:grid;
    grid-template-columns:1fr auto 1fr;
    align-items:center;
    gap:14px;
    color:inherit;
    text-decoration:none;
    transition:transform .12s ease, box-shadow .12s ease;
  }
  .matchup:hover{transform:translateY(-1px); box-shadow:0 4px 14px rgba(0,0,0,.18);}
  .side{display:flex; flex-direction:column; gap:3px;}
  .side.right{text-align:right; align-items:flex-end;}
  .side .nm{font-weight:600; font-size:13px;}
  .side .pts{font-family:'JetBrains Mono', monospace; font-size:22px; font-weight:700;}
  .side.win .pts{color:var(--win);}
  .side.lose .pts{color:var(--ink-dim);}
  .vs{font-family:'Oswald', sans-serif; color:var(--ink-dim); font-size:11px;}

  /* Preview / Review */
  .placeholder-banner{
    background:var(--surface);
    border-left:3px solid var(--amber);
    border-radius:0 8px 8px 0;
    padding:12px 14px;
    font-size:12px;
    color:var(--ink-dim);
    line-height:1.55;
    margin-bottom:18px;
  }
  .spotlight-card{
    background:linear-gradient(135deg, var(--surface) 0%, var(--surface-2) 100%);
    border-radius:var(--radius);
    padding:18px 18px 16px;
    margin-bottom:18px;
  }
  .spotlight-label{
    font-family:'JetBrains Mono', monospace;
    font-size:10px;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--amber);
  }
  .spotlight-matchup{
    font-family:'Oswald', sans-serif;
    font-weight:600;
    font-size:19px;
    margin:6px 0 8px;
  }
  .spotlight-banter{font-size:13px; line-height:1.55; color:var(--ink);}

  .pr-matchup{
    background:var(--surface);
    border-radius:var(--radius);
    padding:16px 18px;
    margin-bottom:12px;
    display:block;
    color:inherit;
    text-decoration:none;
    transition:transform .12s ease, box-shadow .12s ease;
  }
  .pr-matchup:hover{transform:translateY(-1px); box-shadow:0 4px 14px rgba(0,0,0,.18);}
  .pr-matchup-teams{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    font-family:'Oswald', sans-serif;
    font-weight:600;
    font-size:15px;
    margin-bottom:4px;
  }
  .pr-matchup-teams .vs-sep{color:var(--ink-dim); font-family:'Inter',sans-serif; font-weight:400; font-size:11px; margin:0 6px;}
  .pr-matchup-sub{font-family:'JetBrains Mono', monospace; font-size:11px; color:var(--ink-dim); margin-bottom:10px;}
  .pr-matchup-banter{font-size:13px; line-height:1.55; color:var(--ink); margin-top:8px;}
  .pr-matchup-result{font-family:'JetBrains Mono', monospace; font-size:13px; margin-top:2px;}
  .winner-name{color:var(--win); font-weight:700;}

  /* Awards */
  .award-grid{
    display:grid;
    grid-template-columns:1fr;
    gap:10px;
    margin-bottom:20px;
  }
  .award-card{
    background:var(--surface);
    border-radius:var(--radius);
    padding:16px 18px;
    display:grid;
    grid-template-columns:auto 1fr;
    gap:14px;
    align-items:center;
  }
  .award-emoji{font-size:26px; line-height:1;}
  .award-title{
    font-family:'Oswald', sans-serif;
    font-weight:600;
    font-size:15px;
    letter-spacing:.01em;
  }
  .award-desc{font-size:11px; color:var(--ink-dim); margin-top:1px;}
  .award-winner{font-weight:600; font-size:14px; margin-top:6px;}
  .award-detail{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    color:var(--ink-dim);
    margin-top:2px;
  }

  /* Profile */
  .profile-header{
    background:linear-gradient(135deg, var(--surface) 0%, var(--surface-2) 100%);
    border-radius:var(--radius);
    padding:22px 20px;
    margin:16px 0 20px;
  }
  .profile-name{
    font-family:'Oswald', sans-serif;
    font-weight:600;
    font-size:24px;
    letter-spacing:.01em;
  }
  .profile-sub{font-size:12px; color:var(--ink-dim); margin-top:2px;}
  .profile-record{
    font-family:'JetBrains Mono', monospace;
    font-size:34px;
    font-weight:700;
    color:var(--amber);
    margin-top:10px;
  }
  .profile-record-label{font-size:11px; color:var(--ink-dim); text-transform:uppercase; letter-spacing:.06em;}

  .stat-tile-grid{
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:8px;
    margin-bottom:22px;
  }
  .stat-tile{
    background:var(--surface);
    border-radius:var(--radius);
    padding:12px 14px;
  }
  .stat-tile-value{font-family:'JetBrains Mono', monospace; font-size:19px; font-weight:700;}
  .stat-tile-label{font-size:10px; color:var(--ink-dim); text-transform:uppercase; letter-spacing:.05em; margin-top:2px;}

  .profile-pair-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-bottom:22px;
  }
  .profile-pair-card{
    background:var(--surface);
    border-radius:var(--radius);
    padding:14px 14px;
  }
  .profile-pair-label{font-size:10px; color:var(--ink-dim); text-transform:uppercase; letter-spacing:.05em;}
  .profile-pair-name{font-weight:600; font-size:14px; margin-top:6px;}
  .profile-pair-detail{font-family:'JetBrains Mono', monospace; font-size:12px; color:var(--ink-dim); margin-top:2px;}

  .badge-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(56px, 1fr));
    gap:6px;
    margin:14px 0 22px;
  }
  .badge-card{
    background:var(--surface);
    border-radius:8px;
    padding:7px 3px 6px;
    text-align:center;
    position:relative;
  }
  .badge-card.locked{opacity:.32; filter:grayscale(1);}
  .badge-emoji{font-size:17px; display:block; margin-bottom:3px; line-height:1;}
  .badge-title{
    font-family:'Oswald', sans-serif;
    font-size:8px;
    line-height:1.15;
    color:var(--ink-dim);
  }
  .badge-card:not(.locked) .badge-title{color:var(--ink);}
  .badge-count{
    position:absolute;
    top:2px;
    right:3px;
    background:var(--amber);
    color:#1A1200;
    font-family:'JetBrains Mono', monospace;
    font-size:7px;
    font-weight:700;
    border-radius:6px;
    padding:0px 3px;
  }

  /* History */
  .season-picker{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    margin:16px 0 24px;
  }
  .season-chip{
    display:inline-flex;
    align-items:center;
    gap:6px;
    background:var(--surface);
    border-radius:20px;
    padding:6px 12px 6px 9px;
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    color:var(--ink-dim);
    cursor:pointer;
    user-select:none;
  }
  .season-chip:has(input:checked){color:var(--ink); background:var(--surface-2);}
  .season-chip input{margin:0; accent-color:var(--amber);}
  h2.section-title{
    font-family:'Oswald', sans-serif;
    font-weight:500;
    font-size:17px;
    letter-spacing:.01em;
    margin:0 0 6px;
  }
  .section-note{
    font-size:12px;
    color:var(--ink-dim);
    margin:0 0 14px;
    line-height:1.55;
  }
  .otd-cards{
    display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:10px; margin:0 0 20px;
  }
  .otd-card{
    background:var(--surface-2); border:1px solid var(--line);
    border-radius:var(--radius); padding:12px 14px;
  }
  .otd-card-label{
    font-family:'Oswald', sans-serif; font-size:11px; font-weight:600;
    letter-spacing:.06em; text-transform:uppercase; color:var(--gold,#d9a441);
    margin:0 0 6px;
  }
  .otd-card-year{ font-size:11px; color:var(--ink-dim); margin:0 0 8px; }
  .otd-card-line{
    display:flex; justify-content:space-between; gap:8px;
    font-size:13px; padding:2px 0; color:var(--ink-dim);
  }
  .otd-card-line.otd-win{ color:var(--ink,#E5E5E5); font-weight:600; }
  .otd-pts{ font-variant-numeric:tabular-nums; }
  .otd-season{ margin:0 0 14px; }
  .otd-season-year{
    font-family:'Oswald', sans-serif; font-size:14px; font-weight:500;
    color:var(--ink,#E5E5E5); margin:0 0 6px; padding-bottom:3px;
    border-bottom:1px solid var(--line);
  }
  .otd-season-games{ display:flex; flex-direction:column; gap:3px; }
  .otd-game{
    display:flex; align-items:center; gap:8px; flex-wrap:wrap;
    font-size:12px; color:var(--ink-dim); padding:2px 0;
  }
  .otd-team{ font-variant-numeric:tabular-nums; }
  .otd-team.otd-win{ color:var(--win,#8FBF9F); font-weight:600; }
  .otd-sep{ color:var(--ink-dim); font-size:10px; opacity:.7; }
  .otd-badge{
    font-size:9px; font-weight:700; letter-spacing:.05em; text-transform:uppercase;
    color:var(--gold,#d9a441); border:1px solid var(--gold,#d9a441);
    border-radius:4px; padding:1px 5px;
  }
  /* What-If Standings */
  .wi-intro{ color:var(--ink-dim); font-size:12px; margin:0 0 12px; }
  .wi-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:14px; }
  .wi-card{ border:1px solid var(--line,#2a2a2a); border-radius:8px; padding:12px 14px; background:var(--panel,rgba(255,255,255,.02)); }
  .wi-title{ margin:0 0 2px; font-size:14px; }
  .wi-desc{ margin:0 0 10px; font-size:11px; color:var(--ink-dim); }
  .wi-table{ width:100%; border-collapse:collapse; font-size:12px; }
  .wi-table th{ text-align:left; font-size:10px; text-transform:uppercase; letter-spacing:.04em; color:var(--ink-dim); padding:2px 6px; border-bottom:1px solid var(--line,#2a2a2a); }
  .wi-table td{ padding:3px 6px; }
  .wi-rank{ color:var(--ink-dim); width:24px; }
  .wi-team{ font-weight:600; }
  .wi-metric{ text-align:right; white-space:nowrap; }
  .wi-playoff-line td{ border-bottom:2px solid var(--gold,#d9a441); }
  .wi-delta{ font-size:11px; font-weight:700; }
  .wi-up{ color:#4caf50; }
  .wi-down{ color:#e05656; }
  .wi-same{ color:var(--ink-dim); }
  .belt-current{
    display:inline-block;
    font-size:9px;
    font-weight:700;
    letter-spacing:0.08em;
    color:#1a1205;
    background:var(--amber);
    border-radius:4px;
    padding:1px 5px;
    vertical-align:middle;
  }
  .belt-how{
    font-size:12px;
    color:var(--ink-dim);
  }
  .glossary-link{
    color:var(--amber);
    text-decoration:none;
    border-bottom:1px dotted var(--amber);
    transition:opacity 0.15s ease;
  }
  .glossary-link:hover{ opacity:0.75; }
  .footnotes{
    margin:14px 0 0;
    padding-top:12px;
    border-top:1px solid var(--line);
  }
  .footnotes p{
    font-size:12px;
    color:var(--ink-dim);
    margin:0 0 8px;
    line-height:1.55;
  }
  .footnotes p:last-child{margin-bottom:0;}
  .footnotes strong{color:var(--ink);}
  table.h2h{font-size:11px;}
  table.h2h th, table.h2h td{padding:9px 10px; white-space:nowrap;}
  table.h2h th.rowhead, table.h2h td.rowhead{
    text-align:left;
    font-weight:600;
    position:sticky;
    left:0;
    background:var(--bg);
  }
  table.h2h td.diag{color:var(--ink-dim);}
  .h2h-scroll{overflow-x:auto; margin-bottom:30px; border-radius:var(--radius);}

  footer{
    text-align:center;
    color:var(--ink-dim);
    font-family:'Inter', sans-serif;
    font-size:11px;
    margin-top:36px;
  }

  /* Award glossary modal */
  .award-count-btn{
    display:inline-flex;
    align-items:center;
    gap:5px;
    margin-left:10px;
    padding:2px 9px;
    background:var(--surface-2);
    border:1px solid var(--line);
    border-radius:999px;
    color:var(--amber);
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    font-weight:700;
    cursor:pointer;
    vertical-align:middle;

<script>
// This app is built for one specific league — no need to expose the ID
// in the UI. Change it here if you ever repoint this deployment.
const LEAGUE_ID = '232506';

const viewSeasonSelect = document.getElementById('viewSeason');
const viewWeekSelect = document.getElementById('viewWeek');

const beltView = document.getElementById('beltView');
const recordBookView = document.getElementById('recordBookView');
  const milestonesView = document.getElementById('milestonesView');
  const h2hView = document.getElementById('h2hView');
  const eloView = document.getElementById('eloView');
const histDownloadBtn = document.getElementById('histDownloadBtn');
const historyStatus = document.getElementById('historyStatus');
const historyContent = document.getElementById('historyContent');
const leagueTitle = document.getElementById('leagueTitle');
const weekChip = document.getElementById('weekChip');

// Build season dropdown: most recently completed season defaults selected.
// NFL seasons run roughly Sep -> Feb, so before ~August the "current" season
// on ESPN is still last year's completed one.
const now = new Date();
const currentCalendarYear = now.getFullYear();
const seasonInProgressCutoffMonth = 8; // August (1-indexed) - rough heuristic
const latestLikelySeason = now.getMonth() + 1 >= seasonInProgressCutoffMonth
  ? currentCalendarYear
  : currentCalendarYear - 1;

// Pre-2019 seasons now route through ESPN's older leagueHistory endpoint
// (see the proxy function) — this floor is just a sane default range, not
// a hard limit. Type any earlier year in "From season" if your league goes
// back further.
// Earliest season this league existed. Header chips always show the full
// range LEAGUE_FIRST_SEASON..latestLikelySeason; uncached older seasons are
// fetched on demand when their chip is checked.
const LEAGUE_FIRST_SEASON = 2016;

// ---------------------------------------------------------------
// Rename any team here — keys are the owner's ESPN member ID
// (team.primaryOwner), NOT the team ID. This is what actually stays tied
// to a person across seasons, even if their team ID changes or the ESPN
// team name changes every year. Find each owner's ID in the small tag
// under their name on the Standings tab (shows their ESPN display name
// too when available, purely as a hint — the ID string is the actual key).
// Teams left out just show whatever name ESPN has for them that season.
//
// This is just the fallback/default set, edited by hand in code. The
// easier way to manage renames day-to-day is data/team-names.json — it's
// loaded automatically on startup and overrides anything set here, and
// it's plain JSON so it's editable straight on GitHub's website, no code
// required. See loadTeamNameOverrides() below.
//
// Falls back to matching by team ID if a team has no primaryOwner for some
// reason, so this doesn't just silently do nothing in that edge case.
// ---------------------------------------------------------------
const TEAM_NAME_OVERRIDES = {
  // '{A1B2C3D4-E5F6-7890-ABCD-EF1234567890}': 'The Gridiron Gurus',
};

let state = { teams: [], schedule: [], currentWeek: null, leagueName: '', seasonYear: null, settings: {}, members: [] };
let history = { data: {}, loadedSeasons: [], checkedSeasons: new Set() };

function setTab(name){
  document.querySelectorAll('nav.tabs button').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
  standingsView.style.display = name === 'standings' ? '' : 'none';
  matchupsView.style.display = name === 'matchups' ? '' : 'none';
  previewView.style.display = name === 'preview' ? '' : 'none';
  reviewView.style.display = name === 'review' ? '' : 'none';
  positionsView.style.display = name === 'positions' ? '' : 'none';
  if (name === 'positions') renderPositions();
  awardsView.style.display = name === 'awards' ? '' : 'none';
  profileView.style.display = name === 'profile' ? '' : 'none';
  historyView.style.display = name === 'history' ? '' : 'none';
  beltView.style.display = name === 'belt' ? '' : 'none';
  if (name === 'belt') renderBeltContent();
  recordBookView.style.display = name === 'records' ? '' : 'none';
  if (name === 'records') renderRecordBookContent();
  milestonesView.style.display = name === 'milestones' ? '' : 'none';
  if (name === 'milestones') renderMilestonesContent();
  h2hView.style.display = name === 'h2h' ? '' : 'none';
  if (name === 'h2h') renderH2HContent();
  eloView.style.display = name === 'elo' ? '' : 'none';
  if (name === 'elo') renderEloContent();
  otdView.style.display = name === 'otd' ? '' : 'none';
  if (name === 'otd') renderOnThisDayContent();
  whatifView.style.display = name === 'whatif' ? '' : 'none';
  if (name === 'whatif') renderWhatIfContent();
  recapView.style.display = name === 'recap' ? '' : 'none';
  if (name === 'recap') renderRecapContent();
    trashView.style.display = name === 'trash' ? '' : 'none';
    if (name === 'trash') renderTrashContent();
  draftView.style.display = name === 'draft' ? '' : 'none';
  if (name === 'draft') renderDraftContent();
}
document.querySelectorAll('nav.tabs button').forEach(b => b.addEventListener('click', () => setTab(b.dataset.tab)));

// ---- Draft recap / grades (Task 9) ----
const DRAFT_MIN_YEAR = 2018;
function draftAvailableYears(){
  const ys = [];
  const now = new Date().getFullYear();
  for (let y = now; y >= DRAFT_MIN_YEAR; y--) ys.push(y);
  return ys;
}

function buildDraftPlayerMap(data){
  const map = {};
  (data.players || []).forEach(entry => {
    const pl = entry.player || {};
    const r0 = (entry.ratings && entry.ratings["0"]) || {};
    map[entry.id] = {
      fullName: pl.fullName || ('Player ' + entry.id),
      posId: pl.defaultPositionId,
      pos: POSITION_NAMES[pl.defaultPositionId] || '?',
      positionalRanking: (typeof r0.positionalRanking === 'number' && r0.positionalRanking > 0) ? r0.positionalRanking : null,
      totalRanking: (typeof r0.totalRanking === 'number') ? r0.totalRanking : null,
      totalRating: (typeof r0.totalRating === 'number') ? r0.totalRating : null
    };
  });
  return map;
}

function draftTeamNameMap(data){
  const m = {};
  (data.teams || []).forEach(t => { m[t.id] = teamDisplayName(t); });
  return m;
}

// Steal/bust score: positional draft order vs. end-of-season positional rank.
// Positive = outperformed draft slot (steal); negative = underperformed (bust).
function gradeDraftPicks(picks, pmap){
  const posOrder = {}; // pos -> running count of how many at that pos drafted so far
  const graded = [];
  picks.slice().sort((a,b)=> (a.overallPickNumber||0)-(b.overallPickNumber||0)).forEach(pk => {
    const info = pmap[pk.playerId];
    if (!info) return;
    posOrder[info.pos] = (posOrder[info.pos] || 0) + 1;
    const draftPosRank = posOrder[info.pos]; // Nth at this position taken in the draft
    const endPosRank = info.positionalRanking;
    let delta = null;
    if (endPosRank != null) delta = draftPosRank - endPosRank; // >0 steal, <0 bust
    graded.push({ pk, info, draftPosRank, endPosRank, delta });
  });
  return graded;
}

async function renderDraftContent(){
  const view = document.getElementById('draftView');
  if (!view) return;
  if (!view.dataset.init){
    view.dataset.init = '1';
    const opts = draftAvailableYears().map(y => '<option value="'+y+'">'+y+'</option>').join('');
    view.innerHTML = '<div class="controls"><label>Season: <select id="draftYearSel">'+opts+'</select></label></div>'
                   + '<div id="draftBody"></div>';
    document.getElementById('draftYearSel').addEventListener('change', renderDraftBody);
  }
  renderDraftBody();
}

async function renderDraftBody(){
  const body = document.getElementById('draftBody');
  const year = document.getElementById('draftYearSel').value;
  body.innerHTML = '<p>Loading draft data\u2026</p>';
  const data = await fetchDraftData(year);
  if (!data || !data.draftDetail || !Array.isArray(data.draftDetail.picks) || !data.draftDetail.picks.length){
    body.innerHTML = '<p>No draft data available for ' + year + '.</p>';
    return;
  }
  const pmap = buildDraftPlayerMap(data);
  const tmap = draftTeamNameMap(data);
  const picks = data.draftDetail.picks;
  const graded = gradeDraftPicks(picks, pmap);

  // Steals & busts (only picks with an end-of-season positional rank)
  const rated = graded.filter(g => g.delta != null);
  const steals = rated.slice().sort((a,b)=> b.delta - a.delta).slice(0,10);
  const busts  = rated.slice().sort((a,b)=> a.delta - b.delta).slice(0,10);

  function pickRow(g){
    const pk = g.pk, info = g.info;
    const who = tmap[pk.teamId] || ('Team ' + pk.teamId);
    const rank = info.positionalRanking != null ? (info.pos + info.positionalRanking) : '\u2014';
    let tag = '';
    if (g.delta != null){
      if (g.delta >= 8) tag = ' <span class="draft-chip draft-chip-steal">STEAL</span>';
      else if (g.delta <= -8 && info.posId !== 5 && info.posId !== 16) tag = ' <span class="draft-chip draft-chip-bust">BUST</span>';
    }
    return '<tr><td>' + (pk.overallPickNumber||'') + '</td><td>' + escapeHtml(info.fullName)
         + '</td><td>' + info.pos + '</td><td>' + escapeHtml(who) + '</td><td>' + rank + tag + '</td></tr>';
  }

  // Group by round
  const rounds = {};
  picks.forEach(pk => { (rounds[pk.roundId] = rounds[pk.roundId] || []).push(pk); });
  const gByPlayer = {};
  graded.forEach(g => { gByPlayer[g.pk.playerId + ':' + g.pk.overallPickNumber] = g; });

  // Count steals & busts drafted by each owner (same thresholds as pick tags)
  const ownerTally = {};
  graded.forEach(g => {
    if (g.delta == null) return;
    const info = g.info;
    const who = tmap[g.pk.teamId] || ('Team ' + g.pk.teamId);
    const rec = ownerTally[who] || (ownerTally[who] = { steals: 0, busts: 0 });
    if (g.delta >= 8) rec.steals++;
    else if (g.delta <= -8 && info.posId !== 5 && info.posId !== 16) rec.busts++;
  });
  const tallyRows = Object.keys(ownerTally)
    .map(who => ({ who: who, steals: ownerTally[who].steals, busts: ownerTally[who].busts }))
    .sort((a,b)=> (b.steals - b.busts) - (a.steals - a.busts) || b.steals - a.steals);

  let html = '';
  html += '<p class="draft-legend">'
        + '<span class="draft-chip draft-chip-steal">Steal</span> drafted &ge; 8 spots below where the player finished at their position. '
        + '<span class="draft-chip draft-chip-bust">Bust</span> drafted &ge; 8 spots above their final position rank (kickers &amp; defenses excluded).'
        + '</p>';
  html += '<h3>Steals &amp; Busts by Owner</h3><table class="data"><thead><tr><th>Owner</th><th>Steals</th><th>Busts</th></tr></thead><tbody>'
        + tallyRows.map(r => '<tr><td>' + escapeHtml(r.who)
            + '</td><td>' + (r.steals ? '<span class="draft-chip draft-chip-steal">' + r.steals + '</span>' : '\u2014')
            + '</td><td>' + (r.busts ? '<span class="draft-chip draft-chip-bust">' + r.busts + '</span>' : '\u2014')
            + '</td></tr>').join('') + '</tbody></table>';

  html += '<h3>Full Draft Board</h3>';
  Object.keys(rounds).map(Number).sort((a,b)=>a-b).forEach(rd => {
    html += '<h4>Round ' + rd + '</h4>';
    html += '<table class="data"><thead><tr><th>Pick</th><th>Player</th><th>Pos</th><th>Team</th><th>End Rank</th></tr></thead><tbody>';
    rounds[rd].slice().sort((a,b)=>(a.overallPickNumber||0)-(b.overallPickNumber||0)).forEach(pk => {
      const g = gByPlayer[pk.playerId + ':' + pk.overallPickNumber];
      if (g) html += pickRow(g);
      else {
        const info = pmap[pk.playerId] || { fullName: 'Player ' + pk.playerId, pos: '?' };
        html += '<tr><td>' + (pk.overallPickNumber||'') + '</td><td>' + escapeHtml(info.fullName)
             + '</td><td>' + info.pos + '</td><td>' + escapeHtml(tmap[pk.teamId] || ('Team ' + pk.teamId))
             + '</td><td>\u2014</td></tr>';
      }
    });
    html += '</tbody></table>';
  });
  body.innerHTML = html;
}


function ownerKey(t){
  return t.primaryOwner || ('teamid:' + t.id); // fallback if a team has no owner on record
}

// Maps a raw owner GUID to a canonical one, for merging duplicate ESPN
// accounts belonging to the same real person (e.g. someone who joined
// under a second account in some seasons). Loaded from
// data/owner-aliases.json — {"<duplicate GUID>": "<canonical GUID>"}.
// Anything not listed just maps to itself.
let OWNER_ALIASES = {};

// This is the identity actually used for grouping/display everywhere
// (teamDisplayName, History all-time, Awards year-over-
// year) — raw ownerKey() is still used on its own only by the Owner ID
// reference table, since that table's job is to show the raw, pre-alias
// GUIDs so you know what to put into owner-aliases.json in the first place.
function resolvedOwnerKey(t){
  const raw = ownerKey(t);
  return OWNER_ALIASES[raw] || raw;
}

// Builds a {teamId: resolvedOwnerKey} lookup for one season's teams array.
// Needed anywhere a numeric team ID from schedule/bracket data (which only
// makes sense within a single season) has to be translated into the
// stable cross-season identity before it's used to accumulate multi-season
// stats — otherwise two different owners who held the same team ID slot
// in different years (or the same owner across two different accounts)
// get scattered across separate rows instead of merged into one.
function idToOwnerKeyMap(teams){
  const m = {};
  teams.forEach(t => { m[t.id] = resolvedOwnerKey(t); });
  return m;
}

function teamDisplayName(t){
  const key = resolvedOwnerKey(t);
  if (TEAM_NAME_OVERRIDES[key] !== undefined) return TEAM_NAME_OVERRIDES[key];
  if (t.name) return t.name;
  const loc = t.location || '';
  const nick = t.nickname || '';
  return (loc + ' ' + nick).trim() || ('Team ' + t.id);
}

// ESPN's league response sometimes includes a top-level "members" array
// (id/displayName pairs) alongside teams — when it's there, this gives a
// human-readable hint on Standings next to the raw owner ID. When it's
// not there, the raw ID still works fine as the override key, it's just
// less friendly to look at while you're setting names up.
function ownerDisplayHint(t, members){
  const m = (members || []).find(mm => mm.id === t.primaryOwner);
  if (!m) return null;
  return m.displayName || [m.firstName, m.lastName].filter(Boolean).join(' ') || null;
}

// Loads data/team-names.json (a plain {"<espnTeamId>": "Custom Name"} map)
// and merges it into TEAM_NAME_OVERRIDES — its entries win over anything
// hardcoded above. Missing file, empty file, or invalid JSON all just mean
// "no overrides from the file" rather than an error. Since this can finish
// after the first render, it re-renders whatever's already on screen so
// names update immediately rather than needing a manual reload.
async function loadTeamNameOverrides(){
  try {
    const res = await fetch('./data/team-names.json');
    if (!res.ok) return;
    const map = await res.json();
    if (!map || typeof map !== 'object') return;
    Object.assign(TEAM_NAME_OVERRIDES, map);
  } catch (e) {
    return; // no file yet, or it's malformed — fall back silently
  }

  if (state.teams.length) { renderStandings(); renderMatchups(); }
  renderAwards();
  renderProfile();
  if (history.loadedSeasons.length) renderHistoryContent();
}
loadTeamNameOverrides();

// Loads data/owner-aliases.json (a plain {"<duplicate GUID>": "<canonical
// GUID>"} map) and merges it into OWNER_ALIASES — see resolvedOwnerKey()
// above for how it's used. Same silent-fallback behavior as the other data
// files: missing/empty/invalid just means no aliases, not an error.
async function loadOwnerAliases(){
  try {
    const res = await fetch('./data/owner-aliases.json');
    if (!res.ok) return;
    const map = await res.json();
    if (!map || typeof map !== 'object') return;
    Object.assign(OWNER_ALIASES, map);
  } catch (e) {
    return;
  }

  if (state.teams.length) { renderStandings(); renderMatchups(); }
  if (history.loadedSeasons.length) {
    refreshSeasonDependentViews();
  } else {
    renderAwards();
  }
  renderProfile();
}
loadOwnerAliases();

// Every season currently available to pick from: whatever's cached/fetched,
// plus the current likely season even if nothing's been loaded for it yet
// (selecting it triggers a live fetch the first time).
function populateSeasonSelect(){
  // Always show the full league range so never-loaded older seasons still
  // appear as (unchecked) chips the user can fetch on demand.
  const years = new Set(history.loadedSeasons);
  years.add(latestLikelySeason);
  for (let y = LEAGUE_FIRST_SEASON; y <= latestLikelySeason; y++) years.add(y);
  const sorted = [...years].sort((a, b) => b - a);

  const prev = viewSeasonSelect.value ? parseInt(viewSeasonSelect.value, 10) : state.seasonYear;
  viewSeasonSelect.innerHTML = sorted.map(y => '<option value="' + y + '">' + y + '</option>').join('');
  viewSeasonSelect.value = sorted.includes(prev) ? prev : sorted[0];
  renderSeasonChips(sorted);
}

// Renders the segmented year chips that mirror/drive the hidden #viewSeason
// select. Clicking a chip sets the select value and calls selectSeason so all
// existing wiring stays untouched.
function renderSeasonChips(sorted){
  const strip = document.getElementById('seasonChips');
  if (!strip) return;
  strip.innerHTML = sorted.map(y => {
    const on = history.checkedSeasons.has(y) ? ' on' : '';
    return '<button type="button" class="year-chip' + on + '" data-year="' + y + '"'
      + ' aria-pressed="' + (on ? 'true' : 'false') + '">' + y + '</button>';
  }).join('');
  strip.querySelectorAll('button.year-chip').forEach(btn => {
    btn.addEventListener('click', () => {
      const yr = parseInt(btn.dataset.year, 10);
      const isOn = history.checkedSeasons.has(yr);
      if (!isOn) {
        if (history.data[yr]) {
          history.checkedSeasons.add(yr);
          activateNewestChecked();
        } else {
          selectSeason(yr, false);
        }
      } else {
        if (history.checkedSeasons.size <= 1) return;
        history.checkedSeasons.delete(yr);
        activateNewestChecked();
      }
    });
  });
}

function wireSeasonBulkButtons(){
  const selAll = document.getElementById("seasonSelectAll");
  const deselAll = document.getElementById("seasonDeselectAll");
  if (selAll) selAll.addEventListener("click", () => {
    history.loadedSeasons.forEach(y => { if (history.data[y]) history.checkedSeasons.add(y); });
    if (!history.checkedSeasons.size && history.loadedSeasons.length) {
      history.checkedSeasons.add(history.loadedSeasons[history.loadedSeasons.length - 1]);
    }
    const sorted = [...new Set([...history.loadedSeasons])].sort((a, b) => b - a);
    renderSeasonChips(sorted);
    activateNewestChecked();
    refreshSeasonDependentViews();
  });
  if (deselAll) deselAll.addEventListener("click", () => {
    const checked = Array.from(history.checkedSeasons).sort((a, b) => b - a);
    if (!checked.length) return;
    history.checkedSeasons = new Set([checked[0]]);
    const sorted = [...new Set([...history.loadedSeasons])].sort((a, b) => b - a);
    renderSeasonChips(sorted);
    activateNewestChecked();
    refreshSeasonDependentViews();
  });
}

function activateNewestChecked(){
  const checked = Array.from(history.checkedSeasons).sort((a, b) => b - a);
  if (!checked.length) return;
  const newest = checked[0];
  if (viewSeasonSelect) viewSeasonSelect.value = newest;
  applySeasonToState(newest);
}

// Single-season views can only show one season at a time. When the header
// multi-select has more than one season checked, grey the view out with a
// prompt instead of silently showing just the newest.
function multiSeasonGuard(viewEl, label){
  if (history.checkedSeasons && history.checkedSeasons.size > 1){
    viewEl.innerHTML = '<div class="status multi-season-notice">' + escapeHtml(label) + ' shows one season at a time. You have ' + history.checkedSeasons.size + ' seasons selected. Uncheck all but one in the header to view this tab.</div>';
    return true;
  }
  return false;
}

// Weeks available for the currently loaded season's schedule — includes
// in-progress weeks (not just completed ones) so Matchups can show live
// scores mid-week, not just finished games.
function populateWeekSelect(){
  const weeks = [...new Set(state.schedule.map(g => g.matchupPeriodId))].sort((a, b) => a - b);
  if (!weeks.length) { viewWeekSelect.innerHTML = ''; return; }

  const defaultWeek = state.currentWeek && weeks.includes(state.currentWeek) ? state.currentWeek : weeks[weeks.length - 1];
  viewWeekSelect.innerHTML = weeks.map(w => '<option value="' + w + '">Week ' + w + '</option>').join('');

// Cache-first: uses whatever's already in history.data unless forceLive is
// set (the Refresh button), in which case it bypasses both the in-memory
// and static-file cache and pulls straight from ESPN.
function applySeasonToState(year){
  const data = history.data[year];
  if (!data) return;

  state.teams = data.teams || [];
  state.schedule = data.schedule || [];
  state.currentWeek = (data.status && data.status.currentMatchupPeriod) || null;
  state.leagueName = (data.settings && data.settings.name) || 'Gridiron Board';
  state.seasonYear = year;
  state.settings = data.settings || {};
  state.members = data.members || [];

  leagueTitle.textContent = state.leagueName;
  weekChip.innerHTML = state.currentWeek
    ? 'Week <strong>' + state.currentWeek + '</strong> · ' + state.teams.length + ' teams'
    : state.teams.length + ' teams';

  populateSeasonSelect();
  populateWeekSelect();

  renderStandings();
  renderMatchups();
  renderPreview();
  renderReview();
  renderAwards();
  renderProfile();
  if (history.loadedSeasons.length) renderHistoryContent();
  renderPositions();
  if (beltView) renderBeltContent();
  if (recordBookView) renderRecordBookContent();
  if (milestonesView) renderMilestonesContent();
  if (eloView) renderEloContent();
}

async function selectSeason(year, forceLive){
  refreshBtn.disabled = true;
  statusArea.innerHTML = '<div class="status">Loading ' + year + (forceLive ? ' (live)' : '') + '…</div>';

  const result = await fetchHistorySeason(LEAGUE_ID, year, forceLive);

  if (!result.ok) {
    if (result.status === 401 || result.status === 403) {
      statusArea.innerHTML = privateLeagueMessage();
    } else if (result.status === 404 && !result.hasPayload) {
      statusArea.innerHTML = '<div class="error"><strong>Proxy function not found.</strong> ' +
        'This page needs to be deployed to Cloudflare Workers (with wrangler.jsonc and src/worker.js intact) for ' +
        'league data to load — opening index.html directly, or hosting on plain GitHub Pages, won\'t run ' +
        'the proxy. See the README for deploy steps.</div>';
    } else {
      statusArea.innerHTML = '<div class="error"><strong>Couldn\'t load ' + year + '.</strong> ' + escapeHtml(result.reason || 'Unknown error') + '</div>';
    }
    refreshBtn.disabled = false;
    return;
  }

  const data = result.data;
  history.data[year] = data;
  if (!history.loadedSeasons.includes(year)) {
    history.loadedSeasons.push(year);
    history.loadedSeasons.sort((a, b) => a - b);
  }
  history.checkedSeasons.add(year);

  activateNewestChecked();

  statusArea.innerHTML = '';
  refreshBtn.disabled = false;
}

function privateLeagueMessage(){
  return '<div class="error"><strong>This league looks private.</strong><br>' + privateLeagueMessageInner() + '</div>';
}
function privateLeagueMessageInner(){
  return 'Ask your commissioner to set the league to public under League Settings — this app doesn\'t currently ' +
    'support logging in for a private league.';
}

// "All-play" record: for every week, compares each team's score against
// every OTHER team's score that week (not just their actual opponent), so
// it answers "what would my record be if I played the whole league every
// week?" — a common way to separate a team's actual output from a lucky/
// unlucky schedule.
function computeAllPlayRecords(teams, schedule){
  const records = {};
  teams.forEach(t => { records[t.id] = { wins: 0, losses: 0, ties: 0 }; });

  const byWeek = {};
  (schedule || []).forEach(g => {
    if (!g.winner || g.winner === 'UNDECIDED' || !g.home || !g.away) return;
    const w = g.matchupPeriodId;
    (byWeek[w] = byWeek[w] || []).push({ teamId: g.home.teamId, points: g.home.totalPoints ?? 0 });
    byWeek[w].push({ teamId: g.away.teamId, points: g.away.totalPoints ?? 0 });
  });

  Object.values(byWeek).forEach(entries => {
    entries.forEach((a, i) => {
      const rec = records[a.teamId];
      if (!rec) return;
      entries.forEach((b, j) => {
        if (i === j) return;
        if (a.points > b.points) rec.wins++;
        else if (a.points < b.points) rec.losses++;
        else rec.ties++;
      });
    });
  });

  return records;
}

function allPlayPct(rec){
  const gp = rec.wins + rec.losses + rec.ties;
  return gp ? (rec.wins + rec.ties * 0.5) / gp : null;
}

// Wins vs league median: each completed week, a team beats the median
// of all scores that week => a win; below => a loss; exactly at the
// median (even team counts) => counts as a tie/half.
function computeMedianRecords(teams, schedule){
  const records = {};
  teams.forEach(t => { records[t.id] = { wins: 0, losses: 0, ties: 0 }; });

  const byWeek = {};
  (schedule || []).forEach(g => {
    if (!g.winner || g.winner === 'UNDECIDED' || !g.home || !g.away) return;
    const w = g.matchupPeriodId;
    (byWeek[w] = byWeek[w] || []).push({ teamId: g.home.teamId, points: g.home.totalPoints ?? 0 });
    byWeek[w].push({ teamId: g.away.teamId, points: g.away.totalPoints ?? 0 });
  });

  Object.values(byWeek).forEach(entries => {
    const pts = entries.map(e => e.points).sort((a, b) => a - b);
    const n = pts.length;
    if (!n) return;
    const median = n % 2 ? pts[(n - 1) / 2] : (pts[n / 2 - 1] + pts[n / 2]) / 2;
    entries.forEach(e => {
      const rec = records[e.teamId];
      if (!rec) return;
      if (e.points > median) rec.wins++;
      else if (e.points < median) rec.losses++;
      else rec.ties++;
    });
  });

  return records;
}

function renderStandings(){
  if (multiSeasonGuard(standingsView, 'Standings')) return;
  const allPlay = computeAllPlayRecords(state.teams, state.schedule);
  const powerByTeam = weeklyScoresByTeam();
  const medianRec = computeMedianRecords(state.teams, state.schedule);

  const sorted = [...state.teams].sort((a, b) => {
    const ra = a.record?.overall || {};
    const rb = b.record?.overall || {};
    if ((rb.wins||0) !== (ra.wins||0)) return (rb.wins||0) - (ra.wins||0);
    return (rb.pointsFor||0) - (ra.pointsFor||0);
  });

  let rows = sorted.map((t, i) => {
    const r = t.record?.overall || {};
    const rec = [r.wins||0, r.losses||0, r.ties||0].join('-');
    const apPct = allPlayPct(allPlay[t.id] || { wins: 0, losses: 0, ties: 0 });
    return '<tr>' +
      '<td class="rank">' + (i+1) + '</td>' +
      '<td class="team-name">' + escapeHtml(teamDisplayName(t)) + '</td>' +
      '<td class="num rec">' + rec + '</td>' +
      '<td class="num">' + (r.pointsFor ?? 0).toFixed(1) + '</td>' +
      '<td class="num">' + (r.pointsAgainst ?? 0).toFixed(1) + '</td>' +
      '<td class="num">' + (apPct === null ? '—' : (apPct * 100).toFixed(1) + '%') + '</td>' +
      '<td class="num">' + (function(){ var m = medianRec[t.id] || {wins:0,losses:0,ties:0}; return [m.wins||0, m.losses||0].join('-'); })() + '</td>' +
      '<td class="num">' + (powerByTeam[t.id] && powerByTeam[t.id].length ? powerScore(powerByTeam[t.id]).toFixed(1) : '—') + '</td>' +
      '</tr>';
  }).join('');

  standingsView.innerHTML = state.teams.length ? (
    '<table data-sortable><thead><tr>' +
    '<th></th><th>Team</th><th class="num">Record</th><th class="num">PF</th><th class="num">PA</th><th class="num">All-Play</th><th class="num">vs Median</th><th class="num">Power</th>' +
    '</tr></thead><tbody>' + rows + '</tbody></table>' +
    '<div class="footnotes">' +
      '<p><strong>All-Play</strong> &mdash; your win percentage as if you played every other team every week. Strips out schedule luck; a high all-play with a low record means you faced tough opponents.</p>' +
      '<p><strong>vs Median</strong> &mdash; your record if each week you were graded against the league-wide median score instead of your actual opponent. A win means you outscored half the league that week.</p>' +
      '<p><strong>Power</strong> &mdash; a score that rewards consistent week-to-week scoring, not just total points. Higher is better and less swingy than raw PF.</p>' +
    '</div>'
  ) : '';
}

function espnMatchupUrl(year, week){
  return 'https://fantasy.espn.com/football/league/scoreboard?leagueId=' +
    encodeURIComponent(LEAGUE_ID) + '&seasonId=' + encodeURIComponent(year) +
    '&matchupPeriodId=' + encodeURIComponent(week);
}

function renderMatchups(){
  if (multiSeasonGuard(matchupsView, 'Matchups')) return;
  const teamsById = {};
  state.teams.forEach(t => teamsById[t.id] = t);

  const week = viewWeekSelect.value ? parseInt(viewWeekSelect.value, 10) : state.currentWeek;
  const games = state.schedule.filter(g => g.matchupPeriodId === week);

  if (!games.length) {
    matchupsView.innerHTML = '<div class="status">No matchup data for this week yet.</div>';
    return;
  }

  matchupsView.innerHTML = games.map(g => {
    const home = g.home, away = g.away;
    if (!home || !away) return '';
    const homeTeam = teamsById[home.teamId];
    const awayTeam = teamsById[away.teamId];
    const homePts = home.totalPoints ?? 0;
    const awayPts = away.totalPoints ?? 0;
    const homeWin = homePts > awayPts;
    const awayWin = awayPts > homePts;
    const mUrl = espnMatchupUrl(state.seasonYear, week);
    return '<a class="matchup" href="' + mUrl + '" target="_blank" rel="noopener" title="View this matchup on ESPN">' +
      '<div class="side ' + (homeWin?'win':(awayWin?'lose':'')) + '">' +
        '<span class="nm">' + escapeHtml(homeTeam ? teamDisplayName(homeTeam) : 'TBD') + '</span>' +
        '<span class="pts">' + homePts.toFixed(1) + '</span>' +
      '</div>' +
      '<span class="vs">VS</span>' +
      '<div class="side right ' + (awayWin?'win':(homeWin?'lose':'')) + '">' +
        '<span class="nm">' + escapeHtml(awayTeam ? teamDisplayName(awayTeam) : 'TBD') + '</span>' +
        '<span class="pts">' + awayPts.toFixed(1) + '</span>' +
      '</div>' +
    '</a>';
  }).join('');
}

// ---------------------------------------------------------------
// Preview (upcoming week) / Review (prior week). Both work off whatever
// single season is currently selected at the top (same scope as
// Standings/Matchups) — no separate season picker of their own.
//
// Honest scope note: these do NOT include player projections or a
// "projected vs actual" comparison, because that needs roster/box-score
// level data (individual player projections and lineups) that this app
// doesn't currently fetch — see the banner text in each view. Everything
// else here (matchups, records, streaks, scoring context, generated
// banter) is real, computed from data already in hand.
//
// There's no server-side weekly cron — instead, both views simply
// recompute from whatever's currently loaded every time they're opened,
// so they're always current as of the last time the app fetched data
// (live during an active week, since Standings/Matchups already pull
// live scores). That satisfies "stays current" without needing Cloudflare
// Cron Triggers + persistent storage, which would be a bigger infra
// addition if true scheduled background regeneration is ever wanted.
// ---------------------------------------------------------------

function currentAndPriorWeeks(){
  const completedWeeks = [...new Set(state.schedule
    .filter(g => g.winner && g.winner !== 'UNDECIDED')
    .map(g => g.matchupPeriodId))].sort((a, b) => a - b);
  const allWeeks = [...new Set(state.schedule.map(g => g.matchupPeriodId))].sort((a, b) => a - b);
  const priorWeek = completedWeeks.length ? completedWeeks[completedWeeks.length - 1] : null;

  let upcomingWeek = state.currentWeek;
  if (upcomingWeek !== null && upcomingWeek !== undefined && completedWeeks.includes(upcomingWeek)) {
    const idx = allWeeks.indexOf(upcomingWeek);
    upcomingWeek = (idx >= 0 && idx + 1 < allWeeks.length) ? allWeeks[idx + 1] : null;
  }
  if (upcomingWeek === null || upcomingWeek === undefined) {
    const found = allWeeks.find(w => !completedWeeks.includes(w));
    upcomingWeek = found === undefined ? null : found;
  }
  return { priorWeek, upcomingWeek };
}

// Per-team season-to-date context (record, scoring average, trailing
// streak) used to build both preview and review banter.
function teamContexts(){
  const byTeam = {};
  state.teams.forEach(t => { byTeam[t.id] = { team: t, name: teamDisplayName(t), games: [] }; });

  state.schedule.forEach(g => {
    if (!g.winner || g.winner === 'UNDECIDED' || !g.home || !g.away) return;
    const hp = g.home.totalPoints ?? 0, ap = g.away.totalPoints ?? 0;
    if (byTeam[g.home.teamId]) byTeam[g.home.teamId].games.push({ week: g.matchupPeriodId, points: hp, result: g.winner === 'HOME' ? 'W' : g.winner === 'AWAY' ? 'L' : 'T' });
    if (byTeam[g.away.teamId]) byTeam[g.away.teamId].games.push({ week: g.matchupPeriodId, points: ap, result: g.winner === 'AWAY' ? 'W' : g.winner === 'HOME' ? 'L' : 'T' });
  });

  Object.values(byTeam).forEach(ctx => {
    ctx.games.sort((a, b) => a.week - b.week);
    const r = ctx.team.record?.overall || {};
    ctx.wins = r.wins || 0; ctx.losses = r.losses || 0; ctx.ties = r.ties || 0;
    const gp = ctx.wins + ctx.losses + ctx.ties;
    ctx.winPct = gp ? (ctx.wins + ctx.ties * 0.5) / gp : null;
    ctx.avgPoints = ctx.games.length ? ctx.games.reduce((s, g) => s + g.points, 0) / ctx.games.length : null;

    let streakType = null, streakLen = 0;
    for (let i = ctx.games.length - 1; i >= 0; i--) {
      const res = ctx.games[i].result;
      if (res === 'T') break;
      if (streakType === null) { streakType = res; streakLen = 1; }
      else if (res === streakType) { streakLen++; }
      else break;
    }
    ctx.streakType = streakType; ctx.streakLen = streakLen;
  });

  return byTeam;
}

function scoringRank(byTeam, teamId){
  const sorted = Object.values(byTeam).filter(c => c.avgPoints !== null).sort((a, b) => b.avgPoints - a.avgPoints);
  const idx = sorted.findIndex(c => c.team.id === teamId);
  return idx >= 0 ? idx + 1 : null;
}

function buildPreviewBanter(homeCtx, awayCtx, byTeam){
  const lines = [];
  const hName = homeCtx.name, aName = awayCtx.name;

  if (homeCtx.winPct !== null && awayCtx.winPct !== null) {
    lines.push(hName + ' (' + homeCtx.wins + '-' + homeCtx.losses + (homeCtx.ties ? '-' + homeCtx.ties : '') + ') takes on ' +
      aName + ' (' + awayCtx.wins + '-' + awayCtx.losses + (awayCtx.ties ? '-' + awayCtx.ties : '') + ').');
  }

  [homeCtx, awayCtx].forEach(ctx => {
    if (ctx.streakType === 'W' && ctx.streakLen >= 2) lines.push(ctx.name + ' rides a ' + ctx.streakLen + '-game win streak into this one.');
    if (ctx.streakType === 'L' && ctx.streakLen >= 2) lines.push(ctx.name + ' is trying to snap a ' + ctx.streakLen + '-game skid.');
  });

  const hRank = scoringRank(byTeam, homeCtx.team.id);
  const aRank = scoringRank(byTeam, awayCtx.team.id);
  if (hRank === 1) lines.push(hName + ' brings the league\'s top scoring offense.');
  else if (aRank === 1) lines.push(aName + ' brings the league\'s top scoring offense.');

  if (homeCtx.avgPoints !== null && awayCtx.avgPoints !== null) {
    const gap = Math.abs(homeCtx.avgPoints - awayCtx.avgPoints);
    if (gap >= 20) lines.push('On paper this could get lopsided — a ' + gap.toFixed(1) + ' pt/wk scoring gap separates them.');
    else if (gap <= 5) lines.push('Nearly identical scoring output this season — expect a close one.');
  }

  if (!lines.length) lines.push('Not enough season data yet to preview this one — check back once a few weeks are in the books.');
  return lines.join(' ');
}

function buildReviewBanter(g, homeCtx, awayCtx, homePts, awayPts, byTeam){
  const lines = [];
  const margin = Math.abs(homePts - awayPts);
  const winnerName = homePts > awayPts ? homeCtx.name : awayCtx.name;
  const loserName = homePts > awayPts ? awayCtx.name : homeCtx.name;

  const combined = homePts + awayPts;
  if (g.winner === 'TIE') {
    lines.push(homeCtx.name + ' and ' + awayCtx.name + ' played to a ' + homePts.toFixed(1) + '-all stalemate — somewhere a fantasy god shrugged.');
  } else if (margin < 3) {
    lines.push(winnerName + ' survived by a hair, ' + margin.toFixed(1) + ' pts, and ' + loserName + ' will be replaying that bench lineup all week.');
  } else if (margin < 5) {
    lines.push(winnerName + ' edged ' + loserName + ' in a ' + margin.toFixed(1) + '-pt nail-biter — heart, meet mouth.');
  } else if (margin > 60) {
    lines.push(winnerName + ' didn\'t beat ' + loserName + ', they filed a police report: ' + Math.max(homePts, awayPts).toFixed(1) + '-' + Math.min(homePts, awayPts).toFixed(1) + '.');
  } else if (margin > 40) {
    lines.push(winnerName + ' put on a clinic, dismantling ' + loserName + ' by ' + margin.toFixed(1) + '.');
  } else {
    lines.push(winnerName + ' handled ' + loserName + ', ' + Math.max(homePts, awayPts).toFixed(1) + '-' + Math.min(homePts, awayPts).toFixed(1) + '.');
  }

  if (combined >= 300) {
    lines.push('Combined ' + combined.toFixed(1) + ' pts — an absolute shootout.');
  } else if (combined <= 150 && g.winner !== 'TIE') {
    lines.push('Combined just ' + combined.toFixed(1) + ' pts — a slugfest nobody wanted to watch.');
  }

  const winCtx = homePts > awayPts ? homeCtx : awayCtx;
  const loseCtx = homePts > awayPts ? awayCtx : homeCtx;
  if (winCtx.streakLen >= 5 && winCtx.streakType === 'W') lines.push(winCtx.name + ' has won ' + winCtx.streakLen + ' in a row — somebody check if the rest of the league still has a pulse.');
  else if (winCtx.streakLen >= 3 && winCtx.streakType === 'W') lines.push(winCtx.name + ' is rolling: ' + winCtx.streakLen + ' straight.');
  if (loseCtx.streakLen >= 5 && loseCtx.streakType === 'L') lines.push(loseCtx.name + ' has now dropped ' + loseCtx.streakLen + ' straight — at this point it\'s a lifestyle.');
  else if (loseCtx.streakLen >= 3 && loseCtx.streakType === 'L') lines.push(loseCtx.name + ' is mired in a ' + loseCtx.streakLen + '-game slide.');

  if (byTeam) {
    const winRank = scoringRank(byTeam, winCtx.team.id);
    const loseRank = scoringRank(byTeam, loseCtx.team.id);
    const teamCount = Object.keys(byTeam).length;
    const winPts = Math.max(homePts, awayPts), losePts = Math.min(homePts, awayPts);
    if (winRank === 1) lines.push(winCtx.name + ' remains the league\'s top-scoring team — the rich get richer.');
    if (loseRank === 1) lines.push(loseCtx.name + ' scored the most points on the season and STILL lost. Fantasy football, everybody.');
    if (teamCount >= 4 && loseRank === teamCount) lines.push(loseCtx.name + ' is dead last in scoring and this didn\'t help.');
    if (teamCount >= 4 && loseRank <= 3 && winRank > loseRank) lines.push(loseCtx.name + ' is a top-3 scorer who just got upset by a lower seed. Ouch.');
    if (winCtx.avgPoints !== null && winPts >= winCtx.avgPoints + 30) {
      lines.push(winCtx.name + ' erupted for ' + (winPts - winCtx.avgPoints).toFixed(1) + ' pts above their average — peaked at the right time.');
    } else if (winCtx.avgPoints !== null && winPts >= winCtx.avgPoints + 20) {
      lines.push(winCtx.name + ' torched their season average by ' + (winPts - winCtx.avgPoints).toFixed(1) + ' pts.');
    } else if (loseCtx.avgPoints !== null && losePts <= loseCtx.avgPoints - 30) {
      lines.push(loseCtx.name + ' no-showed by ' + (loseCtx.avgPoints - losePts).toFixed(1) + ' pts below their average. Rough week to sit the studs.');
    } else if (loseCtx.avgPoints !== null && losePts <= loseCtx.avgPoints - 20) {
      lines.push(loseCtx.name + ' fell ' + (loseCtx.avgPoints - losePts).toFixed(1) + ' pts short of their usual output.');
    }
  }

  return lines.join(' ');
}

function renderRecapContent(){
  if (multiSeasonGuard(recapView, 'Recap Card')) return;
  if (!state.teams.length) { recapView.innerHTML = '<div class="status">Load a league first.</div>'; return; }

  const { priorWeek } = currentAndPriorWeeks();
  if (priorWeek === null) {
    recapView.innerHTML = '<div class="status">No completed weeks yet this season.</div>';
    return;
  }

  const games = state.schedule.filter(g => g.matchupPeriodId === priorWeek && g.home && g.away && g.winner && g.winner !== 'UNDECIDED');
  if (!games.length) {
    recapView.innerHTML = '<div class="status">No completed matchups found for Week ' + priorWeek + '.</div>';
    return;
  }

  const byTeam = teamContexts();
  let highest = null, lowest = null, closest = null, blowout = null;
  const rows = [];
  games.forEach(g => {
    const homeCtx = byTeam[g.home.teamId], awayCtx = byTeam[g.away.teamId];
    if (!homeCtx || !awayCtx) return;
    const homePts = g.home.totalPoints ?? 0, awayPts = g.away.totalPoints ?? 0;
    const margin = Math.abs(homePts - awayPts);
    if (!highest || homePts > highest.pts) highest = { name: homeCtx.name, pts: homePts };
    if (!highest || awayPts > highest.pts) highest = { name: awayCtx.name, pts: awayPts };
    if (!lowest || homePts < lowest.pts) lowest = { name: homeCtx.name, pts: homePts };
    if (!lowest || awayPts < lowest.pts) lowest = { name: awayCtx.name, pts: awayPts };
    if (g.winner !== 'TIE') {
      if (!closest || margin < closest.margin) closest = { home: homeCtx.name, away: awayCtx.name, margin };
      if (!blowout || margin > blowout.margin) blowout = { home: homeCtx.name, away: awayCtx.name, margin };
    }
    rows.push({ home: homeCtx.name, away: awayCtx.name, homePts, awayPts, homeWin: homePts > awayPts, awayWin: awayPts > homePts });
  });

  const W = 900, headerH = 120, rowH = 46, hlH = 140, padB = 60;
  const H = headerH + rows.length * rowH + hlH + padB;
  const cvs = document.createElement('canvas');
  cvs.width = W; cvs.height = H;
  cvs.style.maxWidth = '100%'; cvs.style.height = 'auto';
  cvs.style.borderRadius = '12px'; cvs.style.boxShadow = '0 4px 18px rgba(0,0,0,0.35)';
  const ctx = cvs.getContext('2d');

  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#0f2027'); bg.addColorStop(1, '#203a43');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#ffd54a';
  ctx.font = 'bold 40px Segoe UI, Arial, sans-serif';
  ctx.textBaseline = 'top';
  ctx.fillText('Week ' + priorWeek + ' Recap', 40, 30);
  ctx.fillStyle = '#9fb3c8';
  ctx.font = '20px Segoe UI, Arial, sans-serif';
  ctx.fillText((state.leagueName || 'Fantasy League') + '  \u2022  ' + state.seasonYear, 42, 82);

  let y = headerH;
  ctx.font = '22px Segoe UI, Arial, sans-serif';
  rows.forEach((r, idx) => {
    if (idx % 2 === 0) { ctx.fillStyle = 'rgba(255,255,255,0.04)'; ctx.fillRect(30, y, W - 60, rowH); }
    ctx.textAlign = 'left';
    ctx.fillStyle = r.homeWin ? '#7CFC98' : '#e8eef3';
    ctx.fillText(r.home, 48, y + 12);
    ctx.fillStyle = r.awayWin ? '#7CFC98' : '#e8eef3';
    ctx.textAlign = 'right';
    ctx.fillText(r.away, W - 48, y + 12);
    ctx.fillStyle = '#ffd54a';
    ctx.textAlign = 'center';
    ctx.fillText(r.homePts.toFixed(1) + ' - ' + r.awayPts.toFixed(1), W / 2, y + 12);
    y += rowH;
  });

  ctx.textAlign = 'left';
  y += 14;
  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  ctx.beginPath(); ctx.moveTo(30, y); ctx.lineTo(W - 30, y); ctx.stroke();
  y += 16;
  ctx.font = 'bold 18px Segoe UI, Arial, sans-serif';
  ctx.fillStyle = '#9fb3c8';
  const hl = [];
  if (highest) hl.push(['\uD83D\uDD25 Highest', highest.name + ' (' + highest.pts.toFixed(1) + ')']);
  if (lowest) hl.push(['\uD83D\uDCC9 Lowest', lowest.name + ' (' + lowest.pts.toFixed(1) + ')']);
  if (closest) hl.push(['\u2694\uFE0F Closest', closest.home + ' vs ' + closest.away + ' (' + closest.margin.toFixed(1) + ')']);
  if (blowout) hl.push(['\uD83D\uDCA5 Blowout', blowout.home + ' vs ' + blowout.away + ' (' + blowout.margin.toFixed(1) + ')']);
  hl.forEach((pair, i) => {
    const hx = 48 + (i % 2) * (W / 2 - 20);
    const hy = y + Math.floor(i / 2) * 46;
    ctx.fillStyle = '#ffd54a'; ctx.fillText(pair[0], hx, hy);
    ctx.fillStyle = '#e8eef3'; ctx.font = '18px Segoe UI, Arial, sans-serif';
    ctx.fillText(pair[1], hx, hy + 22);
    ctx.font = 'bold 18px Segoe UI, Arial, sans-serif';
  });

  recapView.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'recap-wrap';
  const btn = document.createElement('button');
  btn.id = 'recapDownloadBtn';
  btn.className = 'btn';
  btn.textContent = 'Download PNG';
  btn.addEventListener('click', downloadRecapCard);
  wrap.appendChild(btn);
  wrap.appendChild(cvs);
  recapView.appendChild(wrap);
  recapView._canvas = cvs;
  recapView._week = priorWeek;
}

function downloadRecapCard(){
  const cvs = recapView._canvas;
  if (!cvs) return;
  cvs.toBlob(function(blob){
    if (!blob) return;
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'week-' + (recapView._week || 'x') + '-recap.png';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }, 'image/png');
}

﻿function renderTrashContent(){
  if (multiSeasonGuard(trashView, 'Trash Talk')) return;
  if (!state.teams.length) { trashView.innerHTML = '<div class="status">Load a league first.</div>'; return; }

  const ctxs = teamContexts();
  const list = Object.values(ctxs);
  if (!list.some(c => c.games.length)) {
    trashView.innerHTML = '<div class="status">No completed games yet. Come back after Week 1 to start the disrespect.</div>';
    return;
  }

  const allPlay = computeAllPlayRecords(state.teams, state.schedule);
  const n = list.length;

  // Rank by a blended power number: avg points (weighted) + win pct.
  const ranked = [...list].sort((a, b) => {
    const av = (a.avgPoints || 0) + (a.winPct || 0) * 100;
    const bv = (b.avgPoints || 0) + (b.winPct || 0) * 100;
    return bv - av;
  });
  const rankOf = {};
  ranked.forEach((c, i) => { rankOf[c.team.id] = i + 1; });

  // Seeded RNG so a given league state produces stable roasts (no reshuffle
  // on every tab switch), but still varied across teams.
  function rng(seed){
    let x = seed % 2147483647; if (x <= 0) x += 2147483646;
    return () => (x = x * 16807 % 2147483647) / 2147483647;
  }

  const OPENERS = [
    'Let me be blunt:', 'No sugarcoating this:', 'Gather round, because',
    'Somebody had to say it \u2014', 'Breaking news, jackass:', 'Real talk:'
  ];
  const TOP_INSULTS = [
    'you\u2019re the reason the rest of this league drinks on Sundays',
    'you win so much it\u2019s honestly obnoxious, you smug bastard',
    'the trophy already has your grubby fingerprints on it',
    'everyone else is playing for second and they know it'
  ];
  const MID_INSULTS = [
    'aggressively mediocre \u2014 the plain oatmeal of this league',
    'you\u2019re a coin flip in cleats and half the time the coin\u2019s embarrassed',
    'not good enough to brag, not bad enough to pity, just\u2026 there, like a fart in an elevator',
    'the human equivalent of a participation trophy that nobody clapped for'
  ];
  const BOTTOM_INSULTS = [
    'your lineup looks like it was set by a concussed raccoon',
    'you\u2019d lose a staring contest to your own bench',
    'your roster is a dumpster fire and the dumpster filed a complaint',
    'a wet paper bag has a better win probability than your starting QB',
    'you manage this team like you\u2019re actively being blackmailed to lose',
    'even your kicker is embarrassed to be seen with you'
  ];

  function pick(arr, r){ return arr[Math.floor(r() * arr.length)]; }

  function roastFor(ctx){
    const rank = rankOf[ctx.team.id];
    const r = rng((ctx.team.id + 1) * 7919 + rank * 31 + Math.round((ctx.avgPoints || 0) * 10));
    const rec = ctx.wins + '-' + ctx.losses + (ctx.ties ? '-' + ctx.ties : '');
    const avg = ctx.avgPoints !== null ? ctx.avgPoints.toFixed(1) : '\u2014';
    const sRank = scoringRank(ctxs, ctx.team.id);
    const ap = allPlay[ctx.team.id];
    const bits = [];

    bits.push(pick(OPENERS, r));

    let pool = MID_INSULTS;
    if (rank <= Math.ceil(n / 3)) pool = TOP_INSULTS;
    else if (rank > Math.floor(2 * n / 3)) pool = BOTTOM_INSULTS;
    bits.push(pick(pool, r) + '.');

    // Concrete stat citations so the roast feels earned.
    bits.push('You\u2019re sitting at ' + rec + ' averaging ' + avg + ' points a week');
    if (sRank) bits.push('\u2014 that\u2019s ' + ordinal(sRank) + ' of ' + n + ' in scoring, ' +
      (sRank <= n / 3 ? 'which is the one thing keeping you off the milk carton' :
       sRank > 2 * n / 3 ? 'which is functionally a hate crime against fantasy football' :
       'which is stunningly forgettable') + '.');
    else bits.push('.');

    if (ap && (ap.wins + ap.losses + ap.ties)) {
      const pct = allPlayPct(ap);
      bits.push('Against the whole league you\u2019d be ' + ap.wins + '-' + ap.losses +
        (ap.ties ? '-' + ap.ties : '') + ' (' + Math.round(pct * 100) + '% all-play), so ' +
        (pct >= 0.6 ? 'your record isn\u2019t even luck \u2014 you\u2019re just a menace.' :
         pct <= 0.4 ? 'no, it\u2019s not bad luck, you\u2019re actually just this bad.' :
         'you\u2019re exactly as forgettable as your record suggests.'));
    }

    if (ctx.streakType === 'W' && ctx.streakLen >= 2)
      bits.push('Riding a ' + ctx.streakLen + '-game win streak and insufferable about it.');
    else if (ctx.streakType === 'L' && ctx.streakLen >= 2)
      bits.push('Losers of ' + ctx.streakLen + ' straight \u2014 at this point it\u2019s a lifestyle.');

    return bits.join(' ');
  }

  function ordinal(k){
    const t = k % 100; if (t >= 11 && t <= 13) return k + 'th';
    switch (k % 10){ case 1: return k + 'st'; case 2: return k + 'nd'; case 3: return k + 'rd'; default: return k + 'th'; }
  }

  const rows = ranked.map(ctx => {
    const rank = rankOf[ctx.team.id];
    return '<div class="trash-card">' +
      '<div class="trash-head"><span class="trash-rank">#' + rank + '</span>' +
      '<span class="trash-name">' + escapeHtml(ctx.name) + '</span></div>' +
      '<p class="trash-line">' + escapeHtml(roastFor(ctx)) + '</p>' +
      '</div>';
  }).join('');

  trashView.innerHTML =
    '<h2 class="section-title">Trash Talk</h2>' +
    '<div class="status" style="margin-bottom:12px;">Ranked worst-to-first in disrespect. \uD83C\uDF36\uFE0F NC-17, brought to you by the numbers. All roasts are affectionate. Mostly.</div>' +
    rows;
}
